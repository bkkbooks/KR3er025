body:
  text: 卷之七病因賦下腰痛腎虛而或閃挫五種腰者腎之府一身之大關節也如或房勞過度則腎虛舉動閃挫則氣逆負重損傷則血凝酒食下注則濕熱睡臥濕處則寒濕此皆謂腰痛之因也審其病因症亦有異腎虛者其痛悠悠不已脈弦而大也閃挫者俯仰艱難脈沉弦而實也血凝者痛如錐刺日輕夜重也濕熱者小便而黃大便溏脈沉弦而細數也寒濕者凡遇天陰及久坐而作痛者是也腎虛用青娥丸加當歸熟地枸杞牛膝茴香知母續斷獨活閃挫用茴香木香川芎獨活官桂砂仁枳殼杜仲破故紙血凝用歸尾桃仁紅花沒藥乳香肉桂延胡獨活濕熱用茯苓白朮陳皮防己知母黃柏防風秦艽羌活獨活寒濕用川芎當歸桂枝附子杜仲牛膝白芷蒼朮獨活因風寒濕氣流注經絡而作痛者二陳湯加麻黃蒼朮川芎白芷羌活獨活之類因醉飽入房而酒食之積乘虛流入腎經致腰痛而不便俯仰四物合二陳湯加麥芽神麯杜仲黃柏官桂砂仁葛花枳殼之類腎著附腎著為病是因經虛受濕得之其體重腰冷如坐水中飲食如故自利不渴腰重如帶五千錢治宜流濕兼用溫暖之藥則陽氣充足自能運動而愈矣腹痛寒氣而或食停八種中脘痛屬太陰脾臍腹痛屬少陰腎小腹痛屬厥陰肝綿綿痛而無增減者寒也時作時止者熱也痛甚欲大便便後痛減者食積也痛有常處而不移動者死血也痛時小便不利得辛熱湯而痛暫止者痰也痛而腹中有塊起急以手按便不見噁心清水出者蟲也或先食熱物後食寒物而作痛者冷熱不調也又有真腹痛痛時臍上青筋上貫於心者死人中黑色者死治以平胃散寒加乾薑附子肉桂吳茱萸之類熱加白芍黃柏痛甚加炒乾薑從之食積加檳榔枳實神麯麥芽山楂萊蔔子之類以消之甚者加大黃肉桂以下之死血加歸尾桃仁靈脂沒藥延胡索之類以活之甚者加大黃桃仁肉桂以下之濕痰加南星半夏香附茯苓枳殼木通之類蟲痛加檳榔使君子肉冷熱不調加芍藥桂枝大黃凡腹滿痛連於脅膈手足冷脈伏匿者多是痰飲填塞至陰抑遏肝膽之氣宜用燒鹽三合溫湯三升調服探吐腹中水鳴附丹溪曰腹中水鳴乃火擊動其水也蓋水欲下火欲上相觸而然二陳湯加芩連梔子亦有臟寒而水聲汩汩者宜分三陰部分而治中脘太陰當臍少陰小腹厥陰各從其宜溫之又有脅下有水氣土弱不能制水故腹中雷鳴下利謂之協熱利者又有腸胃空虛而鳴者宜參朮之類補之經云脾胃虛則腸鳴腹滿又云中氣不足腸為之苦鳴小腹痛附小腹痛有二凡尺脈洪大者為陰不足宜六味湯尺脈沉微者為陽不足宜八味湯在婦人多屬瘕症亦宜溫補肝腎在傷寒家蓄血在下焦宜抵當桃仁承氣之類抵當丸歸尾桃仁生地大黃元粉桂心山甲若因氣鬱而痛青皮主之寒者桂枝吳茱萸溫之若因疝奔豚癥聚者當按本門施治痿症不足與濕熱內經曰肺熱葉焦則皮毛虛弱急薄著則生痿蹙心氣熱生脈痿脛縱不任地肝氣熱生筋痿宗筋縱脾氣熱生肉痿痹而不仁腎氣熱生骨痿足不任身總以五痿湯加減治之豫觀痿症之因或病後遠行或産後早起或斫喪異長五行房事勞傷骨髓以致兩足痿軟甚多治以五獸三匱丹筋痿者五加皮酒切須戒欲方獲全功夏月濕熱成痿或嗜酒積濕者清燥湯清燥湯白朮蒼朮當歸黃連茯苓豬苓人參生地黃柏麥冬黃耆五味澤瀉升麻柴胡陳皮甘草濕痰成痿舒筋健步丸主之攣急瘛附內經言攣皆屬於肝肝主身之筋故也有熱有虛有實熱攣者所謂肝氣熱則筋膜乾筋膜乾則筋急而攣又曰因於濕首如裹濕熱不攘大筋軟短小筋弛長軟短為拘弛長為痿是也筋膜乾者生地當歸之屬濡之大筋軟短者薏仁散主之暴感寒則筋攣者所謂虛邪搏於筋拳骨痛發表兼和血五積之類虛攣者所謂虛邪搏於筋則筋拳又曰血虛則筋急用桂枝甘草以御其寒而緩其急搐黃柏之苦寒瀉實而潤急救腎水升麻葛根以升陽氣人參補元氣為輔佐當歸去裡急而和血潤燥名曰活血通筋湯更須暖室中近火按摩為佳實攣者濕熱挾痰鬱於四肢大便祕結即痛風初起症也丹溪治一村夫背傴僂而足攣已成廢人脈之兩手皆沉弦而澀遂以戴人煨腎散與之上吐下瀉如此凡三帖然後平復瘛者筋脈拘急也瘲者筋脈張縱也俗謂之搐是也經曰肝主精而藏血産後陰血去多筋無所養或癰疽膿水金瘡出血及衄血嘔血下血後或傷寒誤汗或虛弱人誤汗誤下氣血津液受虧而致此者輕者加味逍遙散八珍散八珍人參白朮茯苓甘草當歸川芎生地芍藥加丹皮鉤藤以生陰血則陽火自退諸症自愈不應四君子加芎歸丹皮以補脾土蓋血生於至陰至陰者脾土也若陽氣脫陷者補中益氣加薑桂陽氣虛敗者十全大補加薑附亦有復生者然筋抽搐顫掉肢體惡寒脈微細人皆知為虛也是為真象至於脈大發熱煩渴是為假象粗工不知而認為有餘後瀉之者多矣若抽搐戴眼汗出如珠俱不治煨腎散甘遂末三錢獖豬腰子細批開鹽椒醃透摻藥末在內荷葉包煨火內燒熱酒嚼下痹症寒熱與風乘痹者痛也風寒濕三氣雜至合而為痹也其風氣勝者為行痹遊走不定也寒氣勝者為痛痹筋骨攣痛也濕氣勝者為著痹浮腫重墜也然即曰勝則受病有偏重矣治行痹者散風為主而以陰寒祛濕佐之大抵參以補血之劑所謂治風先治血血行風自滅也治痛痹者散寒為主而以疏風燥濕佐之大抵參以補火之劑所謂熱則流通寒則凝塞通則不痛痛則不通也治著痹者燥濕為主而以祛風散寒佐之大抵參之補脾之劑蓋土旺則能勝濕而氣足自無頑麻也通用蠲痹湯加減主之蠲痹湯赤芍藥片薑黃川羌活當歸全炙西耆炙甘草大棗生薑痛甚者佐以松枝酒流火附流火即風痹也遊行不定上下左右隨其虛邪與氣血相搏聚於關節或赤或腫筋脈弛縱從無正方可療苟能節飲食薄滋味自然痛數差稀長服扶桑丸可以久久不發一用千里廣即枸杞蔥根韭菜根搗汁一碗老酒沖服發汗即愈或用龜板炙一兩黃柏三錢共為細末飯搗作丸梧子大每用三錢晨起好酒送下急救煎方及藥酒方懼驗腿痛膝痛附腿痛之症有屬寒濕者六脈沉濡或伏兩膝隱隱作痛或麻木作腫遍身沉重天陰益甚初宜微表後兼分利有屬濕熱者脈濡細而數痛自腰胯以至足腫或上或下或腫或紅小便赤澀宜滲濕清熱當歸拈痛湯有屬痰流注者脈沉滑或弦腰臍一塊互換作痛及噁心頭眩者痰也昔肥今瘦者痰也宜豁痰行氣羌獨二朮二陳加減豁痰湯有屬陰虛者脈細而數或兩尺洪盛肌體羸瘦足心及脛俱痛不能任地宜滋陰降火四物加知柏牛膝杜仲有屬陽虛脈沉弱或虛大兩足浮腫大便不實小水短少痛不能動屬命門火衰真陽虛極補中益氣加桂附或金匱腎氣丸下部道遠非烏附不能達也濕熱濁痰鬱久非烏附不能開也然在前廉為陽明白芷升麻為引後廉太陽羌活防風為引外廉少陽柴胡為引內廉厥陰青皮吳茱為引內前廉太陰蒼朮白芍為引治無遺法矣膝眼穴又名鬼眼穴在膝蓋之下左右兩骨空陷中由內氣素虛外邪易於侵襲先從膝眼隱隱作痛如風勝其痛則走法不定寒勝則痛如錐刺濕勝則外見胖腫屈不能伸其病在筋伸不能屈其病在骨動移不能沉寒痼冷之候也惟在臨症宜詳辨之初服萬靈丹溫散之其痛即止次服獨活寄生湯宣補之效遲者兼用火針針膝眼穴此轉重就輕之法也單膝生者輕雙膝者重若左膝方愈復病右膝右膝方愈復病左膝者名過膝風屬險治法同前足心足跟痛附腳跟痛有因痰有因血熱血熱者四物湯加黃柏知母牛膝之類痰者二陳加南星黃柏防己若足指拳縮無力乃腎氣不足血氣不榮也惟宜補以榮之然足跟乃督脈發源之所腎經所過之地諸骨承載之本凡或熱或腫或痛者皆足三陰虛熱所致丹溪所謂火起於九泉陰虛之極也少年酒色過度者多犯此病宜聖愈湯生地熟地當歸人參黃耆又經驗方牛膝一兩米仁一兩五錢蒼朮七錢五分杜仲黃柏當歸石斛萆薢木瓜秦艽木通各五錢水煎服足心腎屬或熱或癢痛或腫脹或麻皆腎虛所致六味八味消息用之又有足心如中箭發歇不時此腎之風毒瀉腎則愈此症多屬虛勞不可用克藥宜大聖散補養氣血川芎當歸人參黃耆麥冬炙草茯苓木香入木瓜末一錢酒調服外用草烏川椒白芷煎湯洗腳氣轉筋附腳氣者腳下腫痛即痹症之類也因其痛在腳故以腳氣名之其腫者名濕腳氣不腫者名乾腳氣濕腳氣水氣勝也檳榔散主之乾腳氣風氣勝也四物湯加牛膝木瓜主之用麻黃三兩去根留節炒黃薑蠶二兩炒為末乳香沒藥各五錢丁香一錢各研末和勻每服一兩好酒調下取醉汗至腳為度汗乾即愈後用五枝湯洗桃柳梅槐桑取嫩枝煎湯先飲好酒三杯洗腳止痛為妙有於睡中或於伸欠而筋轉於足大指上至腰腿結痛者用松節二兩銼如米粒乳香一錢以瓦器內慢火炒焦為末每用一二錢熱木瓜酒調下凡是筋病皆妙不獨腳轉筋也如無松節茯神木亦可四種遺精心腎不能既濟有小便後精出不可禁者有不小便而精自出者有莖中痛癢常欲如小便者有睡中無夢流出不自覺者其因不一或思想無窮相火妄動而精走者茯神湯治之或用心過度心不率腎而失精者妙香散或飲酒厚味痰火濕熱擾動精府者二陳湯加蒼朮黃柏升麻柴胡或淫欲太過閉藏失職腎元不固者山藥丸加牡蠣龍骨鹿茸韭子或脾虛下陷者補中益氣湯或肝火熾強者加味逍遙散夢遺附心藏神肝藏魂夢中所主之心即心之神也所見之形即肝之魂也所泄之精即腎之精也故心為主肝為相未有君火動而相火不隨之者治此病者安心益腎為要藥也如珍珠丹定志丸水陸二仙膏之類精濁附敗精流於溺竅莖中不痛而溺自清惟竅端時有穢物如瘡狀目眵淋漓不斷與便溺絶不相混而為白濁虛滑者血不及變而為赤濁宜滋陰藥中加牛膝冬葵子萆薢去其敗精然後分治挾寒者脈遲無力溺色清白挾熱者口渴便黃脈滑數有力寒者萆薢分清飲熱者清心蓮子飲痛者去人參黃耆用甘草梢梔子仁溺濁附小便濁澀漩面如油光彩不定漩腳下澄凝如膏糊大約竅端結蓋者為多火不結蓋者為兼濕小水赤澀而痛或濁帶赤色者為小腸濕熱小水不澀不痛而所下色白或滲利轉甚者為脾氣下陷莖中痛癢而發寒熱或有結痛者為毒邪所侵陰虛火動主以地黃湯去山萸加萆薢黃柏心虛火動主以清心蓮子飲濕痰下注立以蒼白二術湯濕熱不清主以四苓散中氣下陷主以補中益氣湯下元虛冷主以八味地黃湯若暑月胃熱便濁者辰砂六一散陰痰附陽物縮入腹內是寒附子理中湯或用附子皂角酥炙去皮弦久一錢炮薑炙草各二分半水煎服陽物挺長不收是熱大黃芒硝厚朴枳實各一錢甘草二錢水煎服或用小柴胡湯倍加黃連黃柏少加外以絲瓜汁調五倍子末敷之男子陰痿不起古方多雲命門火衰精氣虛冷固有之然而亦有鬱火甚而致痿者經云壯火食氣譬如人在夏暑中而倦怠痿弱遇冬寒而強健也宜服知柏清火堅腎之藥如虎潛丸之類又云是濕土製腎宜升麻柴胡羌活膽草炒知母炒黃柏各一錢炙甘草澤瀉各錢半熱服服後壓以食間服八味地黃丸男子玉莖不痿精流不注時時如針刺病名強中由過服丹石熱藥所致斃不遠矣初起時用當歸芍藥牛膝枸杞五味熟地青皮黃連之類絶欲可救或用薺苨大豆去皮茯神磁石煅元參石斛花粉骨皮鹿茸各一兩沉香人參各五錢熟地一兩豬腎一具如食法煮蜜丸空心鹽湯下五般黃疸濕熱熏蒸而成黃疸有無曰黃汗黃疸谷疸酒疽女勞疸皆因濕熱鬱於脾胃之中丹溪曰疸病不必分五同是濕熱如罨面相似濕在上宜發汗濕在下宜利小便或二法並用使上下分消其濕方用茵陳黃疸湯主之有陰黃者四肢冷自汗泄利小便清白脈來沉遲虛黃者耳鳴口淡怔忡微熱四肢無力怠惰嗜臥腳軟脈沉細用人參二錢五分黑乾薑一錢炙甘草一錢水煎空心服凡疸病腹滿臍突手足心黃寸口無脈者皆不治也痿黃病附痿黃病又名脾病諺謂黃腫病由脾氣虛弱感受濕熱而成四肢無力面目浮腫通用褪金丸治之附茵陳黃疸湯方茵陳黃芩黃連梔子龍膽草蒼朮豬苓澤瀉青皮車前子木通花粉胸膈飽悶加枳實厚朴蘿蔔子身熱加柴胡小便短赤加黃柏酒傷加炒黑乾薑砂仁瓜蔞仁谷疸加三稜蓬朮砂仁陳皮神麯褪金丸白礬醋拌曬乾罐盛外以黃泥裹罐曬乾埋簏粳火中間一日夜取用赤礬三兩蒼朮二兩米泔制厚朴薑製香附童便浸炒陳皮微炒桔梗炒各一兩甘草炒五錢砂仁炒五錢木香五錢共為細末紅棗八兩生薑一兩水煮熟剝去皮核揀去生薑以棗肉和搗丸梧子大早晚各服五分溫酒下忌羊鵝豬頭肉小腸鯉魚䱻魚鹽蛋糟北瓜蕎麥面咸乾菜酸薺菜苔菜生冷眩暈者無痰眩言其黑運言其轉其狀眼暗耳聾頭旋身轉如立舟車之狀起則欲倒蓋由痰因火動而然也肥人頭眩者屬氣虛濕痰也六君子湯加黃耆川芎當歸天麻白芷桔梗瘦人頭眩者屬血虛痰火也四物湯加人參茯苓陳皮貝母片芩天麻山梔如勞欲過度內傷元氣而頭眩者補中益氣湯加半夏熟地天麻白芍如房欲過度陰虛火動而頭眩者滋陰降火湯加川芎天麻竹瀝少許有早起眩暈須臾自定日以為常謂之晨暈此陽虛也有日晡眩暈得臥少可謂之昏暈此陰虛也肝厥鬱冒附肝厥之症狀如癇疾僵仆不醒醒則嘔吐頭眩發熱宜二陳湯加柴胡枳殼甘菊鉤藤乾葛山梔生薑鬱冒者由腎氣大虛每遇風寒即發眩冒不仁不省冷汗自流宜十全大補主之麻木附麻者非癢非痛或四肢或周身唧唧然不知痛癢如繩扎縛初松之狀在手多兼風在足多兼寒濕木者不癢不痛按之不知搔之不覺如木之厚常木為死血間木為濕痰死血者只在一處不腫不痛但紫黑而木濕痰者走柱有核腫起白色不變東垣神效黃耆湯治之又曰挾乎風痰則麻而不仁兼乎死血則木而不覺用威靈仙石菖蒲紫蘇南星桂枝甘草五加皮各一錢加茅朮薑三片水煎熱服手麻加桂枝足麻加牛膝四帖即愈消渴者無火不生消渴有三上消者肺也多飲水而少食大小便如常此心火形於肺金而渴生焉中消者胃也多飲食而小便黃赤蓋足陽明胃經血熱則消穀善飢血中伏火則津液消爍而渴矣下消者腎也小便濁淋如膏煩渴引飲耳輪焦黑小便頻數能食者必發癰疽背瘡不能食者必傳中滿臌脹大抵三消皆因火熱之氣煎熬臟腑消爍血液也治以二物湯為主上消加人參五味麥冬花粉煎入藕汁生地汁人乳飲酒人加生葛根汁中消加石膏寒水石以降胃火下消加知母黃柏熟地五味以滋腎水又當飲繅絲湯如無以蠶繭殼或絲棉煎湯飲之不寐者痰火旺而血少不寐有三有痰在心經神不歸舍而不寐者溫膽湯加酸棗仁竹瀝薑汁有病後虛弱而不寐者六君子湯加黃耆棗仁有血少而不寐者歸脾湯多睡者脾胃倦而神昏脾胃倦則怠惰嗜臥神思短則懶怯多眠治以六君子湯又云不寐者膽虛寒也以致棗仁炒為末竹葉湯下多睡者膽實熱也以棗酸生為末薑茶煎湯下大便祕乃血液燥結大便祕結有風燥有熱燥有陰結有陽結有老年氣虛津液枯涸而結者又有脫血津液暴竭而結者種種不同不可一塗而治切不可妄用芒硝大黃巴豆牽牛峻下之物伐損真陰敗傷胃氣反受其害若夫胃有餘邪蓄於腸內則非下不可又不可過慮也風燥搜風順氣丸熱燥潤燥湯陰結者寒結也若胃中停滯寒冷之物大便不通心腹作痛者備急丸主之陽結者熱結也傷寒邪熱傳胃大實大滿結燥不通用三承氣湯選用之老年氣虛産後血少大便燥結者麻仁粥治之小便利大便祕者名曰脾約用脾約丸交腸附此症甚少大便前出小便後出名交腸陰陽拂逆也五苓散主之又有老人陰血乾枯大腸結燥便溺俱自前出此非交腸乃血液枯涸之徵氣血衰敗之候也多服大劑八珍湯或可稍延歲月耳小便祕乃氣滯不行內經曰膀胱者州都之官津液藏也氣化則能出矣蓋小便不通皆因氣滯不行也丹溪曰有氣虛有血虛有氣滯有積痰有實熱皆宜吐以提其氣氣升則水自降蓋氣乘載其水也譬如滴水之器上竅閉則下竅不出使吐之是開上竅之法也氣虛用參朮升麻煎湯探吐血虛用芎歸湯探吐氣滯積痰以二陳湯加香附木通探吐實熱者以八正散利之大便動而小便自通也東垣曰小便不通以渴與不渴辨之以在氣在血治之如渴而小便不利者邪在上焦氣分宜清肺之氣瀉其火以滋水之上源也清肺飲主之如不渴而小便不利熱在下焦血分宜除其熱泄其閉以滋膀胱腎水之下元也滋腎丸治之脈法盛大而實者吉虛細而澀者死小便不禁附小便不禁或頻數古方多以為寒而用溫澀之藥不知屬熱者多蓋膀胱火邪妄動水不得安故不能禁止而頻數也當以症別之虛寒用烏藥益智等分為末山藥糊為丸每服七十丸空心鹽湯送下虛熱用黃柏知母山楂肉五味牡蠣等分為末山藥糊為丸每服七十丸空心鹽湯下淋證附淋證有五總主於熱而莖中痛者也小便澀而有血者名血淋小便淋瀝身冷者名氣淋溺濁如膏浮凝如脂者名膏淋溺出如砂石者名砂淋遇勞則發痛引氣衝者名勞淋治之當行滯清熱疏利小便為主琥珀散主之然正治血氣膏砂四淋惟勞淋用清心蓮子飲浮氣不足小便淋瀝常有餘滴不盡者參苓琥珀散主之關格附關格之症嘔逆而小便不利者是也丹溪曰寒在上而熱在下故多死法當吐以提其氣之格不必在出痰也二陳湯探吐之吐中便有升降有氣虛不運者用補中益氣湯加檳榔使清氣升而濁氣降也一用藿香平胃合五苓加薑棗長流水煎服神效痔漏沿肛濕熱所致濕熱之氣下迫大腸以致經脈橫解為痔漏之病肛門邊內外有瘡成疒晶不破者曰痔破潰出膿血者曰漏痔宜清涼寬氣秦艽蒼朮湯主之漏宜清熱補養加減地黃丸主之血痔附膿汁濁液化生蟲物蠹食肛門傍生小竅滴血淋漓射如血線當以蕪荑艾葉楝根等物化蟲可耳外以血竭末敷之或以鰻魚骨燒煙燻亦效又治痔瘡出血過多者服黑地黃丸發癍癮疹風熱所乘發癍者皮膚之上有云頭紅片之狀也癮疹者皮膚之間有紅點如蚤螫之狀也皆因風熱所乘宜以防風通聖散消息之或用消癍青黛飲治之傷寒發赤色者半死半生黑色者不治白火丹附其症頭目面腫胸膈脹悶腿足浮大小便不利氣急生痰發出白癍如錢之大圈圓若瘡紅者名赤火丹濕熱之氣傷於血也白者名白火丹濕熱之氣傷於氣也謂之曰丹者所謂丹毒之見也治宜清熱涼肌之劑如荷包草汁腫處可擦隨手即消生酒和服中氣自清若見腫脹作脾虛治之或見濡脈作氣虛治之差之毫釐謬之千里非惟腫脹尤甚亦且中氣鬱悶而不進飲食生痰作喘則治之不可得也必須草藥以清之庶有可救之理荷包草汁內胸膈不利者加生香附末小道不通者加車前子末痰喘者加雪裹青汁口渴者加地漿水治之無不驗也耳聾者腎虛之故耳者腎之竅也腎氣實則耳聰腎氣虛則耳聾此大概言之耳其實少陽經之所過故左耳聾者其因忿怒過度動少陽膽火當歸龍薈丸主之右耳聾者因其色欲過度太陽膀胱相火六味地黃丸主之左右俱聾者其因醇酒厚味過度陽明胃火從中而起通聖散滾痰丸主之若淫欲耗其真元面頰黧黑者是為腎虛四物湯加枸杞蓯蓉知母黃柏菖蒲柴胡若兼頭痛耳內發癢者是為風聾九味羌活湯加柴胡菖蒲若四肢懶倦眩暈少食者是為勞聾補中益氣湯加遠志菖蒲目疾者肝火之因目者肝之竅也肝屬木木主風風動則肝火焰風火交作則邪害空竅故目為之痛也又云目有五輪藏腑之精華宗脈之所聚其白精屬肺金內輪屬脾土烏精屬肝木瞳人屬腎水赤脈屬心火如白睛變赤火乘肺也內輪赤腫火乘脾也烏睛瞳又被翳火乘肝與腎也赤脈貫目火自甚也凡目暴赤腫起羞明隱澀淚出不止暴塞目滿皆風熱之所為也治以消風養血湯如昏弱不欲視物內障見黑花瞳子散大遇夜雀盲皆血少腎虛之所致也治以滋陰地黃丸久患翳膜遮睛者還睛丸主之睡起目赤附睡起目赤腫良久如常者血熱也臥則血歸於肝故目赤腫良久血散故如常也用生地黃汁浸粳米半升曬乾三浸三曬每夜以米煮粥食一盞數日即愈齒痛乃胃熱蟲蛀齒者腎之標骨之餘也然牙床上下又屬於陽明上屬腎下屬大腸胃中有風熱則齒齦動搖腸胃氣虛則牙床不閉故多齒痛之疾胃熱者清胃散氣虛者補中益氣湯加熟地丹皮茯苓芍藥蟲痛者以新燒石灰為末蜜丸塞於孔內即愈牙疳用五倍燒灰抹如有涎水少加龍骨喉痹乃火動痰升喉痹者咽喉閉塞不通也少陰君火之脈少陽相火之脈皆絡於喉其熱氣上行搏於喉之四傍而作腫痛名曰乳娥一為單二為雙此乳蛾差小者名曰閉喉結於咽喉腫繞於外且麻且癢腫而大者名纏喉風喉症暴發暴死者名走馬喉痹其名雖殊其因則火與痰也脈伏而微者不治大凡咽喉腫痛或喉痹急症用山豆根水噙漱立效又方用豬牙皂白礬黃連各等分以新瓦焙乾為末每用五分吹入吐痰為立效暴熱喉塞及痰病不語者辰砂五分白礬一錢為末冷水調下鼻塞者胎氣之不利鼻乃肺之竅肺受風寒則鼻塞聲重肺受熱毒則鼻不知香臭二者皆宜用參蘇飲消息之寒加桂熱加芩之類治不知香臭用嫩苦參一斤切段防風荊芥連翹白芷各四兩每件煎汁收在苦參段內曬乾切為末生梨汁為丸每服三錢腦砂鼻痔附膽移熱於腦鼻流濁涕或時出黃水甚者腦亦作痛俗名腦砂此時蟲食腦中治載外治法胃中食積熱痰流注肺中令濁氣凝結而生息肉其形如棗塞滯鼻中氣息不利香臭不知甚者又名鼻齆治載外治法口瘡者脾火之道行口者脾之外候也脾火上行則口內生瘡瀉黃散治之黃連乾薑為粗末嚼之有虛火上炎服涼藥不愈者理中湯從治之心熱則口苦瀉心湯脾熱則口甘瀉黃散肺熱則口辣瀉白散腎熱則口咸滋腎丸肝熱則口酸瀉青丸肝膽同熱則口酸而苦柴胡黃芩青皮膽草之類胃虛熱則口淡補中益氣湯口唇乾燥破裂生瘡者用橄欖燒存性豬膽敷調口氣臭者用香薷湯飲之喑證附咽喉聲音如故而舌不能轉運言語者名舌喑乃風冷之邪客於脾之脈絡與舌下廉泉穴蓋舌乃心苗發聲為言風邪阻塞其經絡故無音也喉中有聲嘶而舌不能轉運言語者名喉喑亦為風寒所客使氣道不通故聲不得發而無音也大抵此症或因風痰阻塞或因心經氣虛或因脾之經絡受風或因風痰滯於脾之脈絡或因脾氣不足或胃中清氣不升皆足以致喑表未解者防風通聖散減白朮表解裡熱者清心丸涼膈散轉舌膏宜下者三化湯有痰者滌痰湯寒邪閉結者溫中散心肝有熱者龍膽瀉肝湯若初起痰食凝結上焦者先用導痰消滯湯吐之極妙女人經水不調皆因氣滯血者氣之配也氣行則血行氣滯則血滯故經候不調等症悉以四物為主凡經水將來腹中陳陳痛乍作乍止者血氣實也本方用生地加黃連香附桃仁紅花玄胡丹皮經水過期而腹中作痛綿綿無休急者屬血虛本方倍當歸熟地如兼氣虛加參耆挾寒加乾薑經如常不及期而行者血熱也本方用生地加芩連白芷經水常過期來者瘦人多是血少本方用當歸熟地加黃耆甘草少佐紅花桃仁泥以為生血之引用也肥人大概是氣虛挾痰阻滯升降而然也本方去熟地加參耆二陳香附黃連元胡五靈脂乳香沒藥之類如過期色淡者痰多血少也本方用生地合二陳湯肥盛人或二三個月一行經者痰盛而軀脂閉塞經脈也以導痰湯加芎歸香附蒼白二術經水適來適斷往來寒熱如瘧者本方合小柴胡湯經水行過三五日腹中綿綿走痛者此血行而滯氣未盡行也本方加木香檳榔經水過多久不止者成血崩本方用生地加白朮條芩阿膠茯苓山梔地榆荊芥香附甘草經水月久不止發腫者是瘀血滲入脾經本方去地黃加桃仁紅花丹皮肉桂乾薑厚朴枳殼香附木香牛膝元胡經水月久不行腹脅有塊作疼是血結癥瘕也用當歸川芎砂仁木香茴香乳香枳實厚朴桃仁紅花丹皮肉桂香附元胡牛膝之類寡婦心煩潮熱多是郁生寡婦獨陰無陽多有抑鬱之症故血益日消氣益日盛陰陽交爭乍寒乍熱食減形瘦諸病蜂起柴胡抑肝湯啓脾丸主之越曲丸以開其鬱逍遙散以調其經帶下沙淋由於濕熱帶下之狀如涕之稠黏與男子遺精同也系出於手厥陰心胞絡治當清心補養沙淋之狀如水之淡薄與男子白濁同也系出於足太陽相火治當清熱燥濕滲所以帶症病原不一治法各異如病婦肥白無病容或昔肥今瘦脈來沉滑者濕痰也如飲食減少四肢無力帶下多白者胃中痰積下滲也如婦人久病寒熱不濟夜輕日重或自汗脈大無力者氣虛下陷也如兼潮熱夜重日輕肌黑形瘦盜汗骨蒸脈來細數者血虛火熱也如因不得於夫七情抑鬱鬱而為火以致帶下者郁也濕痰宜滲濕消痰用海石半夏南星黃柏蒼朮川芎香附樗根皮痰積宜消痰升提用二陳加二朮升麻柴胡或前湯加瓦楞子下陷宜升提補氣用六君子加緑升麻柴胡火熱宜滋陰養血用四物加黃柏樗根皮滑石青黛海石鬱氣宜開鬱行氣越曲丸加樗根皮黃柏分條而治自得病情東垣用葵花治帶白者治白赤者治赤須炒黑用神驗肥人用瓦楞子以燥其濕血山崩漏為損衝任血崩之病本乎一症輕者謂之漏下重者謂之崩中蓋衝脈為十二經之血海任脈為一身生養之元氣因損此二脈故血妄行此症無論新久虛實忌服熱燥之藥初起者屬實熱治宜解毒四物湯加黃芩黃柏知母黃連生蒲黃蓮蓬之類稍久者屬虛熱治宜養血清火四物湯加阿膠艾葉芩連山梔炒蒲黃棕櫚灰之類日久屬陽氣下陷補中益氣湯加防風羌活獨活之類或用歸脾湯加赤芍脂伏龍肝以澀之又初起其血紫黑者用生化湯加澤蘭葉二三帖後即用歸脾湯加丹皮寒加黑乾薑熱加黑山梔胎孕不安治有二理安胎之法有二有因妊母有病而致胎氣不安者但治母病其胎自安有因胎氣不安而致妊母有病者但安胎氣其病自痊機要曰治胎産之病無犯胃氣及上下二焦謂之三禁者不可汗不可下不可利小便脾為後天之長腎為先天之原有孕則礙脾以致運化遲而生濕濕生熱故用白朮以健脾燥濕黃芩以清熱安胎此形瘦血熱營行過疾胎常上逼過動不安食少面黃倦怠無力者宜之若火旺口乾發熱自汗煩躁腹痛者又宜生地歸芍以養血也若性急多怒形實氣盛面黑胸滿嘔逆腹痛胎不運者又宜砂仁香附以開之腎為衝任之根男子以藏精女子以系胞若腎虛腰軟腳膝無力又宜六味丸去丹皮加杜仲續斷故健脾養血開鬱補腎治雖不同然五行相生循環無端一以貫之總之使其氣血和平無過不及而已安胎飲加減歌安胎飲里柴蘇甘大腹砂仁橘藿堪芩術歸苓薑水煮胎前諸症可相參惡阻停痰半夏宜茯苓甘草藿陳皮砂仁大腹同香附蘇葉生薑功最奇胸滿心疼號子懸蔥頭枳殼可同煎砂仁大腹甘蘇葉白朮黃芩應避嫌口渴虛煩加麥冬茯苓竹葉反防風山梔知母歸生地補血生津有大功腫脹皆因濕熱多健脾利水自安和木通苓澤薑皮術大腹陳皮及香附罹腰痛皆因腎氣虛須防孕子絶衣裾地黃杜脂芎山藥續斷當歸總載書咳嗽原來屬肺家要分虛實莫塗鴉虛將天麥阿膠等實用蘇陳桑杏砂往來寒熱屬於肝血少風邪勿誤看四物八珍醫血弱柴胡加減療風寒食傷水瀉損於脾下利稠黏作熱醫熱則香蓮丸可治四苓香附茯陳皮不眠驚悸屬於心怔忡虛煩汗不禁遠志棗仁龍眼肉茯神柏子及人參觸犯胎元動不安縮砂末服是神丹或兼佛手同生地膠艾加之治血乾大抵胎前宜四物川芎用早恐升提地黃泥膈須加減順氣平和勿執迷臨産歌臨産之時勿易看驀然氣湊目珠翻唇青口噤流涎沫子母雙雙入鬼關舌色鮮紅唇面黑子存母死片時間面紅舌黑兒難保佛手仍須奪命丹橫逆催生龍脫散滑胎可救漏胞干死胎欲下芎歸飲更搗萆麻腳底攤血入胞中時脹悶上衝心胃死何難朴硝散共紅花酒奪命神丹遂下安産下血迷成血暈清魂急灌命須還血山一倒心無主目暗頭眩汗兩漫氣隨血脫多難救薑歸參耆大補堪血搶心悶成狂妄喘絶蒲黃不等間兒枕痛時緣惡露當歸失笑效非凡忽然口噤言顛倒見鬼原非風與寒則血上衝心血耗妙香散共黑龍丹産後發熱其因有七産後發熱有七皆有以驗也如去血過多者六脈必虛惡露不行者腹中必痛感冒風寒者必兼頭痛過傷飲食者胸膈不寬蒸乳者乳汁不通乳膨者必無子飲乳起早褥勞者腰胯作痛大抵産後用藥必須溫暖使惡露流通大補氣血為主雖有雜症不過兼治之耳産後玉門不斂用硫黃吳茱萸菟絲子蛇床子煎湯頻洗子宮不收用五倍煎湯熏洗內服補中益氣湯産後遺尿用白薇白芍等分為末酒調下一日三服或用桑螵蛸五錢炒龍骨一錢為末食煎米湯下三錢産後陰癢是蟲蝕陰戶也用白礬煎湯熏洗或用熟豬肝三寸作孔入陰戶其蟲盡入肝內取出方效産後歌産下嬰兒氣血空絲毫觸犯便傷榮倏然致疾如山重不與尋常一樣同去血過多因發熱焦薑參術入歸芎陰虛作熱心煩悶自汗黃耆可奏功噁心嘔逆傷脾胃抵聖湯醫脹脹膨歸耆止汗除身熱不愈當歸奏效雄風中愈風湯立驗茯苓散子治怔忡諸風痿痹筋攣縮志士明醫用血風乍見鬼神由血耗調經散服起疲癃中風口噤身關閉搐搦身強似角弓此是血虛筋瘛瘲舉輕古拜配歸芎産後經來因續斷血虛發熱復兼風手牽足搐牙關緊昏冒當歸獨活攻大豆紫湯七珍散只煎一服有奇功陰虛發熱憎寒症晝日清明夜覺凶加味歸芎或四物將來煎服病離躬胞中誤損成淋瀝參朮煎膏溲自通浮腫定須分水道也應培土與祛風大小調經散可用憂思鬱結在寬胸痢初化滯香連芍積久須當用胃風初感寒邪微發表熱邪不解守黃龍躁煩地麥兼歸芍渴甚人參共麥冬熱泄分消兼理胃便難宜以捫腸攻汗多表弱宜耆桂里弱虛寒制理中發表內攻須帶補勿行孟浪內傷榮小便淋瀝時常痛但用茅根可治癃泄瀉四苓湯可治寒加肉果桂薑同若用熱泄兼腸垢薑炒黃連佐木通資生湯加減歌人身氣血配陰陽産下嬰兒氣血傷薑牡芎歸楂茯草豆紅加減慢推詳時逢春月倍川芎夏月丹皮茯苓同冬月炮薑堪作主迭為賓主適其中胞衣不下加牛膝惡露停留蘇木行腹痛綿綿須用桂五靈胡索共相成初産元産易中風當歸荊芥有神功華他遺下神仙訣妙用無窮自不同惡血衝心號血迷令人急把發心提速將醋炭來熏鼻童便回生可灌些頭痛川芎荊獨活腰疼續斷杜桃仁延胡香附除諸痛失笑黃金效如神不語昏迷用七珍遍身浮腫茯柑陳調金散子俱堪用驚悸硃砂遠茯神産後血虛大便難少加枳殼自應寬桃麻杏核皆堪用生地當歸可倍餐下乳須當用木通核桃山甲有神功子宮脫下升荷蒂陰痛青皮藁本蔥敗血流經加赤芍澤蘭牛膝芷紅花損脬應用參耆補白及豬脬實可誇回乳須知用麥芽乳癰遠志與胡巴木通白芷用甘草土貝還兼左纏花産後虛羸不早調光陰荏苒漸成成澤蘭羊肉當歸等烏骨雞丸瓊玉膏女子求嗣附丹溪曰婦人無子者多由血少不能攝精俗以通謂子宮虛冷投以辛熱之藥煎熬臟腑血氣沸騰禍不旋踵或服艾者不知艾性至熱入火炙則下行入藥服則上行多服則至毒咎將誰歸瘦怯婦人子宮乾澀宜滋養血脈四物湯加香附黃芩肥盛者乃軀脂滿溢閉塞子宮宜行濕燥痰用半夏南星川芎滑石防風羌活之類次宜鼓動微陽如女金丹終斯丸大小烏雞丸百子附歸丸等男子求嗣男子或命門火衰陽事痿弱者法當壯陽如巨勝子丸壯陽丸或陽脫痿弱精清冷薄或來而不能直射子宮者宜還少丹五子衍宗丸等其或命火門火勝陽常堅舉法當滋陰宜補陰丸虎潛丸大造丸等若四旬已後縱有火動只宜小菟絲丸或天門冬膏不可擅用黃柏知母也
