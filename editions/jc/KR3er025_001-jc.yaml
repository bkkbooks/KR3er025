body:
  text: 卷之一運氣司天主運天氣始於甲地氣始於子天地相合則為甲子故甲子者干支之始也天氣終於癸地氣終於亥天地相合則為癸亥故癸亥者干支之末也陰陽相間剛柔相須是以甲子之後乙丑繼之壬戌之後癸亥繼之三十年為一紀六十年為一周有主運焉有客運焉有主氣焉有客氣焉主運主氣萬載而不易客運客氣每歲而迭遷自天干兄弟次序言之甲乙東方木也丙丁南方火也戊己中央土也庚辛西方金也壬癸北方水也故木為初之運火為第二運土為第三運金為第四運水為第五運此主運也詩曰大寒木運始行初清明前三火運居芒種後十土運是立秋後六金運推立冬後九水運伏周而復始萬年好客運自其夫婦之配言之甲與己合而化土乙與庚合而化金丙與辛合而化水丁與壬合而化木戊與癸合而化火故甲己之歲土運統之乙庚之歲金運統之丙辛之歲水運統之丁壬之歲木運統之戊癸之歲火運統之此客運也詩曰甲己化土乙庚金丁壬之歲木成林丙辛化水戊癸火逐年客運細推尋甲己之歲正月建丙寅丙火生土故為土運餘四運仿此假如甲己年甲為土運初之運即土也天之五運於以明土生金二之運即金也金生水三之運即水也水生木四運之即木也木生火五之運即火也每一運各主七十二日零五刻此天干在上為陽所以主乎運也主氣又以地支循環次序言之寅卯屬春術也己午屬夏火也辰戌丑未屬四季土也申酉屬秋金也六氣於以明亥子屬冬水也故風為初之氣火為二之氣暑為三之氣濕為四之氣燥為五之氣寒為終之氣此主氣也詩曰大寒厥陰氣之初春分君火二之隅小滿少陽分三氣大暑太陰四相呼秋分陽明五位是小雪太陽六之餘客氣自其對衝之定位言之子對午而為少陰君火醜對未而為太陰濕土寅對申而為少陽相火卯對酉而為陽明燥金辰對戌而為太陽寒水巳對亥而為厥陰風木故子午之歲君火主之丑未之歲濕土主之寅申之歲相火主之卯酉之歲燥金主之辰戌之歲寒水主之巳亥之歲風木主之此客氣也詩曰子午少陰君火天陽明燥金應在泉丑未太陰濕土上太陽寒水雨綿綿寅申少陽相火旺厥陰風木地中聯卯酉卻與子午友辰戌巳亥例皆然司天少陽陽明太陽厥陰厥少太是陰少陽太是陽指太陰少陰上為司天下為在泉掌少陰太陰右左為間氣圖厥陰太陽陽明少陽主歲者為司天位當三之氣司天之下相對者為在泉位當終之氣司天之左為天之左間司天之右為天之右間在泉之左為地之左間在泉之右為地之右間順行客運之行也甲丙戊庚壬五陽干為太過太寒前十三日交名先天乙丁己辛癸五陰乾為不及大寒後十三日交名後天平氣之年大寒日交名齊天正司化令之實對司化正化寅午未酉戌亥對化子醜卯辰巳申疊見曰盛者病相剋曰衰者病以子臨父曰不當位者病以父臨子曰相得謂平氣客勝主則從主勝客則逆司天管上半年在泉管下半年天符歲運與司天相合故曰天符如丁巳年丁壬化木木運巳亥之年厥陰風木司天歲值運氣與地支年辰相值故曰值歲如丁卯年丁壬化木木運地支寅卯為木三合司天運氣地支三者俱會故曰三合如己丑年甲己化土土運丑未年太陰濕土司天地支丑年屬土五天歌木蒼危室柳鬼宿火丹牛女壁奎旁土黅心尾軫角度金素亢氐昂畢前水玄張翌婁胃是下為運氣上經天三氣歌敷和發生委和木升明赫曦伏明火審平堅成從革金備化敦阜卑監土靜順流衍涸流水平氣太過不及數甲太宮乙少商丙太羽丁少角戊太徵己少宮庚太商辛少羽壬太角癸少徵甲丙戊庚壬為陽屬太太者為有餘乙丁己辛癸為陰屬少少者為不及南北政甲己土運為南政蓋土居中央君遵南面而行乙庚丙辛丁壬戊癸四運為北政以臣事之而北面受令所別也南政子午兩寸沉丑未己亥左右尋左右寸卯酉兩尺寅申左左尺辰戌右尺真分明北政陽明卯酉沉兩寸太陽辰戌少陽寅申左寸應少陰子午兩尺厥陰己亥左左尺太陰丑未右尺何須問十二經手足所屬心手少陰包厥陰太陰屬肺手之經小腸太陽三焦少大腸卻是手陽明腎足少陰肝足厥太陰脾土就中分太陽膀胱少陽膽陽明屬胃足經行十二經氣血多少心腎三焦膽肺脾氣多血少是根基小腸膀胱肝包絡血多氣少定無疑惟有陽明大腸胃氣血俱多兩不虧十二經絡本旨中焦肺脈起之中出手大指之端沖大腸即手起次指上行環口交鼻里胃經源又下鼻交出足大指之端饒脾脈就足指端上注於心中少陰向心經中之入掌循手內端出小指行小腸從手小指起上斜絡於目內眥膀胱經就目內生至足小指外側窮腎脈動於小指下起注胸中過腹胯心包出處又屬胸循手小指次指終三焦向手次指側環走耳前目銳息膽家接生目銳傍走足大指三毛間足肝就起三毛際注入胸中循不已十二經形象輕重肺者相傅之官治節出焉其形四垂附著於眷之第三柱中有二十四空行列分布以行諸藏之氣為藏之長為心之蓋是經常多氣少血其合皮也其榮毛也開竅於鼻難經曰肺重三斤三兩六葉兩耳主藏魄肺管九節大腸者傳導之官變化出焉迴腸當臍左十六曲大四寸徑一寸寸之少半長一尺二寸受谷一斗水七升半廣腸傳脊以受迴腸乃出滓穢之路大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一是經多氣多血難經曰大腸重二斤十二兩肛門重十二兩大腸上口即小腸下口胃者水穀氣血之海也胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿是經多氣多血難經曰胃重二斤一兩胃之上口名曰賁門飲食之精氣從此上輸於脾肺宣播於諸脈胃之下口即小腸上口名曰幽門脾者倉廩之官五味出也形如刀鐮與胃同膜而附其上之左俞當十一柱下聞聲則動動則磨胃而主運化其合肉也其榮唇也開竅於口是經常多氣少血難經曰脾重二斤三兩廣扁心者君主之官神明出焉心居肺管之下膈膜之上附著脊之第五柱是經常多氣少血其合脈也其榮色也開竅於耳又曰舌難經曰心重十二兩中有七孔三毛盛精汁三合主藏神小腸者受盛之官化物出焉小腸後附於脊前附於臍上左回疊積十六曲大二寸半徑八分分之少半長二丈二尺受谷二斗四升水六升三合合之大半小腸上口在臍上二寸近脊水穀由此而入腹下一寸外附於臍為水分穴當小腸下口至是而泌別清濁水液滲入膀胱滓穢流入大腸是經常多血少氣難經曰小腸重二斤十兩小腸上口即胃之下口小腸下口即大腸上口名曰闌門膀胱者州都之官津液藏焉氣化則能出焉膀胱當十九柱居腎之下大腸之前有下口無上口當臍上一寸水分穴處為小腸下口乃膀胱之際水液由此別迴腸隨氣泌滲而入其出其入皆由氣化入氣不化則水歸大腸而為泄瀉出氣不化則秘塞下竅而為癃腫後世諸書有言其有上口無下口有言上下俱有口者皆非是經常多血少氣難經曰膀胱重九兩二錢縱廣九寸盛溺九升九合口廣二寸半下聯前陰溺之所出腎者作強之官伎巧出焉腎附於脊之十四柱下是經常少血多氣其合骨也其榮發也開竅於二陰難經曰腎有兩枚重一斤二兩主藏相與志又曰腎者精神之舍性命之根心包一臟難經言其無形滑伯仁曰心包一名手心主以藏象校之在心下橫膜之上堅膜之下其與橫膜相黏而橫脂里者心也脂漫之外有細筋膜如絲與心肺相連者心包也此說為是凡言無形者非三焦者決瀆之官水道出焉是經常少血多氣三焦者統上中下而言故曰三切近於臟腑故曰焦膽者中正之官決斷出焉難經曰膽在肝之短葉間重三兩三銖長二寸盛精汁三合是經常多血少氣主藏而不泄肝者將軍之官謀慮出焉肝居膈下上著脊之九柱下是經常多血少氣其合筋也其榮爪也主藏魂開竅於目其繫上絡心肺下亦無竅難經曰肝重二斤四兩左三葉右四葉凡七葉又曰肝生於左經論總抄三才天地人也天者輕清而上浮也地者重濁而下凝也陽之精者為日東昇而西墜也陰之精者為月夜見而晝隱也天不足西北故西北方陰也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也天氣下降地氣上升也陰中有陽陽中有陰也平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也故人亦應之天地者萬物之上下也陰陽者血氣之男女也左右者陰陽之道路也水火者陰陽之徵兆也金木者生成之始終也玄氣凝空水始生也赤氣炫空火始生也蒼氣浮空木始生也素氣橫空金始生也黃氣際空土始生也天地絪縕萬物化醇男女媾精萬物化生人者得天地之正氣靈於萬物者也命者天之賦也精者身之本也形者生之舍也氣者生之元也神者生之制也心者君主之官神明出焉肺者相傅之官治節出焉膽者中正之官決斷出焉膽中者臣使之官喜樂出焉肝者將軍之官謀慮出焉脾胃者倉稟之官五味出焉大腸者傳導之官變化出焉小腸者受盛之官化物出焉腎者作強之官伎巧出焉三焦者決瀆之官水道出焉膀胱者州都之官津液藏焉氣化則能出矣命門者精神之所舍也男子以藏精女子以系胞三陽者太陽陽明少陽也三陰者太陰少陰厥陰也陽明者兩陽合明也厥陰者兩陰交盡也手太陽小腸經也手陽明大腸經也手少陽三焦經也手太陰肺經也手少陰心經也手厥陰心包絡也足太陽膀胱經也足陽明胃經也足少陽膽經也足太陰脾經也足少陰腎經也足厥陰肝經也頭者諸陽之所會面者五臟六腑之榮鼻屬肺肺和則鼻知香臭矣目屬肝肝和則目辨黑白矣口屬脾脾和則口知五穀矣舌屬心心和則舌知五味矣耳屬腎腎和則耳聞五音矣頭者精神之府頭傾視深精神將脫矣背者胸中之府背曲肩垂府將壞矣腰者腎之府轉搖不能腎將憊矣骨者髓之府不能久立立則振掉骨將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣九竅者肝開竅於目心開竅於耳肺開竅於鼻脾開竅於口腎開竅丁二陰也發者屬心稟火氣也眉者屬肝稟木氣也須者屬腎稟水氣也咽者咽物納水穀接三脘以通胃也喉者候氣有九節通五臟以系肺也發者血之餘也神者氣之餘也爪者筋之餘也齒者骨之餘也魂者神明之輔弼也魄者精氣之匡佐也血為榮榮者水穀之精氣也氣為衛衛者水穀之悍氣也直行者為之經旁行者謂之絡也脈者天真委和之氣也三部寸關尺也九候浮中沉也五臟心肝脾肺腎也六腑膽胃大腸小腸膀胱三焦也左手寸口心與小腸之脈所出君火也左手關部肝與膽之脈所出風木也左手尺部腎與膀胱之脈所出寒水也右手寸口肺與大腸之脈所出燥金也右手關部脾與胃之脈所出濕土也右手尺部命門與三焦之脈所出相火也每部中各有浮中沉三候三而三之為九候也浮者主皮膚候表及腑也中者主肌肉以候胃氣也沉者主筋骨候里及臟也寸為陽為上部法天主心胸以上至頭之有病也關為陰陽之中為中部法人主膈以下至臍之有疾也尺為陰為下部法地主臍以下至足之有疾也四時之脈者弦鉤毛石也春脈弦肝東方木也夏脈鉤心南方火也秋脈毛肺西方金也冬脈石腎北方水也四季脈遲緩脾中央土也四時平脈六脈俱帶和緩也謂有胃氣有胃氣曰生無胃氣曰死五行者金木水火土也相生者謂金生水水生木木生火火生土土生金也相剋者謂金剋木木剋土土剋水水剋火火剋金也相生者吉相剋者死左手屬陽右手屬陰也關前為陽關後為陰也男子左手脈常大於左手者為順也女子右手脈常大於左手者為順也男子尺脈常弱寸脈常盛是其常也女子尺脈常盛寸脈常弱是其常也反者女得男脈男得女脈男得女脈為不及女得男脈為太過不及固病太過亦病所謂過猶不及也人迎者左手關前一分是也氣口者右手關前一分是也人迎以候天之六氣風寒暑濕燥火之外感也氣口以候人之七情喜怒憂思悲恐驚之內傷也人迎脈緊盛大於氣口一倍屬表為陽為腑也氣口脈緊盛大於人迎一倍屬裡為陰為臟也屬表為外感風寒屬裡為內傷飲食人迎氣口俱緊感為夾食傷寒為內傷挾外感也男子久病氣口充於人迎者有胃氣也女子久病人迎充於氣口者有胃氣也病雖重可治反者為逆也外因者六淫之邪也內因者七情之氣也不內外因者飲食勞倦跌僕也六脈浮沉遲數滑澀也浮者為陽在表為風為虛也沉者為陰在裡為濕為實也遲者為陰寒在臟也數者為陽熱在腑也滑者血多氣少也澀者氣滯血枯也八要者表里虛實寒熱邪正也表者病不在裡也里者病不在表也虛者五虛也實者五實也寒者臟腑積冷也熱者臟腑積熱也邪者外邪相干也正者臟腑自病也七表者浮芤滑實弦緊洪也八里者微沉緩澀遲伏濡弱也九道者長短虛促結代牢動細也七死者雀啄屋漏彈石解索魚翔蝦游釜沸也奇經八脈者陽維陰維陽躋陰躋衝脈任脈督脈帶脈也人病脈不病名曰內虛脈病人不病名曰行屍也五運諸病者謂諸風掉眩皆屬於肝木諸病癢瘡瘍皆屬於心火諸濕腫滿皆屬於脾土諸氣膹郁皆屬於肺金諸寒收引皆屬於腎水也六氣為病者謂諸暴強直肢痛軟戾裡急緊縮皆屬於風厥陰風木之風乃肝膽之氣也諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻塞鼽衄血溢血泄淋閉身熱惡寒戰慄驚惑悲笑譫妄衄衊血汙皆屬於熱少陰君火之熱乃心與小腸之氣也諸痙強直積飲痞膈中滿霍亂吐下體重胕腫肉如泥按之不起皆屬於濕太陰濕土之土乃脾胃之氣也諸熱瞀瘛暴瘖冒昧躁擾狂越罵詈驚駭胕腫痠疼氣逆上衝禁慄如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注潤瘛暴病暴死皆屬於火於少陽相火之熱乃心包絡三焦之氣也諸澀枯涸幹勁皴揭皆屬於燥陽明燥金之金乃肺與大腸之氣也諸病上下所出水液澄澈清冷癥瘕㿗疝堅痞腹滿急痛下痢清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒太陽寒水之寒乃腎與膀胱之氣也亢則害承乃制者寒極則生熱熱極則生寒木極而似金火極而似水土極而似木金極而似火水極而似土也五虛者脈細皮寒氣少泄利前後飲食不入者漿粥入胃瀉止則生五實者脈盛皮熱腹脹前後不通瞀悶也大小便通利而得汗者生六慾者耳聽聲音眼觀邪色鼻聞香氣舌貪滋味心帷大地意幄萬方五勝者風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡泄也五惡者心惡熱肝惡風脾惡濕肺惡寒腎惡燥也六脫者脫氣脫血脫津脫液脫精脫神也五勞者久視傷血勞於心也久臥傷氣勞於肺也久坐傷肉勞於脾也久立傷骨勞於腎也久行傷筋勞於肝也心勞神損肺勞氣損脾勞食損肝勞血損腎勞精損六極者盡力謀慮勞傷乎肝應乎筋極曲運神機勞傷乎心應乎脈極意外過思勞傷乎脾應乎肉極預事而憂勞傷乎肺應乎氣極矜持志節勞傷乎腎應乎骨極此五勞應乎五極者也然精極者五臟六腑之氣衰形體皆極眼視無明齒焦發落體重耳聾行履不正邪氣逆於六腑厥於五臟故成精極也七傷者久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋房勞思慮傷心腎五臟受病者憂愁思慮則傷心形寒飲冷則傷肺恚怒氣逆則傷肝飲食勞倦則傷脾坐濕入水則傷腎也五損者一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑三損損於肌肉肌肉消瘦飲食不能為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床從上下者骨痿不能起於床者死從下上者皮聚而毛落者死然損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精也四時發病者春傷於風夏必殆泄夏傷於暑秋必痎瘧秋傷於濕冬必咳嗽冬傷於寒春必溫病凡病之始起也可刺而已其盛可待衰而已故因其輕而揚之因其重而減之形不足者溫之以氣精不足者補之以味在表者汗而發之在裡者下而奪之高者因而越之剽悍者按而收之臟寒虛脫者治以灸炳脈病攣痹者治以針刺血實蓄結腫熱者治以砭石氣滯痿厥寒熱者治以導引經絡不通病生於不仁者治以醪醴血氣凝結病生於筋脈者治以熨藥然又必先歲氣無伐天和能合色脈可以萬全化而裁之存乎變神而明之存乎人此先聖作之於前諸賢述之於後誠入門之階梯乃醫家之總領也望聞問切望色面上白點腹中蟲積如蟹爪路一黃一白食積何疑兩顴時赤虛火上炎面無血色又無寒熱脈見沉弦將必衄血病人黃色時現光澤為有胃氣自必不死乾紅少潤凶災立應赤現兩顴大如拇指病雖小愈必將卒死黑色出庭拇指相似不病卒死冬月面慘傷寒已至紫濁時病色白而肥氣虛多痰黑而且瘦陰虛火旺形體大體為形形充者氣形勝氣者必主夭亡肥白而氣不足氣勝形者壽考之徵修長黑色有神氣實形實氣虛形虛形盛脈細氣難布息已瀕於危形瘦脈大胸中多氣可斷其死肥人中風形厚氣虛痰壅氣塞火沖暴厥瘦人陰虛血液衰少相火易亢故多勞嗽病人形脫氣盛者死正虛則形脫邪實則氣盛形體充大皮膚寬緩定遵耄耋形體充大皮膚緊急當為夭折形盛氣虛氣盛形虛形澀脈滑形大脈小形小脈大形長脈短形短脈長形滑脈澀肥人脈細羸人脈躁俱為凶候言反常也血實氣虛則體易肥氣實血虛則體易瘦肥者能寒能讀耐字瘦者能熱美髯及胸陽明有餘髯少而短陽明不足坐垂一腳因有腰痛行遲者痹或表素強或腰腿痛或有麻木漸成風疾裡實護腹如懷卯物心痛之證持脈而欠知其無病經云陽引而上陰引而下則欠陰陽相引故云無病病亦即愈息搖肩者心中堅急息引胸中上氣者咳息而張口必乃短氣肺痿吐沫掌寒腹寒掌熱陰虛診時病人叉手捫心閉目不言心虛怔忡倉稟不藏門戶不約水泉不止膀胱不藏頭傾視深精神將奪背曲肩隨腑將壞矣腰難轉搖腎將憊矣膝為筋府屈伸不能行則僂俯筋將憊矣骨為髓府不能久立行則振掉骨將憊矣眼胞十指腫必久咳聞聲肝呼應用心言應徵脾歌應宮肺哭應商腎呻應羽五藏五聲以合五音大笑不止乃為心病喘氣太息乃為肺病怒而罵詈乃為肝病氣不足息乃為脾病欲言不言語輕多畏乃為腎病前輕後重壯厲有力乃為外感倦不欲言聲怯而低內傷不足攢眉呻吟必苦頭痛叫喊呻吟以手捫心為中脘痛呻吟身重轉即作楚乃為腰痛呻吟搖頭攢眉捫腮乃為齒痛呻吟不起乃為腳痛診時呼氣為屬鬱結凡人籲則氣鬱得以少申搖頭而言乃為里痛喉中有聲謂之肺鳴火來乘金不得其平形羸聲啞咽中有瘡肺被火囚肺主聲音故耳聲音暴啞風痰伏火曾系喊傷不可斷病聲嘶色敗久病不治氣促喉聲痰火哮喘中年聲濁痰火之殃獨言獨語言談無緒思神他奇思慮傷神傷寒壞症啞為狐惑上唇有瘡蟲食其臟下唇有瘡蟲積食其肛風滯於氣機關不利出言蹇澀乃為風病氣短不續言止復言乃為奪氣衣被不斂罵詈親疏神明之亂瘋狂之類若在熱病又不必論欲言復寂忽又驚呼病深入骨聲音低沙聽不明徹必心膈間有所阻礙啾然細長頭中之病氣來短促不足以息呼吸難應乃為虛甚素無寒熱短氣難續知其為實吸而微數病在中焦實則可生虛者不治上焦吸促下焦吸遠上下暌違何以施療問證入國問俗何況治病本末之因瞭然胸臆然後投劑百無一失凡診病脈先問何人或男或女或老或幼或為僕妾寡婦師尼形之肥瘦次問得病起於何日飲食胃氣夢寐有無問其嗜欲以知其病好食某味病在某臟當分順逆以辨吉凶心喜熱者知其為寒心喜冷者知其為熱好靜惡動知其為虛煩躁不寧知其為實傷食惡食傷風惡風傷寒惡寒或常縱灑或久齋素始終境過須辨三常封居敗傷及欲侯土常貴後賤雖不中邪病從內生名曰脫營常富後貧名曰失精五氣流連病有並所常富大傷斬筋絕脈身體復行合澤不息故傷敗結留薄歸陽膿積寒炅暴樂暴苦始樂後苦皆傷精氣精氣竭絕形亦尋敗暴怒傷陰暴喜傷陽厥氣上行滿脈去形形樂志苦病生於脈治以灸刺形樂志樂病生於肉治以針石形苦志樂病生於筋治以熨引形苦志苦病生咽嗌調以甘樂形數驚恐經絡不通病生不仁按摩醪藥起居何似曾有損傷曾服何藥便利何如有無脹悶性情常變一一詳明問病不答必系耳聾即當詢之是素聾否否則病久或經汗下過傷元氣問而懶答惟點頭者是中氣虛昏憒不知問是暴厥抑是久病婦女僵厥多是中氣須問怒否婦人諸病當問月水或前或後師尼寡婦氣血凝滯兩尺多滑不可言胎室女亦同心腹脹痛須問新舊產後須問坐草難易惡露多少飲食遲早生子存亡飲食失節若問病處按之而痛止者為虛按之而痛甚者為實痛而不易知為死血痛無定者知其為氣凡問百病晝而增劇夜則安靜氣病血否夜則增劇晝而安靜血病氣否晝熱夜靜陽氣獨旺入於陽分晝靜夜熱陽氣不陷入於陰中晝夜俱熱重陽無陰亟瀉其陽而補其陰晝夜俱寒重陰無陽亟瀉其陰而補其陽四肢作痛天陰轉甚必問以前患黴瘡否血脈診血脈者多赤多熱多青多痛多黑久痹赤黑青色皆見寒熱血脈即脈絡肌皮嫩薄者視之可見臂多青脈則曰脫血絡中血脫故不紅而多青毛髮發枯生穗血少火盛毛髮墮落衛疏有風若還眉墮風證難愈頭毛上逆久病必凶血枯不榮如枯草不柔順而動直小兒病多此亦主有蟲診病新久徵其脈小色不奪者乃為新病其脈不奪其色奪者乃為久病脈色多奪乃為久病俱不奪者乃為新病詐病向壁而臥聞醫驚起面目盼視二言三止脈之嚥唾此為詐病若脈和平當言此病須針須灸服吐下藥然後可愈欲以嚇其詐使彼畏懼不敢言病耳絕證屍臭舌卷囊縮肝絕口閉脾絕肌肉不滑唇反胃絕髮直齒枯遺尿腎絕毛焦面黑直視目瞑陰氣已絕眶陷系傾汗出如珠陽氣已絕病後喘瀉脾脈將絕目若正圓手撒戴眼太陽已絕聲如鼾睡吐沫面赤畫黑唇青人中腫滿唇反出外發眉衝起爪甲肉黑手掌無紋臍凸跗腫面青欲眠目視不見汗出如油肝絕之期在於八日眉傾瞻死手足甲青或漸脫落呼罵不休筋絕之期亦如於肝肩息直視心絕立死髮直如麻不得屈伸自汗不止小腸絕也六日而死口冷足腫腹熱膚脹泄利無時乃為脾絕五日而死脊病身重不可反復乃為胃絕五日而死耳干背腫溺血屎赤乃為肉絕九日而死口張氣出不能復返乃為肺絕三日而死泄利無度為大腸絕齒枯面黑目黃腰折自汗不休乃為腎絕四日而死齒黃枯落乃為骨絕五臟已奪神明不守故作聲嘶尋衣摸床譫語不休陽明已絕妄語錯亂不語失音則為熱病猶或可生脈浮而洪身汗如油喘而不休乃為肺絕肺膩不流脈洪而喘不休真氣外散陽火反獨留形如煙燻直視搖頭乃為心絕心為火臟故陽熱獨存煙燻火極焦灼之象唇吻反青漐漐汗出乃為肝絕唇吻屬脾而青色屬木木象土故曰反環口黧黑柔汗發黃乃為脾絕水色凌土冷汗身黃脾真散越溲便遺失狂言直視乃為腎絕溲便二陰腎臟所司遺失則門戶不閉水精敗絕目背瞳人陰氣先絕陽氣後竭臨死之時身面必赤腋溫心熱陰先脫陽絕於後故赤色見余陽未即盡故腋溫心熱水漿不下形體不仁乍靜乍亂乃為胃絕胃納水穀合水肉故六腑氣絕足冷腳縮五臟氣絕便利不禁手足不仁手太陰絕則皮毛焦丙日篤丁日死手少陰氣絕則面色黑如黧壬日篤癸日死足太陰絕口唇不榮甲日篤乙日死足少陰絕則骨髓枯戊日篤己日死足厥陰絕筋縮引卵漸入於舌庚日篤辛日死三陰俱絕眩轉矇目六陽俱絕陰陽相離腠理泄絕汗出如珠旦占夕死夕占旦死切脈脈有要訣胃神根三者而已人與天地相參脈必應乎四時而四時之中均以胃氣為本如春弦夏洪秋毛冬石而其中必兼有和緩悠揚之意此為胃氣謂之平人若弦多胃少曰肝病洪多胃少曰心病毛多胃少曰肺病石多胃少曰腎病如但見弦洪毛石而胃氣無一者則危矣凡診脈之要有胃氣曰生胃氣少曰病胃氣盡曰不治乃一定之診法自古良工莫易也夫胃氣全虧則大可危胃氣稍存猶為可治即當於中候求其神氣中候者浮中沉之中也如六數七極熱也中候有力則有神矣三遲二敗寒也中候有力則有神矣脈之有神則清之而熱即退溫之而寒即除若熱寒偏勝中候不復有神清溫之品將何所恃耶雖然神氣不足猶當察其根氣根氣者沉候應指是也三部九候以沉分為本而兩尺又為根中之根也脈訣云寸關雖無尺猶未絕如此之流何憂殞滅歷試之洵非虛語夫尺之有脈如樹之有根枝葉雖枯根蒂未壞則生意不息是以診脈之法必求其根以為斷而總其要領實不出胃神根三者而已如或胃神根三者稍有差忒則病脈斯見其偏於陽則浮芤滑實洪數長大緊革牢動疾促以應之其偏於陰則沉遲虛細微澀短小弦濡伏弱結代散以應之惟有緩脈一息四至號曰平和不得斷為病脈耳其他二十九字皆為病脈必細察其形象而知其所主其曰浮不沉也主病在表沉不浮也主病在裡遲一息三至也為寒數一息五至也為熱滑往來流利也為痰為飲澀往來滯澀也為血少氣凝虛不實也為勞倦實不虛也為邪實洪大而有力也為積熱大虛而無力也為體弱微細而隱也小細而顯也為氣少弦端直之象也為飲長過乎本位也為氣旰短不及本位也為氣少緊如引繩轉索也為寒為痛弱微細之甚也為血氣兩虧澀沉而細也為真火不足動如豆粒動搖之象也為氣血不續伏脈不出也為寒氣凝結又或因痛極而致促數時一止也為熱甚結緩時一止也為寒盛芤旁有中無也為失血代動而中止有至數也亦為氣血不續又為跌打悶亂以及有妊數月之兆革浮而堅急也為精血虧少牢沉而堅硬也為胃氣不足疾數之甚也為極熱散渙而不聚也為衛氣散漫惟有緩者和之至也為無病其所主病大略如此如或數脈相參而互見則合而斷之以知其病至於脈有真假有隱伏有反關有怪脈均宜一一推求不可混淆何謂真假如熱症脈澀細寒症反鼓指之類何謂隱伏如中寒腹痛脈不出又外感風寒將有正汗脈亦不出書曰一手無脈曰單伏兩手無脈曰雙伏何謂反關正取無脈反在關骨之上或見於左或見於右診法不可造次何謂怪脈兩手之脈如出二人乍大乍小遲數不等此為祟症又有老少之脈不同地土方宜不同人之長短肥瘦不同診法隨時而斟酌然而脈症相應者常也脈症不相應者變也知其常而通其變診家之要庶不相遠矣然總其要領總不出胃神根三者三者無虧則為平人若有乖違則病見矣若或全失則危殆矣必須胃神根三者俱得乃為指下禎祥之兆絕脈一曰雀啄連連轉指忽然止絕少頃復來如雀啄食肝絕也一曰魚翔本不動而末強搖似有似無如魚之翔心絕也一曰屋漏如屋殘漏下半時一滴胃絕也一曰解索指下散亂乍數乍疏如索之解脾絕也一曰蝦游浮於指下始則冉冉不動少焉而去久之忽然一躍進退難尋如蝦之遊大腸絕也一曰釜沸浮於指下有出無入無復止數如釜湯沸肺絕也一曰彈石沉於筋間劈劈急硬如指彈石腎絕也凡此七脈一見皆主胃氣消亡臟元已竭死無時矣入門看病訣凡看症之法先辨內傷外感次辨表裡得其大概然後切脈問症與我心中符合斯用藥無有不當口鼻之氣可以察內傷外感身體動靜可以觀表裡口鼻者氣之門戶也外感則為邪氣有餘邪有餘則口鼻之氣粗疾出疾入內傷則為正氣虛弱正氣虛則口鼻之氣微徐出徐入此決內外之大法也動靜者表裡之分也凡發熱靜而默默者此邪在表也若動而躁及譫語者此邪在裡也而里症之中復有陰陽之分凡病人臥須看其向里向外睡仰睡覆睡伸腳蜷腳睡向里者陰也向外者陽也仰者多熱覆者多寒伸腳者為熱蜷腳者為寒又觀其能受衣被與否其人若衣被全覆手腳不露身必惡寒既惡寒非表症即直中矣若揭去衣被揚手露足身必惡熱既惡熱邪必入腑矣此以身體動靜並占其寒熱也然又有陽極似陰女人衣被全覆昏昏而睡復有陰極似陽假渴煩躁欲坐臥泥水中此乃真熱假寒真寒假熱之象尤不可不辨色內經曰脈以應月色以應日色者視之易見者也如傷風關庭必光澤傷寒關庭必暗晦面青黑為寒為直中陰症紫赤為熱為傳經里症若已發汗後面赤色盛此表邪出不徹也當重表之又陰盛格陽閤面赤色是為載陽之後宜急溫之以通陽氣大抵黑色見者多凶為病最重黃色見者多吉病雖重可治經云面黃目青面黃目赤面黃目白面黃目黑者皆吉蓋黃屬土今惡症雖見土猶未絕故可救若面青目赤面赤目白面青目黑面黑目白面赤目青皆難治也言無土色則胃氣已絕凡天庭額上印堂年壽等處黑色枯槁者凶黃色明潤者吉然人有五色不能齊等經云五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼壁之澤不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如黑漆色不欲如地蒼五色之欲者皆取其潤澤五色之不欲者皆惡枯槁色也經云又五色精微象見矣其壽不久也言五色固不宜枯槁若五色之精華盡發越於外而中無所蓄亦非宜也大抵五色之中須以明潤為主也而明潤之中須有蘊蓄若一概發華於外亦凶兆也察色之妙不過是矣鼻經云五色決於明堂明堂者鼻也故鼻頭色青者腹中痛微黑者有痰飲黃色者為濕熱白色者為氣虛赤色者為肺熱明亮者為無病也若傷寒鼻孔乾燥者乃邪熱在陽明肌肉之中久之必將衄血也病人慾嚏而不能者寒也鼻塞濁涕者風熱也鼻息鼾睡者風溫也鼻孔乾燥黑如煙煤者陽毒熱深也鼻孔出冷氣滑而黑者陰毒冷極也凡病中鼻黑如煤乃大凶之兆若見鼻孔煽張為肺氣將絕之症也凡產婦鼻起黑氣或鼻衄者為胃敗肺絕之危候古方用二陳參蘇飲加附子以救之多有得生者唇口唇者肌肉之本脾之華也故視其唇之色澤可以知病之深淺乾而焦者為邪在肌肉焦而紅者吉焦而黑者凶唇口俱赤腫者肌肉熱甚也唇口俱青黑者冷極也口苦者膽熱也口甜者脾熱也口燥咽乾者腎熱也口噤難言者或為痙為痰厥為中寒不相等也又狐惑症上唇有瘡為狐蟲食其臟下唇有瘡為惑蟲食其肛也若病中見唇舌卷唇吻反青環口黧黑口張氣直或如魚口或氣出不返或口唇顫搖不止皆難治也耳耳者腎之竅察耳之枯潤知腎之強弱故耳輪紅潤者生枯槁者難治薄而白薄而黑薄而青或焦如炭色者皆為腎敗若耳聾及耳中痛皆屬少陽膽此邪在半表半裡當和解之若耳聾舌卷唇青此症屬厥陰為最重也目目者五臟精華之所注能照物者腎水之精也熱則昏暗水足則明察秋毫如常而瞭然者邪未傳裡也若赤若黃邪已入里矣若昏暗不明乃邪熱在內消灼腎水腎水枯竭故目不能朗照急用大承氣湯下之蓋寒則目清未有寒甚而目不見者也凡開目欲見人者陽症也閉目不欲見人者陰症也目瞑者將衄血也目睛黃者將發黃也至於目反上視橫目斜視瞪目直視及眼胞忽然陷下者為五臟已絕之症也凡雜病忽然雙目不明者此氣脫也經云氣脫者目不明此氣虛也丹溪用人參膏主之經又云脫陰者目瞀此血脫也邪熱則下之血虛則補之以救腎水也然此症已為危險之候舌舌者心之竅凡傷寒症津液如常此邪在表而未傳裡也見白苔而滑邪在少陽半表半裡之間也見黃胎而乾燥邪已入里胃腑熱甚也宜急下之見黑苔芒刺破裂乾枯邪熱盛極腎水枯涸至重之候也宜急下之若舌黑津潤不破裂乾燥此直中寒症也宜急溫之夫寒症舌黑本色也而熱症反赤為黃反黃為黑者何也蓋熱極反兼水化若燔柴燃火變成炭至危之候也凡舌腫脹或重舌木舌舌生芒刺舌胎黃燥皆熱甚也凡舌硬舌強舌短縮舌卷神氣昏亂語言不清者皆危症也又陰陽易病吐舌數寸者危惡已甚也身大抵病人身輕自能轉側者為輕若身體沉重不能轉側者為重然中濕風濕感寒皆主身重疼痛須以兼症辨之若陰症身重必厥冷而踡臥無熱惡寒閉目不欲嚮明懶見人也又陰毒身痛如被杖身重如山而不能轉側者大抵熱則流通身輕無痛寒則凝塞故身重而痛也若手足抽搐角弓反張者痙也若頭重視身此天柱骨倒而元氣敗也若頭搖不止髮直如妝頭上攛皆絕症也凡病中尋衣摸床兩手撮空此神去而魂亂也凡病人皮膚潤澤者生枯槁者危若大肉盡脫九候雖調猶難治也胸凡看傷寒欲知邪之傳與不傳先看目舌次問病人胸前痛脹否若不痛滿知邪氣在表若脹滿未經下者即半表半裡症也已下過而痛甚者恐成結胸也故胸者可以知邪之傳與不傳也腹腹者至陰也乃里症之中可以辨邪之實與不實也既問胸前明白次則以手按其腹若未痛脹者知邪未入里也入里必脹痛若邪在表及半表半裡腹焉得脹痛乎若腹脹不減及里痛不止此里症之實方可攻之若腹脹時減痛則綿綿此里症猶為實也但可清之故腹者可以知邪之實與不實也若直中腹痛則不由陽經傳來此為冷氣在內脈必沉遲急當溫之小腹小腹者陰中之陰里症之裡可以知邪之必結實也既問胸腹後以手按其小腹蓋小腹藏糟粕之處邪至此必結實若小腹未硬痛者知非裡實也若邪已入里小腹必硬痛硬痛而小便自利大便黑色蓄血症也宜桃仁承氣攻之若小腹繞臍硬痛小便數而短者燥糞症也當以大承氣攻之若小腹脹滿大便如常恐屬溺澀而不通宜利其小腹凡看病先觀形色次及耳目口鼻唇舌身體次問胸腹及小腹則病形病情瞭然矣歲次辛巳民國卅年臘月除夕日錄於南沙筍里
