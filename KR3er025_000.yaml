front:
  text: 序醫小道也聖人戒人之無恆謂小道如巫醫不可以無恆也注家詁巫醫為二或曰巫古之始為醫者孟子曰巫匠亦然巫亦謂醫不曰醫者猶甲之為函也後莫賤於匠乃以醫配之聖賢下視藝術如此夫以堯舜周公孔子之道覘所能則屬辭文亦不過為小技況其下者乎然世之舍道而執藝也久矣於藝之中存君子之心者於醫為近故司馬溫公言人生不得為良相必為良醫醫人與相相配豈欲熇孔孟之説哉以為與其無益於人而為庸相不若有益於人而為良醫也元丹溪先生以理學上承徽國而名乃以醫著前明王肯堂以士人夫而著證治準繩一書世咸奉之遂目肯堂為醫人是豈他小道比哉扁鵲云越人非能生死人也此自當生者越人能起之耳術而精能使當生者生不精反令可生者死可弗慎歟古之神醫無事於書後世庸醫廢書不觀更有執其偏見如張景嶽謂人盡虛寒近某著人參不可餌論猖狂恣睢眩惑愚者是何異王安石之亂天下也吾友朱君南珍去儒業醫勤苦學問常手録前人祕本索餘一再序之今又有一見能醫之著皆其讀書有得採掇精華不為好奇立異世苟能誦習伏膺何患術之不精哉是所望於有恆者時乾隆三十四年姤月十一日葉鳳毛題序讀書之法廣稽博考參互錯綜兩不可缺中人之姿強識既難貫通非易安望能兼況岐黃之道死生攸寄其於古人方論資乎善記善悟更非儒書比而世之習醫者往往以舉業不就退而從事則質性已半屬中下平時既鮮博考之功臨症又乏明辨之識費人之誚初非過也余讀書三十年竊苦姿性庸鈍過目易忘少所觸類因就耳目所及於古今名家辨論手抄卷匯積成是編類列病形瞭如掌上之螺詳分治法判若水中之犀俾得指下分明胸中有主雖初學之士見之亦可依類而求按書而治名之曰一見能醫付之梨棗亦聊為未能廣稽博考參互錯綜者開一捷徑云爾時乾隆己丑春王月南邑石筍里朱時進南珍氏題于振秀草
