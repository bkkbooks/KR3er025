body:
  text: 卷之九病因賦類方卷上四因門方四君子湯治一切陽虛氣弱脾衰肺損飲食少思體瘦面黃皮聚毛落脈來細軟人參白朮土炒茯苓各二錢甘草一錢加薑棗四物湯治一切血虛及婦人經病當歸生地各三錢芍藥二錢川芎一錢半二陳湯治一切痰飲為病咳嗽脹滿嘔吐噁心頭眩心悸熟半夏二錢陳皮去白茯苓各一錢甘草錢半生薑越鞠丸統治六郁胸膈痞悶吞酸嘔吐飲食不消香附炒醋蒼朮泔浸炒川芎神麯炒梔子炒等分曲糊為丸補中益氣湯治煩勞內傷身熱心煩頭痛惡寒懶言惡食脈洪大而虛或喘或渴或陽虛自汗或氣虛不能攝血或癯痢脾虛久久不能愈一切清陽下陷中氣不足之症黃耆蜜炙一錢半人參甘草炙各一錢白朮土炒陳皮當歸一錢半升麻三分柴胡三分薑三片棗二個六味地黃丸治肝腎不足真陰虧損精血枯竭憔悴羸弱腰痛足酸自汗盜汗水泛為痰發熱咳嗽頭暈目眩耳鳴耳聾遺精便血消渴淋瀝失血失音舌燥喉痛虛火牙疼足跟作痛下部瘡癢等症地黃砂仁酒拌九蒸九曬八兩山萸肉酒潤山藥各四兩白茯苓乳拌丹皮澤瀉各三兩上蜜丸空心鹽湯送下各酒下本方煎服名六味地黃湯治同本方加附子肉桂各一兩名桂附八味丸治相火不足虛羸少氣王冰所謂益火之源以消陰翳也尺脈弱者宜之本方加黃柏知母各二兩名知柏八味丸治陰虛火動骨痿髓枯王冰所謂壯水之主以制陽光也尺脈旺者宜之六君子湯治氣虛有痰脾虛膨脹即四君子湯內加陳皮半夏逍遙散治血虛肝燥骨蒸勞熱咳嗽潮熱往來寒熱口乾便澀月經不調柴胡三分當歸酒拌一錢半白朮土炒二錢茯苓一錢甘草炙一錢半加煨薑薄荷本方加丹皮梔子名八味逍遙散治怒氣傷肝血少目暗香蘇飲治四時感冒頭痛發熱或兼內傷胸膈滿悶噯氣惡食香附炒紫蘇各二錢陳皮去白一錢甘草一錢半加薑蔥平胃散治脾有停濕痰飲痞膈宿食不消滿悶嘔瀉山嵐瘴霧不服水土蒼朮泔浸二錢厚朴薑炒陳皮去白甘草炙一錢半加薑棗手拈散治血瘀心痛延胡索五靈脂沒藥草果等分為末每服三錢熱酒調下失笑散治婦人心痛氣刺不可忍或死血腹痛五靈淨好蒲黃等分為末每服二錢用醋一勺熬成膏再入水一盞煎七分服滾痰丸治實熱老痰怪症百出青礞石一兩沉香五錢大黃酒蒸黃芩八兩上將礞石打碎用焰硝一兩同入瓦罐鹽泥固濟曬乾火煅石色如金為度研末和諸藥水丸量人虛實服之薑湯送下服後仰臥令藥在胸膈之間除逐上焦痰滯不宜飲水行動神佑丸治一切水濕痰飲如神甘遂芫花大戟俱醋炙各一兩大黃二兩黑醜頭末四兩青皮陳皮木香檳榔各五錢輕粉一錢半為細末水丸椒目大空心服五丸日三服痞悶者多服反煩滿宜初服二丸每服加二丸快利為度大承氣湯治傷寒陽明腑症陽邪入里胃實不大便發熱譫語自汗出不惡寒痞滿燥實堅全見雜病三焦大熱脈沉實者大黃酒洗四兩芒硝三合厚朴八兩枳實五枚先煎朴實將熱納大黃煮二三沸傾碗內和芒硝服得利即止此方除芒硝名小承氣湯除枳朴加甘草名調胃承氣湯傷寒門方麻黃湯治傷寒太陽症邪氣在表發熱頭痛身痛腰痛骨節痛項背強惡寒惡風無汗而喘脈浮而緊麻黃去節三兩桂枝二兩杏仁去皮尖七十枚炙甘草一兩先煮麻黃數沸去沫納諸藥煎熱服復取微汗中病即止不必盡劑無汗再服桂枝湯治太陽中風陽浮而陰弱發熱頭痛自汗惡風惡寒鼻鳴乾嘔桂枝芍藥生薑三兩炙甘草三兩大棗十二枚熱服須少啜稀粥以助藥溫復取微汗不可令如水淋漓汗出病瘥停後服葛根湯治太陽病項背𠘧𠘧無汗惡熱葛根四兩麻黃生薑三兩大棗十二枚桂枝芍藥甘草炙二兩大青龍湯治太陽中風脈浮緊身疼痛發熱惡寒不汗出而煩躁麻黃六兩桂枝甘草各二兩石膏一塊杏仁四十枚生薑三兩大棗十二枚先煮麻黃去沫納諸藥煎五苓散通治諸濕腹滿水飲水腫嘔逆泄瀉水寒射肺或喘或咳中暑煩渴身熱頭痛膀胱積熱便祕而渴霍亂吐瀉痰飲濕瘧身痛身重豬苓茯苓白朮炒十八銖肉桂一兩半澤瀉一兩六錢半為末每服三錢服後多飲熱水汗出而愈升麻葛根湯治陽明傷寒中風頭痛身痛發熱惡寒無汗口渴目痛鼻乾不得臥及陽明發斑欲出不出寒暄不時人多瘟疫升麻三分葛根芍藥各二錢甘草一錢半加薑棗白虎湯通治陽明病脈洪大而長不惡寒反惡熱頭痛自汗口渴舌胎目痛鼻乾不臥心煩躁亂日晡潮熱或陽毒發斑胃熱諸病石膏一斤知母六兩甘草二兩粳米六合先煮石膏數十沸再煎藥米米熱湯成溫服小柴胡湯治傷寒中風少陽症往來寒熱胸脅痞滿默默不欲食心煩喜嘔或腹中痛或脅下痛或渴或咳或利或悸小便不利口苦耳聾脈弦或汗後餘熱不解及春月時嗽瘧發寒熱婦人傷寒熱入血室柴胡八兩半夏半斤人參甘草黃芩生薑三兩大棗十二枚桂枝大黃湯治表症誤下大實痛者即桂枝湯內加大黃理中湯治傷寒太陽病自利不渴寒多而嘔腹痛糞溏脈沉無力或厥冷拘急或結胸吐鰍及感寒霍亂人參炮薑炙草各一兩白朮土炒二兩每服四錢附子理中湯治中寒腹痛身痛四肢拘急即理中湯內加附子大柴胡湯治傷寒發熱汗出不解陽邪入里熱結在裡心下痞硬嘔而下利或往來寒熱煩渴譫妄腹滿便祕表證未除里證又急脈洪或沉實弦數者柴胡八兩半夏半斤黃芩芍藥三兩生薑五兩大棗十二枚枳實四枚大黃酒洗二兩調胃承氣湯治傷寒陽明症不惡寒反惡熱口渴便祕譫語腹痛中焦燥實及傷寒吐後腹脹滿者大黃酒浸芒硝一兩甘草炙一錢半少少溫服六一順氣湯治潮熱自汗發渴譫語狂妄斑黃腹滿便實即大承氣湯加柴胡黃芩甘草入鐵鏽水三匙開墜熱開結麻黃附子細辛湯治傷寒少陰症始得之反發熱脈沉者麻黃細辛二兩附子炮一枚先煮麻黃去沫納諸藥小承氣湯治傷寒陽明症譫語痞硬潮熱而喘及雜症上焦痞滿不通大黃四兩厚朴薑炒二兩枳實麩炒三枚桃仁承氣湯治傷寒外症不解熱結膀胱小腹脹滿大便黑小便利燥渴譫語蓄血發熱如狂及血瘀胃痛腹痛脅痛瘧疾寒熱夜發痢疾蓄血急痛桃仁去皮尖研五十枚大黃四兩芒硝甘草桂枝二兩小陷胸湯治傷寒誤下小結胸正在心下按之則痛脈浮滑及痰熱塞胸黃連一兩半夏半升瓜蔞大者一枚大陷胸湯治傷寒下之早表邪入里心下滿而硬痛或重汗而復下之不大便五六日舌上燥竭日晡潮熱從心至小腹硬滿痛不可近或無大熱但頭微汗出脈沉為水結胸大黃二兩芒硝一升甘遂為末一錢先煮大黃去滓納芒硝煮一二沸納甘遂末溫服半夏瀉心湯治傷寒下之早胸滿而不痛者為痞身寒而嘔飲食不下非柴胡症半夏八兩黃連兩黃芩甘草人參乾薑三兩大棗十二枚附子瀉心湯治傷寒心下痞而復惡寒汗出者大黃一兩黃連黃芩一兩附子一枚生薑瀉心湯治汗解後胃中不和心下痞硬乾噫食入完穀不化脅下有水氣腹中雷鳴下利即半夏瀉心湯內加生薑四兩茵陳蒿湯治傷寒陽明病但頭汗出腹滿口渴二便不利濕熱發黃脈沉實者茵陳六兩大黃酒浸二兩梔子炒十四枚人參白虎湯治傷寒渴欲飲水無表症者即白虎湯內加參三兩黃連解毒湯治一切火熱表裡俱盛狂躁煩心口燥咽乾火熱乾嘔錯語不眠吐血衄血熱甚發狂黃連黃芩黃柏梔子等分石膏散治勞熱骨蒸四肢瘦有汗脈長者石膏研細每夕新汲水服方寸匕取熱退為度梔子豉湯治傷寒汗吐下後虛煩不眠劇者反復顛倒心下懊憹及大下後身熱不退心下結痛或痰在膈中梔子十四枚淡豉四合服令微吐溫膽湯治膽虛痰熱不眠虛煩驚悸口苦嘔涎陳皮去白半夏薑製茯神枳實炒甘草竹茹薑棗五積散治少陰傷寒及外感風寒內傷生冷身熱無汗頭痛身疼頃皆拘急胸滿惡食嘔吐腹痛寒熱往來腳氣腫痛冷閉寒痛寒瘧惡寒無汗婦人經水不調蒼朮七分陳皮六分桔梗八分川芎八分當歸八分白芍八分麻黃四分枳殼炒七分桂心三分乾薑三分厚朴六分白芷六分半夏四分甘草二分茯苓八分四逆湯治三陰傷寒身痛腹痛下痢清穀惡寒不渴四肢厥冷或反不惡寒面赤煩躁裡寒外熱或乾嘔或咽痛脈沉微細欲絶附子生用一枚乾薑一兩甘草炙二兩冷服面赤者格陽於上也加蔥九莖以通陽溫疫門人參敗毒散治傷寒頭痛憎寒壯熱項強睛暗鼻塞聲重風痰咳嗽及時氣疫癘嵐瘴鬼瘧或聲如蛙鳴赤眠口瘡濕毒流注腳腫腮腫喉疼毒痢諸瘡斑疹人參羌活獨活柴胡前胡川芎枳殼桔梗茯苓一兩甘草一錢半每服一兩加薑三片薄荷少許藿香正氣散治外感風寒內傷飲食增寒壯熱頭痛嘔逆胸膈滿悶咳嗽氣喘及傷冷傷濕瘧痢中暑霍亂吐瀉凡感嵐瘴不正之氣者並宜增減用之藿香紫蘇白芷大腹皮各三兩茯苓二兩白朮土炒陳皮半夏曲厚朴薑汁炒桔梗各二兩甘草一兩每服一錢半加薑棗煎加木瓜傷食重者加消食藥內傷門補中益氣湯加減血不足加當歸精神短少加人參五味肺熱咳嗽去人參嗌乾加葛根頭痛加蔓荊子痛甚加川芎腦痛加藁本細辛風濕相搏一身盡痛加羌活防風有痰加半夏生薑胃寒氣滯加青皮蔻仁木香益智腹脹加枳實厚朴木香砂仁腹痛加白芍甘草熱痛加黃連能食而心下痞加黃連咽痛加桔梗有寒加肉桂濕勝加蒼朮陰火加黃柏知母陰虛去升柴加熟地山茱山藥大便祕加酒煨大黃咳嗽春加款冬旋覆花夏加麥冬五味秋加麻黃黃芩冬加不去根節麻黃天寒加乾薑泄瀉去當歸加茯苓蒼朮益智枳朮丸加味法白朮二兩枳實麩炒一兩為細末荷葉包飯燒取出杵爛和藥杵勻丸緑豆大每服五六十丸清米湯下此法一補一消取飲食緩化不令傷脾東垣加陳皮一兩名枳朮橘丸治老幼元氣衰弱飲食少進久服令人多食而不傷元氣素弱飲食難化食多即腹內不和痛疼泄瀉此虛寒也加人參白芍酒炒神麯炒麥芽炒各三兩縮砂木香一錢半素有痰火胸膈鬱塞咽酸噎氣及素有吞酸吐酸之症或有酒積熱瀉結痛此皆溫熱也加黃連薑汁炒白芍藥酒炒陳皮各一兩石膏生甘草各一錢半川芎四錢傷食飽悶痞塞不消加神麯麥芽山楂各二錢有食積痞塊在腹者再加黃連厚朴俱薑汁炒各一錢半堅積者再加莪朮醋煮昆布各三錢傷食不消腹痛溏泄加半夏薑製一兩縮砂炒乾薑炒神麯麥芽各三錢性多氣惱夾氣傷食氣滯不通加川芎香附炒各一兩木香黃連薑汁炒各三錢年高之人脾虛血燥易飽易飢大便燥難加白芍酒炒當歸酒洗各一兩人參七錢升麻甘草炙各一錢半山楂麥芽桃仁去皮尖研各一錢半此老人常服藥也醯可常服惟有此病可服吾思常服者其惟粥飯乎胸膈不利之人過服辛香燥熱之藥以致上焦受傷胃脘乾燥嘔吐噎膈反胃加黃連薑製山梔仁炒各一錢半白芍當歸各一兩桔梗甘草石膏一錢半胸膈頑痰膠結反大便燥閉再加芒硝一錢半飲食能進但食後反飽難化此為火旺脾陰虛也加白芍酒炒兩半人參七錢石膏一兩甘草一錢半黃連香附木香各一錢半若素有痰者加半夏橘紅白茯苓各一兩黃芩炒黃連薑汁炒各一錢半夫心者脾之母火能生土進食不止於和脾當以心藥入於胃脾藥中庶幾得之所以古人進食方劑多用益智也外感門參蘇飲治內外傷發熱頭痛嘔逆咳嗽痰塞中焦眩暈嘈煩傷風泄瀉及傷寒已汗發熱不止人參紫蘇乾葛前胡半夏茯苓七錢半陳皮去白甘草枳殼炒桔梗木香二錢每服一錢半加薑棗煎芎蘇飲治傷風寒外有發熱頭痛惡