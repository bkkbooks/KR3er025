昆布酒洗各三錢神麯炒四錢半夏曲二錢松羅茶三錢為細末每二錢熱酒調食後服日二次忌甘草魚雞五辛生冷化痰丸天門冬去心一兩黃芩酒炒一兩海粉另研一兩橘紅一兩桔梗五錢香附杵碎淡鹽水浸炒五錢連翹五錢青黛另研三錢芒硝三錢為細末煉蜜入生薑汁少許和藥杵勻丸如龍眼大噙化一丸或清嚼細咽之或為細丸如麥米大淡薑湯送下五六十丸此等老痰大率飲酒之人多有之酒氣上升為火肺與胃脘皆受火邪故鬱滯而成此方用天冬黃芩瀉肺火也海粉芒硝咸以軟堅也瓜蔞仁潤肺消痰香附開鬱降氣連翹開結降火皆不用辛熱之藥鬱症門六郁湯香附蒼朮神麯山梔連翹貝母枳殼陳皮川芎茯苓蘇梗甘草瘧疾門七棗湯附子大棗清脾飲治瘧疾脈來弦數或但熱不寒或熱多寒少口苦咽乾小便赤澀青皮厚朴薑製白朮炒黃芩草果八分柴胡茯苓半夏各一錢半甘草炙五分加生薑柴平湯治濕瘧身重即小柴胡湯合平胃散人參養胃湯治外感風寒內傷生冷胸膈停痰嵐瘴瘟疫或飲食傷脾發痰瘧即平胃散內加人參茯苓草果烏梅生薑痢疾門芍藥湯治下痢膿血稠黏腹痛後重芍藥一錢黃連五錢大黃三錢歸尾黃芩木香肉桂一錢半甘草炙三錢檳榔每服五錢濕六丸治白痢屬熱傷氣分乾薑能散濕熱之氣滑石六錢乾薑五分甘草一錢清六丸治赤痢屬熱傷血分紅曲能調六腑之血滑石六錢紅曲五分甘草一錢五效散治赤白痢疾裡急後重黃連四兩吳萸兩和炒枳殼炒二兩為細末每服三鈔空心黃酒送下真人養臟丸治瀉痢日久赤白已盡虛寒脫肛亦治下痢赤白臍腹疼日夜無度罌粟殼去蒂蜜炙三兩六錢訶子麵裹煨一兩二錢肉豆蔻麵裹煨五錢木香二兩四錢人參肉桂八錢白芍炒一兩六錢生甘草一兩八錢白朮炒當歸六錢每服四錢寒盛加附子一方無當歸痞滿門保和丸治食積停飲腹痛泄瀉痞滿吐酸積滯惡食食瘧下痢山楂三兩神麯炒黃芩半夏一兩陳皮萊蔔子炒連翹五錢曲糊丸麥芽湯下厄逆門丁香柿蒂湯治久病厄逆因於寒者丁香柿蒂二錢人參一錢生薑五片一方加陳皮半夏茯苓甘草良薑橘皮竹茹湯治久病虛羸嘔逆不已亦治吐痢後胃虛厄逆橘皮竹茹人參半夏甘草麥芽赤苓枇杷葉加薑棗木香調氣散丁香白豆蔻藿香檀香砂仁甘草鹽湯下咳嗽門雞鳴丸治咳嗽不止痰中帶血等症知母炒四錢杏仁去皮尖三錢人參五分阿膠四錢葶藶炒二分款冬花四分半夏薑炒三分甘草炙一錢馬兜鈴一錢陳皮去白一錢五味子四分麻黃蜜炒一錢共為末煉蜜丸如彈子大每服一丸烏梅湯下異功散即四君子湯加陳皮生脈散治熱傷元氣氣短倦怠口渴多汗肺虛而咳人參麥冬五分五味子七粒八珍湯治心肺虛損氣血兩虛即四物合四君子湯太平丸附治一切勞嗽天冬麥冬知母貝母款冬花杏仁去皮各一兩當歸一錢半蒲黃薄荷桔梗黃連生地京墨各一兩阿膠炒成珠一錢半為細末煉蜜丸彈子大每日辰成時先用薄荷煎湯漱口細嚼一丸津送下隨服消化丸一加蛤粉青黛五味子消化丸治勞嗽痰壅青礞石打碎如米大拌和焰硝炭火煅紅候冷如金色者佳枯礬各二錢枳實茯苓牙皂炙去弦制南星熟半夏橘紅各一錢枳殼炒一錢半薄荷一錢半為末神麯打糊丸緑豆大每服五六十丸薄荷湯漱口先用飴糖噙化捽送丸藥令仰臥徐徐咽下節齋咳嗽加減方論附杏仁茯苓各一錢橘紅七分五味桔梗炙甘草各五分春多上升之氣宜潤肺抑肝加川芎半夏芍藥各一錢麥冬黃芩知母各五分春若傷風致咳鼻流清涕宜辛涼解散加防風薄荷紫蘇炒黃芩麥冬各一錢夏多火熱炎上最宜清金降火加桑白皮知母黃芩麥冬石膏各一錢半秋多濕熱傷肺宜清熱瀉濕加蒼朮桑白各二錢防風黃芩炒山梔各一錢冬多風寒外感宜解表行痰加麻黃桂枝半夏生乾薑防風各一錢五分肺經素有熱者加酒炒黃芩知母各五分若發熱頭痛鼻塞聲重加藁本川芎柴胡前胡各一錢若有痰加半夏枳殼風痰加南星濕痰脾困少食加蒼朮白朮有痰而口燥咽乾勿用半夏南星宜加知母貝母瓜蔞仁黃芩炒若夏月熱痰或素熱有痰加黃芩黃連知母石膏上半日咳者胃中有火加貝母石膏黃連五更咳者同上黃昏咳者火浮於上不可正用寒涼之藥宜加五味子五倍子訶子皮斂而降之咳嗽已久肺氣虛宜滋氣補血加人參黃耆阿膠當歸生薑天門冬款冬花馬兜鈴酒芍藥之類肺熱喘咳去人參用沙參若午後咳者屬陰虛即勞嗽也宜補陰降火加川芎當歸芍藥熟地黃柏知母竹瀝薑汁天門冬瓜蔞仁貝母專補陰血若火鬱咳嗽者謂痰鬱火邪在中宜開鬱消痰用訶子皮便制香附瓜蔞仁半夏曲海石青黛黃芩為末蜜調為丸噙化仍服前補陰降火湯失治則成癆痰積食積作咳嗽者用香附瓜蔞仁貝母海石青黛半夏曲石膏山楂枳實薑炒黃連為末蜜調噙化勞嗽見血者加阿膠當歸白芍天冬知母貝母桑皮赤於前肺虛陰虛二條擇用大抵咳嗽見血多是肺受熱邪氣得熱而變為火火盛而陰血不得安寧從火上升故治宜瀉火滋陰忌用人參等甘溫補氣之藥然亦有氣虛而咳血者則宜用人參黃耆款冬等藥但此等症不多耳因咳而有痰者咳為重主治在肺因痰而致咳者痰為重主治在脾倘是食積成痰痰氣上升以致咳嗽者只治其痰消其積而痰自止不必用肺藥以治咳也臌脹門分消湯治中滿塞脹寒疝二便不通四肢厥逆食入反出腹中寒心下痞下虛陰躁奔騰不收川烏乾薑人參生薑黃連當歸澤瀉青皮麻黃畢澄茄柴胡二兩吳茱萸草蔻仁厚朴黃耆黃柏五分益智仁木香半夏茯苓升麻三分熱服胃苓湯治中暑傷濕停飲夾食腹痛泄瀉及口渴便祕即五苓散合平胃散柴苓湯治泄瀉發熱口渴瘧疾熱多寒少口燥心煩即小柴胡湯合五苓散分心氣飲桂枝三分甘草三分赤苓三錢桑皮三錢紫蘇一錢半半夏一錢半青皮一錢半陳皮一錢半腹皮三錢羌活一錢半赤芍一錢半木通一錢半生薑三錢大棗三枚流氣飲治心胸痞滿膨脹嘔吐面目四肢浮腫二便祕塞及憂思太過鬱結成痰又治腳氣腫痛上喘作脹大便不通及氣攻肩背胸脅走注疼痛蘇葉一錢半青皮一錢半當歸二錢芍藥一錢半烏藥一錢半茯苓三錢桔梗一錢半半夏一錢半川芎一錢黃耆三錢枳實各一錢甘草三分陳皮一錢半大腹皮三錢木香八分檳榔一錢半防風二錢枳殼各五分生薑棗子煎加味五皮飲治水腫腰以下腫者五加皮地骨皮生薑皮大腹皮茯苓皮薑黃木瓜等分長流水煎服調經散治敗血化為水腫者沒藥另研一錢琥珀另研一錢桂心赤芍當歸各一錢細辛麝香另研五分為末每服一錢薑汁溫酒重便和勻服大抵服退宜用白朮膏調理脾胃最妙五皮飲治水病腫滿上氣喘急腰以下腫五加皮一易陳皮一易桑皮地骨皮茯苓皮大腹皮生薑皮噎膈門安心調氣丸治噎膈反胃通用之藥噎膈病血液燥胃脘干難服丸藥宜作膏子藥服之陳皮鹽水炒二兩半夏薑汁炒二兩白朮土炒二兩枳朮炒二兩茯苓炒一兩蘇子炒二錢川芎炒五錢當歸炒五錢白芍酒炒八錢鹽白豆蔻五錢萊蔔子炒二錢神麯炒一兩木香一錢甘草三錢香附流水浸陰乾三兩上為細末薑汁竹瀝打神麯糊為丸緑豆大服八十丸白湯下九伯餅噎膈仙方出證治匯補喘急門瓜蔞枳實湯治痰喘蘇子降氣湯治虛陽上攻氣不升降上盛下虛痰涎壅盛喘嗽嘔血或大便不利蘇子一錢半半夏一錢半前胡一錢半厚朴一錢半橘紅一錢半當歸二錢甘草三分肉桂五分加薑一方無桂加沉香三分清肺飲治痰濕氣逆而咳嗽杏仁三錢半貝母三錢茯苓三錢桔梗一錢甘草三分五味子五分橘紅五分加薑煎滋陰降火湯治陰虛有火即四物湯內加知柏玄參五虎湯痰哮用之如神但為劫劑不宜久服虛人自汗禁用麻黃三分杏仁三錢石膏三錢甘草三分桑皮三錢細辛三分生薑三片元武散椒目研極細末薑湯調下二錢未效再服俟喘止後分痰分火治之積聚門潰堅湯枳實一錢半半夏一錢半陳皮一錢半當歸二錢白朮三錢香附三錢厚朴一錢半山楂三錢砂仁八分木香八分潰堅丸依本方加海石瓦楞子鱉甲各為細辛將阿魏用醋煮化和煎藥末薑汁糊丸桐子大每服六十丸酒下琥珀膏大黃朴硝各兩為末用大蒜搗膏貼三聖膏用未化石灰半斤為末新尾上微炒紅提出候熱稍減入大黃末一兩炒熱仍提出入桂心五錢略炒以米熬成膏厚攤烘熱貼壬午民國三十一年四月初一抄
