body:
  text: 卷之四辨症下似損非損辨有外邪初感不為解散而誤作內傷治之以致寒邪鬱伏久留不散而為寒熱往來或為潮熱咳嗽其證全似勞損若用滋陰等劑愈以留邪熱蒸既久非損成損矣法當詳察表裡而審其致病之由蓋虛損之證必有所因而外感之邪其來必速或身有疼痛而微汗則熱退無汗則復熱或見大聲咳嗽脈雖弦緊而不甚數或見和緩等症則雖病至一二月而有邪不解病終不退者本無勞損毋誤治也若寒熱往來不止者宜柴胡飲柴胡飲人參黃芩生薑紅棗大黃當歸芍藥兼咳嗽者柴陳煎脾腎虛而兼咳嗽者金水六君煎有勞熱骨蒸四肢微瘦有汗脈長者有汗胃實也脈長陽明病也用石膏研細每夕新汲水服方七寸取熱退為度蓋石膏大寒質重能入里降火味辛氣輕能透表解肌雖寒而甘能緩脾益氣火勞有實熱者非此不為功有婦人虛勞發熱盜汗咳嗽痰喘面紅經閉不通而六脈有力用滋陰百補累投無效者以大黃用酒九蒸九曬血竭沒藥各五錢為末水丸桐子大每服七十丸四物湯加紅花湯下不三四服經水通而前症悉愈有童男少女孀婦師尼思想不得氣結於中血留於內阻住經脈關要之地氣血不得流通精神無以生長氣阻則積陽為熱而骨蒸血阻則積陰為寒而倦怠初起宜逍遙散合地黃丸久則舊血不去新血不生氣澀血枯變為肌膚甲錯面目黧黑咳嗽困倦遍身黃腫月事不行宜消其瘀血神應丸主之此仲景大黃䗪蟲丸百勞丸二方變化而來百勞丸乳香沒藥大黃虻蟲水蛭桃仁人參當歸世人遇五勞羸瘦用滋陰而不見效每坐以待斃烏足以知仲景妙用哉但大肉已脫大便自利者又當禁用有閨女天癸己來而復止旭羸發熱已成怯弱乾血勞症也用白鴿子一隻去肝腸淨入血竭一年者一兩二年者二兩三年者三兩以針線縫住用無灰酒煮數沸令病人吃之瘀血即消如心中慌亂者食白煮肉一塊即止又方用母羊腹中小羊煅灰服三錢酒下至重者不過三服最凶者最易愈又用經霜後小絲瓜連皮子火煅存性研末陳白酒面共研末和白熟酒送下只此一服天癸即通真仙方也治虛損之症吃緊處功夫只在保護脾胃為上如和解攻裡二法義之所當用者雖老弱久病亦所不避乃撥亂反正之意惟在用捨得宜有先攻而後補者有先補而後攻者謂攻補並行者當攻則攻當補則補如丹溪治人久嗽吐紅發熱消瘦眾以為瘵脈弦數日輕夜重行倒倉法而愈次年生子滑伯仁治宋無逸病瘧瘠損氈粥難下咽者六十餘日殆甚脈數關下尤弦疾久體瘠而神完是積熱居脾且滯於飲食法當下眾疑而難之藥再進而疾去其半繼以甘露飲白虎湯而安觀此乃當攻則攻也縱久病瘦弱法有所不避也丹溪治一人咳嗽惡寒胸痞口乾心微疼脈浮緊而數左大於右蓋表盛裡虛問其素嗜酒肉有積後因行房涉寒冒雨忍飢繼以飽食先以人參四錢麻黃連根節一錢半與二三帖嗽止寒除改用厚朴青皮陳皮瓜蔞半夏為丸參湯下二十服而痞除汪石山治一人年弱冠房勞後忽洒洒惡寒自汗發熱頭背胃脘皆痛唇赤舌強嘔吐眼胞青色午後譫語發熱小便長初日脈皆細弱而數次日脈浮而數醫以手按臍下痛議欲下之石山曰此疫也疫兼兩感內傷重外感輕耳臍下痛者腎水虧若用利藥是殺之也古人曰疫有補有降有散茲宜合補降之法以清暑益氣湯除蒼朮澤瀉加地黃而安此當補則補也夫業醫者膽欲大而心欲小毅然獨斷於裡病所當瀉則須瀉之幸無曰虛弱者何敢算險經曰有故無損亦無損也設務姑息而一味調補是務此猶南宋議和之說豈知邪正不兩立王業不偏安然不伐賊王業亦亡坐而待亡熟若伐之古人以醫譬國豈徒語哉內傷分辨東垣有內傷外感之辨而內傷者立補中益氣湯後人混同施治殊不知補中益氣湯在勞力元氣下陷者可也若內傷醉飽者內有參耆未免有實實之患至精血不足而用升提之劑則下元愈提而愈虧豈為良法如勞力所傷血氣之病也百節疼痛腿足酸倦無氣以動亦無氣以言此內傷元氣治宜補中益氣湯飲食所傷脾胃之病也蓋脾主運化傷則所運皆難而中氣脹滿飲食不思見食則惡或食下作痛四肢倦怠口多粗氣其脈右關緊盛治以導濕寬中可也宜用二陳加厚朴香附之劑若肉食傷加山楂麵食傷加麥芽米食傷加神麯生冷傷加吳茱萸魚蟹傷加乾薑形寒飲冷傷加蒼朮厚朴酒食傷加乾薑山楂房勞所傷精血之病也傷精則脈數傷血則脈虛其症精神困倦飲食無味頭暈腰疼小腹急痛治以滋陰養血添精補髓之劑宜用四物湯加參朮麥冬五味牛膝枸杞之類又有醉飽行房脾腎之所傷也傷脾則中脘作痛傷腎則小腹急脹小腹不利亦宜補中益氣湯加山楂厚朴有房勞之後繼以勞力或勞力之後加以行房是則傷精傷氣之症也傷精則精神不守傷氣則四肢不舉宜十全大補湯加酸棗五味有醉飽勞力者以勞傷脾氣之症也脾主運化勞傷元氣則健運難而中氣脹滿氣息喘嗽宜以健脾為主行氣次之治用二陳楂樸白朮當歸之類有勞傷元氣加以醉飽房勞此傷其真元中氣下陷虧損脾土運化不行致令相火攻入大小二便欲出不出欲利不利急墜作痛無從上下治宜升提之劑如補中益氣加黃柏之類有墜車落馬打僕悶錯血凝氣滯積於臍腹久則面黃肌瘦而痛亦內傷症也其症血肉筋骨受病不在氣分專從血論宜用和傷活血湯山甲炒研歸尾紅花蘇木生地靈仙茄皮各二錢川芎滴乳香沒藥花粉各五分甘草三分桃仁打碎四十九粒血竭二分大黃五錢水酒各一碗煎服虛中有實辨如年高久病氣血兩虛若兼內有所積外有所感補之不應也一傷寒熱病後元氣雖虛補之必復熱若多食食後尤宜消導一瘧後痢後中氣脾元未復飲食易傷風寒易襲最宜細察一產後發熱血虛者多若兼惡露不行腹有塊痛其熱血也滯無疑若兼胸腹滿悶咽酸噁心其熱也停食無疑若不用行瘀消導而概施補血之品其能愈乎一小兒痘後惟當補益倘兼他病亦宜察風食而調治之蓋表虛則風易入脾虛則食易傷也實中有虛辨如病人現在頭疼體痛身形拘急惡寒發熱無汗此表實也宜汗之若其人或吐衄下血或夢遺滑精或小便淋漓或大便瀉利或內傷勞倦或房勞陰虛或動氣瘡痛或胎前產後或熱入血室或口燥咽乾或尺脈微弱俱不可汗汗之則自汗亡陽而變為肉瞤筋惕等症一病人現在發熱潮熱煩渴譫語腹脹便瞞大便五六日不通此裡實也宜下之若其人內傷勞倦或房勞陰虛或氣血兩虛或胎前崩漏或經水適來適斷或小便清白或手足逆冷或臍有動氣或腹痛按減或六脈無力或小兒痛後慢驚或傷寒惡寒及表症在者俱不可下下之則自利亡陰而變為逆冷昏沉等症一病人現在胸滿鬱郁微煩或食在胃口或喉中有痰或胸中懊憹或寸口脈滑皆病在膈上也宜吐之若其人老弱氣衰或吐衄崩漏或勞倦內傷或好怒喜淫或胎前產後或熱入血室俱不可吐吐之則自吐不止而變為呃逆喘急厥逆等症又如胸腹脹滿實也若其平素少食或不思食或右關微細或脹滿手揉則軟或不噯氣作酸惡食俱屬脾虛不運化如胸脅腹中諸痛實也若其人勞倦內傷或奔走太過或房勞陰虛皆為氣虛不得歸元面赤煩躁實也若足冷脈沉無力自利則為陽虛陰極發煩躁之症上病治下辨凡病頭痛目痛耳紅腮腫咽喉腫痛一切上焦等症除清涼發散正治外更有三法大便結脈沉實者用酒蒸大黃三錢加入湯中微下之名釜底抽薪之法大便如常脈無力用牛膝車前引下之名引火歸原之法如大便瀉泄脈沉足冷者宜六味地黃丸加牛膝車前肉桂足冷甚者加熟附子是冷極於下而迫其浮火上升也名導龍入海之法若不知此不免頭痛醫頭之謂也下病治上辨凡治下焦病用本病藥不愈者須從上治之如足痛足腫無力虛軟臁瘡紅腫用木瓜米仁牛膝防己黃柏蒼朮之品不愈者定是中氣下陷濕熱下流用補中益氣升提之若足軟能食而不能行名曰痿症宜清肺熱如治泄瀉用實脾利水之劑不效亦用升提補中益氣去當歸加蒼朮炮姜脈遲再加故紙肉蔻如治下痢日數行寸口脈滑者宜吐之如治溺血用涼血利水不效宜清心蓮子飲清心復不止宜加升麻柴胡如治大便下血用地榆側柏槐花棕灰蒲黃荊芥血餘阿膠等件不效者若兼泄瀉再診其脈如右關微細或數大無力是脾虛不能攝血宜用六君子加炮姜若右關沉緊是飲食傷脾不能攝血沉香末子甚驗若右寸洪數大便如常是實熱在肺熱主流通傳於大腸宜清肺熱用麥冬花粉元參枯芩桔梗五味枳殼之類如小便閉用五苓車前瞿麥不效者須加清肺藥桑皮桔梗玄參之類脈虛口渴者用生肌散加燈心木通之類經云氣化則能出矣若上部脈滑有痰是痰壅於上如玉漏之上竅塞而下竅閉也宜用二陳四君煎大劑頓服鵝翎探吐之夾食辨以下論傷寒凡傷寒寒痰溫病熱病多有夾食之症四五日脈來滑數胸前熱甚者宿食發熱也調中飲加減若脈沉滑雖寒食內結其人胃氣不虛尚可溫中消散若夾食而氣口反澀滯伏結或始雖浮大而按之漸虛小其症反身熱足冷或腹痛或頭疼但胸膈滿悶時或煩躁者必其元氣素虛堅硬之物固結中宮胃中陽氣不得不通故但足冷而手不冷也五積散去取之頭痛者陽邪上郁也甘草乾薑湯加蔥豉以通其陽腹痛者陰氣下結也枳實理中湯加熟附子以通其陰若曾峻利消導以致自利厥逆痞滿不除者桂枝人參湯若誤下而實邪內陷愈加脹滿壯熱不止者小陷胸合枳實理中若過汗傷血小便秘澀枳實理中加歸芍或真武湯加當歸陰虛之人傷寒與傷食皆難用藥若陰虛傷寒兼傷食者為不治之候所以古人從無治法予曾以小建中用肉桂酒製生芍內以溫其中厚朴汁制甘草內以散其滯更加枳桔砂仁以行其氣熱除後以六味丸去熟地加砂仁沉香調理自安復有中氣虛者更兼感冒停食則以補中益氣用桂枝酒製黃耆內以行其滯枳實汁制生白朮內以消其滿熱服微汗為度惟氣口脈大而按之澀滯或浮取小澀而久按愈覺有力大便五六日不行臍下按之痛者此為大腹氣鬱而脈澀以大承氣下之凡傷寒夾食既久痰飲固結有屢用承氣不效者黃龍湯主之黃龍湯芒硝枳實大黃厚朴當歸甘草生薑大棗人參桔梗內有人參助胃以祛宿垢也溫熱時痰夾食無論表裡症見日數多少並宜涼膈散加消導藥傷寒夾食十常四五或先傷食而後感寒或先受寒而後傷食或病勢稍減而強與飲食重複發熱甚至譫語躁狂舌短目瞪變症百出況復醫者不審病之表裡先後標本虛實或先當解表而反兼治其里或當急治本而反先治其標橫行逆施多致不救可不慎歟至於食積不化症類傷寒外症亦發熱惡寒但頭不痛為異且氣口脈必不和而惡寒吞酸噯氣腹滿欲吐不吐嘔逆痞悶見此症者即當以調中飲治之外感勢盛者調中湯治之夾痰辨夾痰者津液之所化也風傷於肺濕傷於脾肺氣不清脾氣凝濁而成風寒夾痰則寸口浮滑發熱頭痛咳嗽自汗宜金沸草散及芎蘇散金沸草散金沸草前胡細辛半夏荊芥甘草赤苓生薑紅棗溫病熱病夾痰則關脈滑盛痞悶聲鼾宜涼膈雙解內傷氣虛夾痰則氣口脈滑而濡咳吐涎飲宜二陳湯加生白朮虛人六君加香砂蓋白朮熟則補脾膩膈生則豁痰散血燥濕利水世人所不知者凡人中脘有停痰留飲亦令增寒發熱惡風自汗喘咳胸膈痞悶氣衝咽喉不得息有似傷寒但身不疼項不強為異若涎多者亦隱隱頭痛清痰亦隱隱腹痛然止發不以其時目睛微寒眼胞上下如煤炭色是也其脈左手和平右關濡滑或寸口伏匿俱宜小柴胡去參加茯苓橘皮或二陳湯隨症上下加引經藥要以分尋出路為主至於痰迷心竅如祟者與傷寒陽明發狂相似口中時吐涎沫胸腹按之不痛辨之宜加味導痰湯加減氣上衝胸脈滑而遲者為痰伏膈上宜瓜蒂散虛人只用稀涎散探吐之曾見外感夾痰症脈不甚浮不宜大發其汗激動其痰則嘔不能食宜於理氣中合解散之劑如香蘇正氣散之類氣順則痰化矣夾水辨夾水者長沙之方論具在何世無用之者蓋此水即肺之液也風寒傷人皮毛肺先受之肺為金主生水肺既受傷不能行其水液至腎遂停留心下為咳為喘及乾嘔發熱等症故以小青龍發散風寒並滌肺經停留之液必令作汗以泄之故方中用麻細以開發皮腠也始失其治乘所不勝則傳少陽之分而變心下痞硬引脅下痛乾嘔短氣等症又取十棗湯以攻逐之若又失治木復傳土則漬入胃而成協熱利也若水在少陽部分不傳入胃遊溢經絡則藏腑不受其邪大熱得以差可惟腰以下重足脛浮腫小便不利者重則牡蠣澤瀉散輕則五苓加防己主之又少陰病腹痛小便不利四肢沉重疼痛自下利者此為有水氣或咳或嘔者真武湯主之此又腎虛不能制邪水也夾血辨夾血與蓄血不同其人素有內傷跌僕停經血瘕及暴怒傷肝皆有瘀積因傷寒溫痰等症發動痼疾謂之夾血必有痛處定而不移治宜察其部分消息微甚用藥又有跌僕打傷一時不覺過數日寒熱乃作有似傷寒脈當堅強最忌細澀脅痛少腹痛手足不安甚至昏迷不醒少頃復醒乃瘀血上衝所致也其人大便或秘或黑輕則香谷散重則代抵當丸或桃仁承氣加炮薑穿山甲最破瘀積寒熱更加柴胡當歸在經絡當歸活血湯在胃口犀角地黃湯加酒大黃若更兼寒食停滯中脘作痛者枳實理中湯重則加乾漆三分輕則加薑汁炒山楂肉又或脫衣鬥毆兼感風寒有表症者必先解表邪然後治血如欲發汗宜桂枝湯芎蘇散加歸附桂心甚則加延胡蓬朮不得行麻黃青龍等湯亦不得用寒涼止血之劑蓋血得熱則行得寒則凝瘀結不散必發熱如狂咳喘嘔逆若發汗太過誤觸瘀血則或嘔或泄或發呃逆但活血則嘔泄呃逆自止然既發熱則攻血藥中必加乾漆炒黃連非此化熱則血不得散也蓋嘔泄之血其色紅紫而散者可治色如敗衄而凝結成塊多兼血水此正氣已脫邪不能留也又或如汙泥而黏膩不斷臭穢異常者此津氣已敗與濁腐同下也夾氣辨又有奮力鬥毆之人脫衣露體觸犯風寒謂之夾氣傷寒今人但知用理氣藥不知兼有夾血夾食者其症惡寒發熱筋骨疼痛胸膈脹閉氣逆喘呼若其脈浮緊則輕劑發散兼理氣寬胸如局方香蘇散最宜有食則加枳樸痰加茯半感寒嗽則加羌桔傷熱嗽則加蘇薄頭痛加芎芷四時不正之氣加藿香甚則芎蘇散主之若脈弦緊或有伏結為積血在內當用破血利氣之藥如香谷散之類有食不妨用溫中消導如調中散正氣散之類若但恚怒傷氣只用小柴胡去參苓加橘枳若脅下痛為鬱怒傷肝當歸活血湯少腹急痛為有瘀血結聚桃仁承氣或代抵當湯又有暴怒抑鬱不得發泄形厥如屍不語如喑者宜用沉香降氣散若但鬱悶不得發泄之人偶感風寒或發伏氣或傷暑熱或兼內傷俱隨症施治但略兼開鬱理氣不行破血消導也夾陰辨房室不謹之後感冒風寒及恣意乘涼觸犯風露勞役傷精而病者謂之夾陰其症亦發熱頭痛胸膈痞悶若陰火上乘則面赤而足脛逆冷以其虛陽外發故發熱煩渴而躁亂不寧真陽不能下通於陰分故足不能熱而陽道痿縮也每見庸工治夾陰傷寒用小柴胡和之多致厥嘔噦呃而死者以不勝黃芩之陰寒也亦有見其足冷陽縮以四逆湯溫之多致煩躁血溢而死者以不勝附子之雄悍也秘旨云脈來尺中遲弱無力而足冷陽縮者於黃耆建中內用生附汁制黃耆以溫衛氣肉桂酒製白芍以調營血不應改用參制黃耆麻附細辛汁制甘草以汗之若尺中弦數而多虛大老書上火字面赤戴陽者於小建中內用參制甘草以助胃氣丹皮酒製白芍以降陰火不應加連附汁制黃耆及蔥豉以攝之蓋陰虛之人雖犯表邪發熱其中必夾陰象所以尺脈必不能實足脛必不能溫用藥最為扼腕較陽虛之可用溫補迥乎不侔也至於溫病熱病之夾陰紅膏湯治之雖長沙復生難於措手惟暴感風寒夾陰可用上法治之耳冒雨辨冒雨則寒濕之氣先從汗孔襲入背俞況雨氣通乎腎雖有發熱頭痛咳逆等症表藥中必先通少陰之經而兼開肺氣故細辛羌活在所必用所以首推神術湯主之又須隨時令寒暄元氣盛衰加減若冒雨而更加之以風則風濕相搏一身盡痛當與除風濕羌活湯或小建中去芍加耆朮羌防濕襲陽明而發熱者茯苓桂枝白朮甘草湯大抵此症雖大暑亦忌寒冷若嚴冬稍加麻附飢後則加白朮飽後則加橘半勞役傷氣而冒雨涉水發熱喘咳則以補中益氣加細辛炮姜若水寒之氣傷肺而喘咳不止者又以小青龍加減陽虛者去麻黃加附子白朮溺水辨溺水者忌熱酒火烘只宜溫暖覆蓋原其溺水之時必多驚恐心腎受傷雖有發熱頭痛骨節痛等症表藥中必兼通心腎冬月麻黃細辛湯或小青龍加生附子三五分蓋麻黃髮汗通心附子溫經通腎細辛通徹表裡之邪更宜稍加苓半以開豁驚痰若在夏月則忌麻附宜五苓散加硃砂熱服一半探吐取汗更服一半蓋驚則氣亂故宜去濕利水藥中加硃砂或脈浮而見表症多者柴苓湯各半和解之或五苓合羌活勝濕湯各半微汗之至於暴怒悲號投河躍井雖有表症當解須香蘇散加川芎木香烏藥理氣為要跌傷加當歸桃仁桂枝安有溺水而不驚不恐氣不受傷者但當取其所勝治之其有天時寒冷兼挾食冷傷脾與夫曾犯房室而遭風溺水及冒雨涉川傷腎而病身熱足冷者參夾陰例治之暴死辨按暴死者卒然而倒其因甚多如暴僕口噤吐涎身溫體暖脈虛者中風也二陳湯加天麻鉤藤如腹痛額黑手足收引脈來沉遲無氣以息中寒也理中四逆湯更灸關元有本於陰虛復遇暑途飢困勞役暴僕昏絕者此暑邪而犯神明之府生脈散人參麥冬五味加香薷如有痰聲者名曰痰厥此虛陽載痰上升也四君子加竹瀝薑汁切不可用二陳燥痰之劑如行止之間暴眩僕絕喉無痰聲身無邪熱者此陰虛而陽暴絕也獨參湯如暴怒卒倒身冷無涎汙者名曰氣厥六磨湯如食後著寒著氣而暴死者名曰食厥二陳湯探吐之小兒多有此症有大怒載血痰瘀於心胸而暴死者名曰血升宜逐老書上遂字瘀行血婦人產後經行偶著恚怒者有之如感臭穢瘴毒暴死者名曰中惡宜醋炭熏鼻候醒以藿香正氣散調之或探喪入廟或入無人之室或造天地壇場歸來暴絕面赤不語者名曰屍厥進藥即死宜移患人東首焚香北面禮拜更行醋炭熏鼻有傷寒新瘥與婦人交急犯小腹急痛外腎搐縮面黑喘急冷汗自出名曰脫元有因大吐大瀉後卒然四肢厥冷不省人事名曰脫陽俱宜急以蔥白緊縛切去兩頭先用一頭燒熱放臍上以熨斗熨之使熱氣入腹後以參附薑湯救之汗止喘急為可治遲則無及矣有男女交接而死者男子名走陽女子名脫陰男雖死陽事猶然不倒女雖死陰戶猶然不閉有夢中脫泄死者其陽必舉陰必泄屍容尚帶喜笑為可證也皆在不救鬼箭辨俗以遍身作痛呼為鬼箭夫鬼神無形烏能有箭所以然者其入衛氣空虛腠理不固賊風乘虛而入客於經絡榮衛不通則痛南人呼為鬼箭北人稱為羊毛疔就其痛處按之用針挑出形如羊毛故名南人亦就此毛為箭其實閉塞結硬之絡脈也若真以為箭為疔不亦冤乎世以治此者或挑以泄其氣或燃麻油燈以焠之或用艾葉溫散石灰炒熨或用白芥子調之外敷或用金銀花內服取效從無一定之方曾見挑時暫快過則依然甚至挑斷絡脈終成痿廢良可惜哉舌胎辨舌胎之名始於長沙以其邪氣結里若有所懷故謂之胎傷寒之邪在表則胎不生邪熱傳裡則苔漸生自白而黃黃而黑黑甚則燥裂矣要以滑潤而白者為表邪灰黑濕潤無苔為陰寒灰黑薄滑為夾冷食皆不可用寒涼攻下之品然中暑夾血多有中心黑潤者又不可拘於上說也若黃黑灰色而乾燥紋裂者為熱極萬無虛寒失血之理惟屢經汗下舌雖干而有微薄苔卻無燥裂芒刺此為津液耗亡不可誤認實熱而攻之紅為瘟熱紫為酒毒黴醬色為夾食藍為肝臟絕色舌本強硬為痰舌短囊不縮為宿食舌脹大滿口為龍火燔灼此最為急候即宜砭之舌深赤帶紫者為裡熱舌色淡白為裡寒舌枯萎者為心氣耗絕也白苔白苔者邪傷氣分肺主氣而色白又主皮毛故凡白苔猶帶表症仲景以為胸中有寒故正宜和解禁用攻下攻下必結痞變症不側若溫病熱病一發便壯熱昏憒躁渴舌正赤而有白滑苔即當用白虎和汗之時疫初起舌上白苔如積粉者達原飲解之若傷寒邪入胃腑則白苔中黃邪傳少陰則白中變黑若純色為一經症邊與中間兩色俱傳經症若從根至尖直分兩路者是合病與夾陰舌也合病則白中兼兩路黃夾陰則白中兼兩路黑潤及灰色也從根至尖橫分兩三截苔色者是並病舌也故尖白根黃尖白根黑及半邊苔滑者雖症類不同皆為半表半裡白苔多而滑黃黑苔少者表症多也尚宜和解黃黑胎多而白苔少或生芒刺黑點乾燥者里症多也必下無疑或中心黃黑而滑潤邊白此為表症未盡傷寒則大柴胡兩解之溫熱時疫則白虎合承氣攻下之又傷寒壞病雖白而厚甚燥裂者此為邪耗津液宜小柴胡稍加芒硝微利之純白滑苔為胃虛寒飲結聚膈上之後每於十三四日過經致變不可泛視也一種白厚苔如煮熟色到底不變者必里夾寒物留滯不散致脈伏不出乃心脾氣絕肺氣受傷也慎不可下宜枳實理中湯熱甚合小陷胸主之至於能食自利而白苔滑者為藏結難治也黃連湯連理湯備息丸選用間有得主之黃苔黃苔者陽明腑實也黃濕而滑者為熱未盛結尚未定不可便攻攻之必初硬後溏也冬時宜守此例俟結定乃攻不得已大柴胡微利之若在夏月一見黃胎便宜攻下以其時伏陰在內多有下症裡急而苔不燥者不可泥也若黃而燥者為熱已盛峻下無疑黃而生芒刺黑點者為熱極黃不瓣裂者為胃液干下症猶急也諸黃苔皆為胃熱分緩急輕重而下之有種根黃而硬尖白而中不甚干亦不滑短縮不能伸出譫妄煩亂者此痰挾宿食佔據中宮也大承氣加生薑半夏主之有舌色青紫而苔卻黃厚甚則紋裂而但覺口燥舌仍不幹者此陰症夾食也脈或沉細而伏或虛大而澀按其心下或臍旁硬痛而時失氣者急宜大承氣另煎生附子佐大黃下之若脈虛大者黃龍湯下之熱極煩躁者更加生薑麥冬夏月尤宜若冬時陰症夾食而舌上黃苔不燥者宜附子理中湯合小承氣下之大抵舌有積苔雖陰象亦是虛中有實急當攻下無疑但下法與尋常不同耳又中宮有痰飲水血者舌多不燥不可因其不燥而延緩時日致誤也凡溫熱病稍見黃白苔無論燥潤即宜涼膈雙解時行疫癘稍見白苔即宜白虎達原若見黃黑無論乾溼大承調胃急奪無疑黑苔黑苔者少陰腎色也若五六日後熱傳少陰水乘火位無極之火不為水衰及兼水化如火過炭黑是也始因表症失汗致邪入里而傳少陰下之則愈然有屢下熱不減苔不退者此必宿食留滯於中宮也宜黃龍湯加炮薑黃連有誤用汗下太過津液枯竭而苔燥黑者此為壞症須量人虛實為治虛者其胎必薄而潤生脈合附子理中實者其苔必厚而干生脈合黃連解毒一則陰虛陽亢一則陽虛陰亢不可不審熱勢盛劇則黑苔上生芒刺及燥裂分隔瓣者須以青布蘸薄荷湯拭潤更以薑片刮去芒刺撅起隔瓣者看刺下瓣底色紅者可治急下之若俱黑者不治又黑胎腐爛者為心腎俱絕舌黑而捲縮者肝絕皆為不治舌黑及灰或黃而發疱生蟲腐爛雖為濕熱亦屬肝傷皆危候也又中間一路闊黑燥胎兩邊或黃或白者兩感舌也邊黃則調胃承氣邊白則大柴胡湯若中間一路黑滑薄胎兩邊白滑此表裡俱虛胃中雖有留結急宜附子湯溫之凡黑胎多凶黑而乾燥或芒刺瓣裂皆為實熱急下之黑薄濕潤或兼白滑者皆為陰寒急當溫經也一種中黑而枯或略有微刺色雖黑而無積苔舌形枯瘦而不甚赤症煩渴耳聾身熱不止大便五六日或十餘日不行腹不硬滿按之不痛神色不昏晝夜不得睡稍睡或呢喃一二句或帶笑或太息此津液枯血燥之候急用炙甘草湯或生料六味丸熟地換生地合生脈散加桂滋其化源庶或可生誤與承氣必死誤與四逆亦死凡舌苔半黃半黑或半黃半白或中燥邊滑或尖干根潤皆為傳並之邪寒熱不和之候大抵尖黑稍輕根黑至重黃黑宜大承氣兼白者宜涼膈散分緩急下之若全黑者為死現舌不治夏月熱病時火邪火內外燔灼苔黑易生猶可攻治冬月傷寒舌苔全黑決難救也然中暑誤認外感而加溫覆多致中黑邊極紅而潤脈必虛大急用白虎清之虛者人參竹葉如更誤認陰寒而與熱藥必致煩躁不救也夏月中暑多有黑舌黑而中乾者白虎無疑黑而滑潤或邊白者必夾寒食古法用大順散然不如理中合小陷胸之妙若直中少陰真寒始病不發熱舌心便黑非由白黃色變其舌雖黑而滑舌亦瘦小此真臟寒必厥冷自利嘔吐脈沉遲四逆附子輩急溫之稍緩則不治灰黑苔灰黑舌者足三陰互病如以青黃和入黑中則灰色也然有傳經直中之殊蓋傳經熱邪始自白苔而黃黃而灰黑或生芒刺黑點紋裂乾燥不拘在根在尖俱宜攻下泄熱有淡灰色中起深黑重暈者乃溫病熱毒急用涼膈雙解治之熱毒內傳一次見暈一重傳二三次見二三重也若三重者不治若真中三陰如病無燥氣便見灰色舌潤無苔更不變作別色者此必內夾寒食及冷痰水飲或蓄血如狂等症當隨症治之又有感冒夾食屢經汗下消導二便已通而舌上灰黑未退或濕潤或雖不濕亦不幹燥者不可因其濕而誤為寒妄投姜附亦不可因其不潤而誤與硝黃此因汗下過傷津液虛火上炎所致其脈必虛微少力治宜救陰為急雖無心悸脈伏宜炙甘草湯主之內有生地阿膠麻仁麥冬之甘潤可以滋陰潤燥蓋陽邪亢盛則用硝黃以救陰陰血枯涸則宜生地以滋陰可不辨乎紅色紅色者心之正色若紅極為溫熱之毒蘊於心胃及瘟疫熱毒內盛也若濕者不可便下解毒湯或白虎湯紅中有白苔者更感非時之寒也桂枝白虎湯紅中夾兩路灰色苔者溫熱而夾寒食也涼膈散加消導藥一二味紅中有黑苔者熱毒入少陰也大承氣合白虎湯紅極有黃黑芒刺者熱毒入腑也調胃承氣湯紅極有紫黑斑及遍身發斑者陽毒入心也人參白虎湯加犀角川黃連紅極而紋裂者燥熱入肝也大承氣加柴老書紫字芍甚則加芩連坑爛者濕熱入脾也小承氣加芩連半夏白疱者火氣燔灼也三黃石膏去麻黃紫瘡者火氣鬱伏也解毒湯紅星者心包火炎也涼膈散一種柔嫩如新生望之似潤而燥涸殆甚者為妄行汗下津液竭也多不治急宜生脈散合人參三白湯主之口痿不能動者肝絕舌忽瘦而長心絕並不治紫色紫色者酒後傷寒也世俗庸愚往往受寒不服湯藥用薑蔥酒發汗未當而酒毒藏於心包多有此症若純紫或中間略帶白苔而潤者葛根湯加石膏紫中有紅斑或紫而干黃紫而短縮俱涼膈散下之若全紫而干如煮熟肝者死肝絕也其症必厥冷脈必沉滑此陽極似陰也急以當歸四逆散老書湯字加酒大黃下之然多不救大抵深紫而赤者是陽熱酒毒宜苦寒解毒若淡紫而帶青滑者是直中腎肝陰症急以吳茱萸湯四逆湯溫之然亦有中心生薄青紫苔或略帶灰黑而不燥不濕下症復急者熱邪傷於血分也犀角地黃湯加酒大黃微利之黴醬色苔黴醬色苔者夾食傷寒也食填太陰郁遏不得發越久之盦而成醬色也其症腹滿時痛者桂枝湯加枳樸橘半痛甚加大黃因冷食不消加炮薑厚朴甚則調胃承氣湯加炮姜下之如胃氣絕脈代結唇吊齒燥下利者死藍苔藍苔者肝臟絕色也傷寒日久屢經汗下失於調理致胃氣傷極心火無氣脾土無依則肺金不生肝木無制侮於脾土故苔色如靛或兼身生藍斑乃心脾肺三臟氣絕於內也必死如微藍而不甚深或略見藍紋者為木受金傷藏氣未絕脈不沉澀而微弦者可治小柴胡加炮薑肉桂主之補遺產後辨舌者以心主血也經云少陰氣絕則血不行故舌紫黑者為血先死凡見黑舌要問曾食酸甜咸物否能染成黑色凡視舌色雖有成見必細審兼證及脈之虛實不爾恐有毫釐千里之謬壬午民國三十一年杏月未望日抄
