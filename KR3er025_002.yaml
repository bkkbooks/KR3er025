body:
  text: 卷之二醫門八法論病之源以內傷外感四字括之論病之情則以寒熱虛實表里陰陽八字統之而論治病之方則又以汗和下消吐清溫補八法盡之蓋一法之中八法備焉八法之中百法備焉病變雖多而法歸於一此豫數十年來心領神會歷試而不謬者盡見於八篇中矣學者誠熟讀而精思之於以救濟蒼生亦未必無小補云論汗法汗者散也經云邪在皮毛者汗而發之是也又云體若燔炭汗出而散是也然有當汗不汗之誤人者有不當汗而汗誤人者有當汗不可汗而妄汗之誤人者有當汗不可汗而又不可以不汗汗之不得其道以誤人者有當汗而汗之不中其經不辨其藥知發而不知斂以誤人者是不可以不審也何則風寒初客於人也頭痛發熱而惡寒鼻寒身重而體痛此皮毛受病法當汗之若失時不汗或汗不知法以致腠理閉塞營衛不通病邪深入流傳經絡者有之此當汗不汗之過也亦有頭痛發熱與傷寒同而其人倦怠無力鼻不塞身不重脈來虛弱此內傷元氣不足之症又有勞心好色真陰虧損內熱晡熱脈細數而無力者又有傷食病胸膈滿悶吞酸噯腐日晡漸熱氣口脈緊者又有寒痰厥逆濕淫腳氣內癰外癰瘀血凝積以及風溫濕溫中暑自汗諸症皆有寒熱與外感風寒似同而實異若誤汗之變症百出也所謂不當汗而汗者此也若夫症在外感應汗之例而其人臍之左右上下或有動氣則不可以汗經云動氣在右不可發汗汗則衄而渴心煩飲水即吐動氣在左不可發汗汗則頭眩汗不止筋惕肉瞤動氣在上不可發汗汗則氣上衝正在心中動氣在下不可發汗汗則無汗心大煩骨節疼目暈食入則吐舌不得舒又脈沉咽燥病已入里汗之則津液越出大便難而譫浯又少陰症但厥無汗而強發之則動血未知從何道出或從耳目或從口鼻出者此為下厥上竭為難治又少陰中寒不可發汗汗則厥逆蜷臥不能自溫也又寸脈弱者不可發汗汗則亡陽尺脈弱者不可發汗汗則亡陰也又諸亡血家不可汗汗則直視額上陷淋家不可汗汗則便血瘡家不可汗汗則痙又傷寒病在少陽不可汗汗則譫妄又壞病虛人及婦人經水適來者皆不可汗若妄汗之變症百出矣所謂當汗不可汗而妄汗誤人者此也夫病不可汗而又不可以不汗則將聽之乎是有道焉傷寒賦云動氣理中去白朮是即於理中湯理中湯人參白朮乾薑炙草去朮而加汗藥保元氣而除病氣也又熱邪入里而表未解者仲景有麻黃石膏之例有葛根黃芩黃連之例是清涼解表法也又太陽症脈沉細少陰症反發熱者有麻黃附子細辛之例是溫中解表法也又少陽中風用柴胡湯加桂枝小柴胡湯半夏人參甘草黃芩生薑大棗是和解中兼表法也又陽虛症東垣用補中湯加表藥補中益氣湯人參白朮當歸黃耆甘草陳皮升麻柴胡陰虛者丹溪用芎歸湯加表藥其法精且密矣總而言之凡一切陽虛者皆宜補中發汗一切陰虛者皆宜養陰發汗挾熱者皆清涼發汗挾寒者皆以溫經發汗傷食者則宜消導發汗感重而體實者汗之宜重麻黃湯桂枝杏仁甘草麻黃感輕而體虛者汗之宜輕香蘇散香附紫蘇陳皮甘草又東南之地不比西北隆冬開花少霜雪人稟常弱腠里空疏凡用汗藥只須對症不必過重豫常治傷寒初起專用香蘇散加荊防川芎秦艽蔓荊等藥一劑愈甚則兩服無有不安而麻黃峻劑數十年來不上兩餘可見土地不同用藥迥別其有陰虛陽虛挾寒挾熱兼食而為病者即按前法治之但師古人用藥之意而未曾盡泥其方隨時隨症酌量處治往往有驗此皆已試之成法而與炘世共白之所以拯災救患者莫此乎此此汗之之道也且三陽之病淺深不同治有次第假如症在太陽而發散陽明已隔一層病在太陽陽明而和解少陽則引賊入門矣假如病在二經而專治一經已遺一經病在三經而偏治一經即遺二經矣假如病在一經而兼治二經或兼治三經則邪過經矣況太陽無汗麻黃為最太陽有汗桂枝可先葛根專主陽明柴胡專主少陽皆的當不易之藥至於九味羌活乃兩感熱症九味羌活湯潔古解表道劑羌活防風細辛蒼朮白芷川芎黃芩生地甘草生薑蔥頭三陽三陰並治之法初非太陽一經故也又柴葛解肌湯柴葛解肌湯柴胡葛根芍藥黃芩白芷羌活生薑大棗石膏甘草桔梗乃治春溫夏熱之症自里連表其症不惡寒而口渴若新感風寒惡寒而口不渴者非所宜也又傷風自汗用桂枝湯桂枝湯仲景桂枝芍藥甘草生薑大棗傷暑自汗則不可用若誤用之熱邪愈盛而病必增劇若於暑症而妄行發散復傷津液名曰重暍多致不救古人設為白朮防風例以治風設益元散益元散滑石甘草硃砂香薷飲香薷飲香薷扁豆厚朴以治暑俾不犯三陽禁忌者良有以也又人知發汗退熱之法而不知斂汗退熱之法汗不出則散之汗出多則斂之斂也者非五味酸棗之謂其謂致病有因出汗有由治得其宜汗自斂耳譬如風傷衛自汗出者以桂枝湯和衛營祛風邪而汗自止若熱邪傳裡令人汗出者乃熱氣熏蒸如釜中炊煮水氣旁流非虛也急用白虎湯清之白虎湯仲景石膏知母甘草粳米若邪已結聚不大便者則用承氣湯下之大承氣湯芒硝枳實大黃厚朴熱氣退而汗自收矣此與傷暑自汗略同若暑傷氣為虛邪只有清補開行之一法寒傷營為實邪則清熱之外更有攻下止汗之法也復有發散太過遂致汗多亡陽身瞤動欲僻地者宜用真武湯真武湯仲景茯苓白朮芍藥附子生薑此救逆之良藥與中寒冷汗自出者同類並稱又與熱症汗出者大相徑庭矣其他少陽症頭微汗或盜汗者小柴胡湯小柴胡湯半夏人參甘草黃芩生薑大棗水氣症頭汗出者小半夏加茯苓湯至於虛人自汗盜汗等症則歸脾補中八珍十全按法而用委屈尋繹各盡其妙而後即安所謂汗之必中其經必得其樂知發而知斂者此也嗟嗟百病起於風寒風寒必先客表汗得其法何病不除汗法一差夭枉隨之矣籲汗豈易言者論和法傷寒在表者可汗在裡者可下其在半表半裡者惟有和之一法也仲景用小柴胡湯加減是已然有當和不和誤人者有不當和而和誤人者有當和而和而不知寒熱之多少稟質之虛實臟腑之燥濕邪氣之兼併以誤人者是不可不辨也夫病當耳聾脅痛寒熱往來之際應用柴胡湯和解之而或以麻黃桂枝發表誤矣或以大黃芒硝攻裡則尤誤矣又或因其胸滿脅痛而吐之則更誤矣蓋病在少陽有三禁也汗吐下是也且非惟汗吐下有所當禁即舍此之法而妄用他藥均為無益而反有害古人有言少陽膽為清淨之府無出入之路只有和解一法柴胡一方最為切當何其所見明確而立法精微亦至此乎此所謂當和而和者也然亦有不當和而和者如病邪在表未入少陽誤用柴胡謂之引賊入門輕者為瘧重者傳入心包漸變神昏不語之候亦有邪已入里燥渴譫語諸症叢集而醫者僅以柴胡湯治之則病不解至於內傷勞倦內傷飲食氣虛血虛癰腫瘀血諸症皆令寒熱往來似瘧非瘧均非柴胡湯所能去者若不辨明症候切實用藥而藉此平穩之法巧為藏拙誤人非淺所謂不當和而和者此也然亦有當和而和而不知寒熱之多寡者何也夫傷寒之邪在表為寒在裡為熱在半表半裡則為寒熱交界之所然亦有偏於表者則寒多偏於里者則熱多而用藥須與之相稱庶陰陽和平而邪氣頓解否則寒多而益其寒熱多而助其熱藥既不平病益增劇此非不和也和之而不得寒熱多寡之宜者也然又有當和而和而不知稟質之虛實者何也夫客邪在表譬如賊甫入門豈敢遽登吾堂而入吾室必窺其堂奧空處乃乘隙而進是以小柴用人參者所以補正氣使正氣旺則邪無容自然得汗而解蓋由是門入復由是門出也亦有表邪失汗腠理致密賊無出路由此而傳入少陽熱氣漸盛此不關本氣之虛故有不用人參而和解自愈者是病有虛實法在變通不可誤也然又有當和而和而不知臟腑之燥濕者何也如病在少陽而口不渴大便如常是津液未傷清潤之藥不可太過而半夏生薑皆可用也若口大渴大便漸結是邪氣將入於陰津液漸少則辛燥之藥可除而花粉瓜蔞有必用矣所謂臟腑有燥濕之不同者此也然又有當和而和而不知邪之兼併者何也假如邪在少陽而太陽陽明症未罷是少陽兼表裡邪也小柴胡中須加表藥仲景有柴胡加桂枝之例矣又如邪在少陽而兼裡熱則便閉譫語燥渴之症生小柴胡中須兼里藥仲景有柴胡加芒硝之例矣又三陽合病合目則汗面垢譫語遺尿者用白虎湯和解之蓋三陽同病必連胃腑故以辛涼之藥內清本腑外徹肌膚令三經之邪一同解散是又專以清劑為和矣所謂邪有兼併者此也由是推之有清而和者有溫而和者有消而和者有補而和者有燥而和者有潤而和者有兼表而和者有兼攻而和者和之義則一和之法變化無窮焉知斯意者則溫熱之治瘟疫之方時行痎瘧皆從此推廣不難應手而愈矣世人漫曰和解而不能盡其和之法將有增氣助邪而益其爭堅其病者和云乎哉論下法下者攻也攻其邪也病在表則汗之在半表半裡則和之病在裡則下而已然有當下不下誤人者有不當下而下誤人者有當下不可下而妄下之誤人者有當下不可下而又不可以不下下之不得其法以誤人者有當下而下之不知淺深不分便溺與蓄血不論湯丸以誤人者又雜症中不別寒熱積滯痰水蟲血癰膿以誤人者是又不可不察也何謂當下不下仲景云少陰腎病得之二三日口燥咽乾者急下之少陰病六七日腹滿不大便者急下之下利脈滑數不欲食按之心下硬者有宿食也急下之陽明胃病譫語不能食胃中有燥屎也可下之陽明病發熱汗多者急下之少陰病下利清水色純青心下必痛口乾燥者急下之傷寒六七日目中不了了睛不和無表症大便難者急下之此當下之例若失時不下則津液枯竭身如槁木勢難挽回矣然又有不當下而下者何也如傷寒表症未罷病在陽也下之則成結胸病邪雖已入里而散漫於三陰經絡之間尚未結實若遽下之亦成痞氣況有陰結之症大便反硬得溫則行如開冰解凍之象又雜症中有高年血燥不行者有新産血枯不行者有病後亡津液者有亡血者有日久不更衣腹無所苦別無他症者若誤下之變症蜂起矣所謂不當下而下者此也然又有當下不可下者何也病有熱邪傳裡已成可下之症而其人臍之上下左右或有動氣則不可以下經云動氣在右不可下下之則津液內竭咽燥鼻乾頭眩心悸也動氣在左不可下下之則腹內拘急食不下動氣更劇雖有身熱臥則欲踡動氣在上不可下下之則掌握煩熱身浮汗泄欲得水自灌動氣在下不可下下之則腹滿頭眩食則青谷心下痞也又咽中閉塞者不可下下之則下輕上重水漿不入倦臥身疼下利日數十行又脈微弱者不可下脈浮大按之無力者不可下脈遲者不可下喘而胸滿者不可下欲吐欲嘔者不可下病人陽氣素微者不可下下之則厄病人平素胃弱不能食者不可下病中能食胃無燥屎也不可下小便清者不可下病人腹滿時減復如故者不可下若誤下之變症百出矣所謂當下不可下而妄下誤人者此也然有當下不可下而又不得不下者何也夫以羸弱之人虛細之脈一旦而熱邪乘之是為正虛邪盛最難措手古人有清法焉有潤法焉有導法焉有少少微和之法焉有先補後攻先攻後補之法焉有攻補並行之法焉不可不講也如三黃解毒清之也麻仁梨汁潤之也蜜煎豬膽汁土瓜根導之也涼膈散涼膈散山梔連翹黃芩薄荷甘草硝黃大柴胡大柴胡湯半夏大棗生薑黃芩芍藥枳實大黃少少和之也更有脈虛體弱不能勝任者則先補之而後攻之或暫攻之而後補之或以人參湯送下三黃枳朮丸又或以人參瓜蔞枳實攻補並行而不相悖蓋峻劑一投即以參朮歸芍維持調護於其中俾邪氣潛消而正氣安固不愧為王者之師矣又有雜症中大便不通其用藥之法可相參者如老人久病人新産婦人每多大便閉結之症丹溪用四物湯四物湯當歸川芎芍藥生地東垣用通幽湯通幽湯生地熟地歸身桃仁紅花升麻甘草豫曾合而酌之而加以蓯蓉枸杞子柏子仁芝麻松子仁人乳梨汁蜂蜜之類隨手取效又曾於四物加升麻及前滋潤藥治老人血枯數至圊而不能便者往往有驗此皆委曲疏通之法若果人虛雖傳經熱邪不妨借用豈得猛然一往敗壞真元至成洞瀉雖曰天命豈非人事哉所謂下之貴得其法者此也然又有當下而下而不知淺深不分便溺與蓄血不論湯丸以誤人者何也如仲景用大承氣湯大承氣湯芒硝枳實大黃厚朴必痞滿燥實兼全者乃可用之若僅痞滿而未燥實者仲景只用瀉心湯瀉心湯生薑乾薑人參半夏黃芩黃連甘草大棗痞滿兼燥而未實者仲景只用小承氣湯小承氣湯厚朴枳實大黃加羌活名三化湯除去芒硝恐傷下焦陰血也燥實在下而痞滿輕者仲景只用調胃承氣湯調胃承氣湯芒硝甘草大黃除去枳實厚朴恐傷上焦陽氣也又有太陽傷風症誤下而傳太陰以致腹痛者則用桂枝湯加芍藥桂枝湯桂枝白芍甘草生薑大棗大實痛者桂枝湯加大黃是解表中兼攻裡也又有邪從少陽來寒熱未除則用大柴胡湯大柴胡湯半夏大棗生薑黃芩芍藥枳實大黃柴胡是和解之中兼攻裡也又結胸症項背強從胸至腹硬滿而痛手不可近者仲景用大陷胸湯丸大陷胸湯芒硝黃連葶藶杏仁甘草若不按不痛者只用小陷胸湯小陷胸湯瓜蔞甘草黃連若寒食結胸用三白散熱藥攻之又水結胸頭出汗者用小半夏加茯苓湯水停脅下痛不可忍者則用十棗湯凡結胸陰陽二症服藥罔效活人俱用枳實理中丸應手而愈又河間三書云鬱熱蓄甚神昏厥逆脈反滯澀有細微欲絶之象世俗未明造化之理投以溫藥則不可救或者妄行攻下致殘陰暴絶勢大可危不下亦危宜用涼膈散合解毒湯養陰退陽積熱藉以宣散則心胸和暢而脈漸以生此皆用藥淺深之次第也又如太陽症未罷口渴小便短澀大便如常此為溺澀不通之症治用五苓散五苓散白朮澤瀉桂枝茯苓豬苓又太陽傳來熱結膀胱其人如狂小腹硬滿而痛小便自利者此為蓄血下焦宜抵當湯丸若蓄血微輕但少腹急結未至硬滿者則用桃核承氣湯桃核承氣湯甘草芒硝大黃桂枝桃仁或用生地四物湯加酒洗大黃各半下之猶為穩當蓋溺澀症大便如常燥糞症小便不利蓄血症小便自利大便黑色也此便溺蓄血之所由分也血結膀胱病勢最急則用抵當湯稍輕者抵當丸結胸惡症悉具則用大陷胸湯稍輕者大陷胸丸其他蕩滌腸胃推陳致新之法則皆用湯古人有言凡用下藥攻邪氣湯劑勝丸散誠以熱淫於內用湯液滌除之為清淨耳此湯丸之別也然又有雜症中不別寒熱積滯痰水蟲血癰膿以誤人者何也東垣治傷食症腹痛便閉拒按者因於冷食用見睍丸因於熱食用三黃枳朮丸若冷熱互傷則以二丸酌其所食之多寡而互用之應手取效又實熱老痰滾痰丸滾痰丸青礞石上沉香酒大黃淡黃芩水腫實症神佑丸神佑丸甘遂芫花大戟大黃黑醜青皮陳皮木香檳榔輕粉蟲積剪紅丸血積花蕊丹失笑丸腸癰牡丹皮散隨症立方各有攸宜此雜症攻下之良法也近世庸家不講於法每視下藥為畏途病者亦視下藥為砒鴆致令熱症垂危袖手旁觀委之天數大可悲耳昔張子和儒門事親三法即以下為補謂下去其邪而正氣自復穀肉果菜無往而非補養之物雖其說未合時宜而以治病攻邪之法正未可缺吾願學者仰而思之平心而察之得其要領以施救濟之方將以躋斯民於壽域不難矣論消法消者去其壅也臟腑筋絡肌肉之間本無此物而忽有之必為消散乃得其下經云堅者削之是已然有當消不消誤人者有不當消而消誤人者有當消而消之不得其法以誤人者有消之而不明部分以誤人者有消之而不辨夫積聚之原有氣血積食停痰蓄水癰膿蟲蠱勞瘵與夫痃癖癥瘕七疝胞痹腸覃石瘕以及前後二陰諸疾以誤人者是不可不審也凡人起居有常飲食有節和平恬淡氣血周流穀神充暢病安從來惟夫一有不慎則六淫外侵七情內動飲食停滯邪自留止則諸症生焉法當及時消導俾其速散氣行則愈耳倘遷延日久積氣盤踞堅牢日漸強大有欲拔不能之勢雖有智者亦難為力此當消不消之過也然亦有不當消而消者何也假如氣虛中滿名之曰鼓腹皮臌急中虛無物取其形如鼓之狀而因以名之此為敗症必須填實庶乎可消與蠱症之為蟲血內實而有物者大相徑庭又如脾虛水腫土衰不能制水也非補土不可真陽火虧火衰不能生土者非溫暖命門不可又有脾虛食不消者氣虛不能運化而生痰者腎虛水泛為痰者血枯而經水斷絶者皆非消導所可行而妄行之誤人多矣所謂不當消而消者此也然又有當消而消之不得其法者何也夫積聚癥瘕之症有初中末之三法也當其邪氣初客所積未堅則先消之而後和之及其所積日久氣鬱漸深濕熱相生塊因漸大法從中治當祛濕熱之邪削之軟之以底於平但邪氣久客正氣必虛須以補瀉疊相為用如薛立齊用歸脾湯歸脾湯白朮人參當歸米仁白芍黃耆遠志甘草龍眼肉送下蘆薈丸豫亦曾用五味異功散五味異功散人參白朮茯苓甘草陳皮佐以和中丸皆攻補並行中治之道也若夫塊消及半便從末治不使攻擊但補其氣調其血導達其經脈俾榮衛流通而塊自消矣凡攻病之藥皆損氣血不可過也此消之之法也然又有消之而不明部分者何也心肝脾肺腎分立五方胃大腸小腸膀胱三焦膽與膽中皆附麗有常所而皮毛肌肉筋骨各有淺深凡用湯丸膏散必須按其部而分君臣佐使駕馭有方使不得移則病處當之不至誅伐無過矣此醫門第一義也而於消法為尤要不明乎此而妄行克削則病未消而元氣已消其害可勝言者況乎積聚之原有氣血食積停痰蓄水癰膿蟲蠱勞瘵與夫痃癖癥瘕七疝胞痹腸覃石瘕以及前後兩陰諸疾各各不同若不明辨為害匪輕豫因約略而指數之夫積者成於五臟推之不移者也聚者成於六腑推之而移者也其忽聚忽散者氣也痛有定處而不散者血也得食則痛噯腐吞酸者食積也腹有塊按而軟者痰也先足腫後及腹者水也先腹滿後及四肢者脹也痛引兩脅咳而吐涎者停飲也咳而胸痛吐膿腥臭者肺癰也當胃而痛嘔而吐膿者胃脘癰也當臍而痛小便如淋轉側作水聲者腸癰也憎寒壯熱飲食如常有身痛偏著一處者外癰也病人嗜食甘甜或異物飢時則痛唇之上下有白斑點者蟲也蟲有九濕熱所生而為蛇為鱉則血之所成也胡以知為蛇鱉腹中如有物動而痛不可忍吃血故也又嶺南之地以蠱害人施於飲食他方之蠱多因近池飲冷陰受蛇蛔之毒也病人咳嗽痰紅抑抑不樂畏見人喉癢而咳劇者勞瘵生蟲也痃如弓弦病筋也癖則隱癖附骨之病也癥則有塊可徵積之類也瘕者或有或無痞氣之類也少腹如湯沃小便澀者胞痹也痛引睪丸疝也女人經水自行而腹塊漸大如懷子者腸覃也經水不行而腹塊漸大並非妊者石瘕也有妊無妊可以脈之滑澀辨之也至於濕熱下墜則為陰菌陰蝕陰挺下脫陰莖腫爛之類而虛火內爍庚金則為痔漏為懸癰為臟毒種種見症不一而足務在明辨症候按法而消之也醫者以一消字視為泛常而不知其變化之曲折較他法為尤難則奈何不詳稽博考以盡濟世之仁術也耶論吐法吐者治上焦也胸次之間咽喉之地或有痰食癰膿法當吐之經曰其高者因而越之是也然有當吐不吐誤人者有不當吐而吐以誤人者有當吐不可吐而妄吐之以誤人者亦有當吐不可吐而又不可以不吐吐之不得其法以誤人者是不可不辨也即如纏喉鎖喉諸症皆風痰鬱火壅塞其間不急吐之則脹滿難忍矣又或食停胸膈消化勿及無由轉輸脹滿疼痛者必須吐之否則胸高滿悶變症莫測矣又有停痰蓄飲阻塞清道日久生變或妨礙飲食或頭眩心悸或吞酸噯腐手足麻痹種種不齊宜用吐法導去其痰諸症如失又有胃脘癰嘔吐膿血者經云嘔家有膿不須治嘔膿儘自愈凡此皆當吐而吐者也然亦有不當吐而吐者何也如少陽中風胸滿而煩此邪氣而非有物不可吐吐則驚悸也又少陰病始得之手足厥冷飲食入口則吐此膈上有寒飲不可吐也病在太陽不可吐吐之則不能食及生內煩雖以吐中有散然邪氣不除已為小逆也此不當吐而吐者也然又有當吐不可吐者何也蓋凡病用吐必察其病之虛實因人取吐先察其人之性情不可誤也夫病在上焦可吐之症而其人病勢危篤或老弱氣衰者或體質素虛脈息微弱者婦人新産者自吐不止者諸亡血者有動氣者四肢厥冷冷汗自出者皆不可吐吐之則為逆候此因其虛而禁吐也若夫病久之人宿積已深一行吐法心火有降相火必強設犯房勞轉生虛症反難救藥更須戒怒凝神調息靜養越三旬而出戶方為合法若其人性氣剛暴好怒喜淫不守禁忌將何持以無恐此又因性情而禁吐也所謂當吐不可葉者此也然有不可吐者而又不得不吐何也病人脈滑大胸膈停痰非吐不除宜瓜蒂散與橘紅淡鹽湯痰以二陳湯二陳湯熟半夏陳皮紅茯苓甘草生薑用指探喉中而出之體質極虛者或桔梗湯代之斯為穩當而豫更有法焉豫曾治寒痰閉塞厥逆昏沉者用半夏橘紅各八錢濃煎半杯和薑汁成一杯頻頻灌之痰隨藥出則拭之隨灌隨吐隨吐隨灌少傾痰開藥下其人即蘇如此者甚衆又曾治寒邪中臟將脫之症其人張口痰鳴聲如曳鋸溲便自遺者更難任吐而延皂角等藥既不可用亦不暇用因以大劑參附姜夏濃煎灌之藥隨痰出則拭之隨灌隨吐隨吐隨灌久之藥力下咽胸膈流通參附大進立至數兩其人即漸醒一月之間參藥數斤遂至平復如此者又衆又曾治風痰熱閉之症以牛黃湯灌如前法頸疽內攻以蘇合香丸灌如前法風熱不語者以解語丹灌如前法中暑不醒者以消暑丸灌如前法中惡不醒者以前項橘半薑汁灌如前法魘夢不醒者以蓮鬚蔥白煎酒灌如前法自縊不醒者以肉桂三錢煎水灌如前法喉閉喉風以杜牛膝搗汁雄黃丸等灌如前法但獲全安如此者又衆更有牙關緊急閉塞不通者以搐鼻散吹鼻取嚏嚏出牙開或痰或食隨吐而出其人遂醒如此者又衆蓋因症用藥隨藥取吐不吐之吐其意更深此皆古人之成法而豫稍為變通者也昔仲景治胸痛不能食按之反有涎吐下痢日數十行吐之痢則止是以吐痰止痢也丹溪治妊婦轉脬小便不通用補中益氣湯隨服而探吐之往往有驗是以吐法通小便也華他以醋蒜吐蛇河間以狗油雄黃同瓜蒂以吐蟲而通膈丹溪以韭汁去瘀血以治前症由之觀之症在危疑之際古人恆以通劑盡其神化莫測之用況於顯然易見者乎甚矣吐法之宜講也近世為醫者每將此法置之高閣亦以汗下之外並無吐法以致病中常有自嘔自吐而為順症者見者驚聞者駭醫家亦不論虛實而亟亟止之反成壞病害人多矣籲可不畏哉論清法清者清其熱也臟腑有熱則清之經云熱者寒之是已然有當清不清誤人者有不當清而清誤人者有當清而清之不分內傷外感以誤人者有當清而清之不量其人不量其症以誤人者是不可不察也夫六淫之邪除中寒寒濕外皆不免於病熱熱氣熏蒸或見於口舌唇齒之間或見於口渴便溺之際灼知其熱而不清則斑黃狂亂厥逆吐衄諸症叢生不一而足此當清不清之誤也然又有不當清而清者何也有如勞力辛苦之人中氣大虛發熱倦怠心煩溺赤名曰虛火蓋春生之令不行無陽以護其榮衛與外感熱症相隔霄壤又有陰虛勞瘵之人日晡潮熱與夫産後血虛發熱煩躁症象白虎脈白虎者難治更有命門火衰浮陽上泛有似乎火者又有陰盛隔陽假熱之症其人面赤狂躁欲坐臥泥水中或數日不大便或舌黑而潤或脈反洪大崢崢然鼓擊於指下按之豁然而空者或口渴欲飲冷而不能下或因下元虛冷頻飲熱湯以自救世俗不識誤投涼藥下咽既危矣此不當清而清之誤也然又有清之而不分內傷外感者何也蓋風寒邪火則散而清之經云火鬱發之是也暑熱傷氣則補而清之東垣清暑益氣湯是也清暑益氣湯澤瀉神麯蒼朮麥冬五味黃柏青皮葛根濕熱之火則或散或滲或下而清之開鬼門清淨腑除陳莝是也燥熱之火則潤而清之通大便也傷食積熱則消而清之食去火自平也惟夫傷寒傳入胃腑熱勢如蒸自汗口渴飲冷而能消水者藉非白虎湯之類鮮克有濟也更有陽盛拒陰之症清藥不入到口隨吐則以薑汁些少為引薑製黃連反佐以取之所謂寒因熱用是也此外感實火之清法也若夫七情氣結喜怒憂思悲恐驚互相感觸火從內發丹溪治以越鞠丸越鞠丸香附蒼朮撫芎神麯山梔開六郁也立齊主逍遙散逍遙散柴胡薄荷當歸白芍茯苓白朮甘草陳皮調肝氣也意以一方治木鬱而諸郁皆解也經云怒則氣上喜則氣緩悲則氣消恐則氣下驚則氣亂思則氣結逍遙一方以治氣上氣結者則為相宜而於氣緩氣消氣亂氣下之症恐猶未合蓋氣虛者必補其氣血虛者必補其血氣旺血充而七情之火悠焉以平至若真陰不足而火上炎者壯水之主以鎮陽光真陽不足而火上炎者引火歸原以導龍人入海此內傷虛火之治法也或曰病因於火而以熱藥治之何也不知外感之火邪火也人火也有形之火後天之火也得水則滅故可以水折內傷之火虛火也龍雷之火也無形之火先天之火也得水則炎故不可以水折譬如龍得水而愈奮健雷因雨而益震動陰濛沉晦之氣光焰燭天必候云收日出而龍雷各歸其宅耳是以虛火可補而不可瀉也其有專用參耆而不用八味者八味丸熟地丹皮淮藥澤瀉茯苓山萸肉桂附子因其穴宅無寒也其有專用六味而不用桂附者六味丸即上八味丸減去肉桂附子因其穴宅無水也補則同而引之者稍不同耳蓋外感之火以清為清內傷之火以補為清也然又有清之而不量其人者何也夫以壯實之人而犯實熱之症清之稍重常為無礙若本體素虛臟腑本寒飲食素少腸胃虛滑或産後病後房室之後即有熱症亦宜少少用之寧可不足不使有餘或餘熱未清即以輕藥代之庶幾病去人安倘清劑過多則療熱未已而寒生矣此清之貴量其人也然又有清之不量其症者何也夫以大熱之病而清劑太微則病不除微熱之症而清劑太過則寒症即至但不及猶可再清太過則將醫藥矣且凡病清之而不去者猶有法焉壯水是也王太朴云大熱甚而寒之不寒是無水也當滋其腎腎水者天真之水也取吾天真之水以制外邪何邪不服何熱不除而又何必沾沾於寒涼以滋罪戾乎由是觀之外感之火尚當滋水以制之而內傷者可知矣大抵清火之藥不可久恃必歸本於滋陰滋陰之法又不能開胃扶脾以恢復元氣則參苓朮耆亦當酌量而用非曰清後必補但元氣無虧者可以不補元氣虧者必須補之俟其飲食漸進精神爽慧然後止藥可也此清之貴量其症也總而言之有外感之火有內傷之火外感為實內傷為虛來路不同治法迥別豈曰熱者寒之遂足以畢醫家之能事也乎論溫法溫者溫其中也臟受寒侵必須溫劑經云寒者熱之是已然有當溫不溫誤人者即有不當溫而溫以誤人者有當溫而溫之不得其法以誤人者有當溫而溫之不量其人不量其症與其時以誤人者是不可不審也天地殺厲之氣莫甚於傷寒其自表而入者初時即以溫散則病自除若不由表入而直中陰經者名曰中寒其症惡寒厥逆口鼻氣冷或冷汗自出嘔吐瀉痢或腹中急痛厥逆無脈下利清穀種種寒症並見法當溫之又或寒濕侵淫四肢拘急發為痛痹亦宜溫散此當溫而溫者也然又有不當溫而溫者何也如傷寒熱邪傳裡口燥咽乾便閉譫語以及斑黃狂亂衄血便血諸症其不可溫固無論矣若乃病熱已深厥逆漸進舌則乾枯反不知渴又或挾熱下痢神昏氣弱或脈來澀滯反不應指色似煙燻形如槁木近之無聲望之似脫甚至血液衰耗筋脈拘攣但唇口齒舌乾燥而不可解者此為真熱假寒之候世俗未明亢害承製之理誤投熱劑下咽即敗矣更有鬱熱內蓄身反惡寒溫熱脹滿皮膚反冷中暑煩心脈虛自汗燥氣焚金痿軟無力者皆不可溫又有陰虛脈細數陽乘陰而吐血者亦不可溫溫之則為逆候此所謂不當溫而溫者也然又有當溫而溫之不得其法者何也假如冬令傷寒則溫而散之冬令傷風則溫而解之寒痰壅閉則溫而開之冷食所傷則溫而消之至若中寒暴痛大便反硬溫藥不止者則以熱劑下之時當暑月而納涼飲冷暴受寒侵者亦當溫之體虛挾寒者溫而補之寒客中焦理中湯溫之理中湯人參白朮乾薑甘草寒客下焦四逆湯溫之四逆湯甘草淡薑附子又有陰盛格陽於外溫藥不效者則以白通湯加人尿豬膽汁反佐以取之白通湯附子乾薑經云熱因寒用是已復有真虛挾寒命門火衰者必須補其真陽太朴有言大寒盛而熱之不熱是無火也當補其心此心字指命門而言仙經所謂七節之旁中有小心是也書曰益心之陽寒亦通行滋腎之陰熱之猶可是也然而醫家有溫熱之溫有溫存之溫參耆歸術和平之性溫存之溫也春日煦煦是也附子薑桂辛辣之性溫熱之溫也夏日烈烈是也和煦之日人人可近燥烈之日積雪凝寒開冰解凍不可近也更有表裡皆寒之症始用溫藥裡寒頓除表邪未散復傳經絡以致始為寒中而其後轉變為熱中者客或有之籍非酙酌時宜對症投藥是先以溫藥救之者繼以溫藥賊之矣亦有三陰直中初無表邪而溫劑太過遂令寒退熱生初終異轍是不可以不謹所謂溫之貴得其法者此也然又有溫之不量其人者何也夫以氣虛無火之人陽氣素微一旦客寒乘之則溫劑宜重且多服亦可無傷若其人平素火旺不喜辛溫或曾有陰虛失血之症不能用溫者即中新寒溫藥不可太過病退則止不必盡劑斯為克當其人矣若論其症寒之重者微熱不除寒之輕者過熱則亢且溫之與補有相兼者有不必相兼者虛而且寒則兼用之若寒而不虛即專以溫藥主之丹溪云客寒暴痛兼有積食者可用桂附不可遽用人參蓋溫即是補豫遵其法先用薑桂溫之審其果虛然後以參朮輔之是以屢用屢驗無有差忒此溫之貴量其症也若論其時盛夏之月溫劑宜輕時值隆冬溫劑宜重然亦有時當盛暑而得虛寒極重之症曾用參附煎膏而治愈者此舍時從症法也譬如霜降以後藥不用白虎然亦有陽明病蒸熱自汗譫語煩躁口渴飲冷者雖當雨雪飄淫之際亦曾用白虎治之而痊安但不宜太過耳此溫之貴量其時而清劑可類推已邇時醫者群尚溫補痛戒寒涼且曰陽為君子陰為小人又曰陽明君子苟有過人必知之誠以知之而即為補救猶可言也不思藥已療病及轉而療藥則病必增劇而成危險之候又況桂枝下咽陽盛則殆承氣入胃陰盛以敗安危之機禍如反掌每多救援弗及之處仁者鑑此顧不痛歟吾願醫者精思審處晰理不差於毫釐用藥悉歸於中正俾偏陰偏陽之藥無往不底於中和斯為善治噫可不勉哉論補法補者補其虛也經云不能治其虛安問其餘又曰邪之所湊其氣必虛又曰精氣奪則虛又曰虛者補之補之為義大矣哉然有當補不補誤人者有不當補而補誤人者亦有當補而不分氣血不辨寒熱不識開合不知緩急不分五臟不明根本不深求調攝之方以誤人者是不可不講也何謂當補不補夫虛者損之漸損者虛之積也初時不覺久則病成假如陽虛不補則氣日消陰虛不補則血日耗消且耗焉則天真榮衛之氣漸絶而虧損成矣雖欲補之將何及矣又有大虛之症內實不足外似有餘脈浮大而澀面赤火炎身浮頭眩煩躁不寧此為出汗暈脫之機更有精神浮散徹夜不寐者其禍尤速法當養榮歸脾湯歸脾湯人參白朮當歸棗仁白芍黃耆遠志甘草龍眼肉加斂藥以收攝元神俾浮散之氣退藏於密庶幾可救復有陰虛火亢氣逆上衝不得眠者法當滋水以制之切忌苦寒瀉火之藥反傷真氣若誤清之去生遠矣古人有言至虛有盛候反瀉舍冤者此也此當補不補之誤也然亦有不當補而補者何也病有脈實症實不能任補者固無論矣即其人本體素虛而客邪初至病勢方張若驟補之未免開門留寇更有大實之症積熱在中脈反細澀神昏體倦甚至憎寒振栗欲著復衣酷肖虛寒之象而其人必有唇焦口燥便閉溺赤諸症與真虛者相隔天淵倘不明辨精切誤投補劑陋矣古人有言大實有羸狀誤補益疾者此也此不當補而補之之誤人也然亦有當補而補之不分氣血不辨寒熱者何也經曰氣主煦之血主濡之氣用四君子湯四君子湯人參白朮茯芩甘草凡一切補氣藥皆從此出也血用四物湯四物湯當歸川芎生地白芍凡一切補血藥皆從此出也然而少火者生氣之源丹田者出氣之海補氣而不補火者非也不思少火生氣而壯火即食氣譬如傷暑之人四肢無力濕熱成痿不能舉動者火傷氣也人知補火可以益氣不知清火亦所以益氣補則同而寒熱不同也又如血熱之症宜補血行血以清之血寒之症宜溫經養血以和之立齊治法血熱而吐者謂之陽乘陰熱迫血而妄行也治用四生丸四生丸細生地生荷葉生側柏葉生艾葉六味湯血寒而吐者謂之陰乘陽如天寒地凍水凝成冰也治用理中湯加當歸醫家當須識此勿令誤也更有去血過多成升斗者無分寒熱皆當補益所謂血脫者益其氣乃陽生陰長之至理蓋有形之血不能速生無形之氣所當急固以無形生有形先天造化本如是耳此氣血寒熱之分也然又有補之而不識開合不知緩急者何也天地之理有合必有開用藥之機有補必有瀉如補中湯用參耆必用陳皮以開之六味湯用熟地即用澤瀉以導之古人用藥補正必兼瀉邪邪去則補自得力又況虛中挾邪正當開其一面戢我人民攻彼賊寇或縱或擒有收有放庶幾賊退民安而國本堅固更須酌其邪正之強弱而用藥多寡得宜方為合法是以古方中有補散並行者參蘇飲益氣湯是也有消補並行者枳朮丸理中丸是也有攻補並行者瀉心湯硝石丸是也有溫補並行者治似理字中湯參附湯是也有清補並行者參連飲人參白虎湯是也更有當峻補者有當緩補者有當平補者如極虛之人垂危之病非大劑湯液不能挽回豫曾用參附煎膏日服數兩而救津液將枯之症陽微將脫之症又曾用參麥煎膏服之數兩而救津液將枯之症亦有無力服參而以耆朮代之者隨時處治往往有功至於病邪未盡元氣雖虛不任重補則從容和緩以補之相其機宜循序漸進脈症相安漸為減藥穀肉果菜食養盡之以抵於平康其有體質素虛別無大寒大熱之病欲服丸散以保真元者則用平和之藥調理氣血不敢妄用偏僻之方久而爭勝反有傷也此開合緩急之意也然又有補之而不分五臟者何也夫五臟有正補之法有相生而補之之法難經曰損其肺者益其氣損其心者和其榮衛損其脾胃調其飲食適其寒溫損其肝者緩其中損其腎者益其精此正補也又如肺虛者補脾土生金也脾虛者補命門火生土也心虛者補肝木生火也肝虛者補腎水生木也腎虛者補肺金生水也此相生而補之也而豫更有根本之說焉胚胎始兆形體未成先生兩腎是腎者先天之根本也因地一聲一事未知先求乳食是脾者後天之根本也然而先天之中有水有火水曰真陰火曰真陽名之曰真則非氣非血而以為氣血之母生身生命全賴乎此周子曰無極之真二五之精妙合而凝凝然不動感而遂通隨我神以為往來者此也古人深知此理用六味滋水八味補火十補班龍水火兼濟法非不善矣然而以假補真必其真者未曾盡喪庶幾有效若先天祖氣蕩然無存雖有靈芝亦難續命而況庶草乎至於後天根本尤當培養不可勿視經曰安穀則昌絶谷則危又云粥漿入胃即虛者活古人診脈必曰胃氣制方則曰補中又曰歸脾健脾者良有以也夫飲食入胃分布五臟灌液周身如兵家之糧餉民間之煙火一有不繼兵民離散矣然而因餓致病者固多而因傷致病者亦復不少過嗜肥甘則痰生過嗜醇釀則飲積瓜果乳酥溫從內受發為腫滿瀉利五味偏啖缺而增氣皆令夭殃可不慎哉是知脾腎兩臟皆為根本不可偏廢古人或謂補脾不如補腎者以命門之火可生脾土也或謂補腎不如補脾者以飲食之精自能下注於腎也須知脾弱而腎不虛者則補脾為亟腎弱而脾不虛者則補腎為先若脾腎兩虛則並補之藥即補矣更加攝養有方斯為善道諺有之曰藥補不如食補吾則曰食補不如精補精補不如神補節飲食惜精神用藥得宜病不痊者寡矣歲次壬午民國三十一年元月念三日上午録於南沙筍里
