body:
  text: 卷之三辨症上醫藥辨或問仲景東垣河間丹溪諸書孰優學之宜何主曰宜專主內經而博觀乎四子斯無弊矣蓋內經猶儒者之六經無所不備四子之說則猶學庸論孟為六經之階梯不可缺一者也四子初無優劣但各發明一義耳仲景見內經載傷寒而其變遷反復之詳未備也故著三百九十七法一百十七方以盡其變後人宗用既久漸失其真遂以通治溫暑及內傷諸症以致誤人故河間出而始發明治溫暑之法東垣出而始發明治內傷之法河間之說即內經五運六氣之旨東垣之說即內經飲食勞倦之義仲景非不知溫暑與內傷也特其著書未之及河間東垣之於傷寒則遵用仲景而莫敢違矣至於丹溪出而又集諸醫之大成發明陰虛發熱類於外感內傷及濕熱相火為病甚多隨症著論亦不過闡內經之虛旨補前賢之未備耳故曰外感法仲景內傷法東垣熱病用河間雜病用丹溪一以貫之歸於內經斯醫道之大全矣愚按既有陰虛火旺之人豈無陽虛火衰之輩火乃天地間真陽之氣天非此火不能生物人非此火不能有生張景嶽主補火立論亦發前人之所未發也獨是少火生氣壯火食氣宜補少火不可助壯火耳學景嶽者宜察之或問仲景處方藥品甚少東垣用藥多至二十餘味丹溪云豫每治病用東垣之藥效仲景處方庶品數少則藥力專精丹溪何以不法東垣而效仲景耶曰明察藥性莫如東垣蓋所謂聖於醫者也故在東垣則可多他人而效其多則亂雜矣東垣如韓信將兵多多益善丹溪不過能將十萬故不敢效其多或問東南氣熱可服寒藥西北氣寒須用溫藥然今東南之俗胡椒薑桂人常食之不見生病西北士夫畏食胡椒辛熱之物何也曰東南雖然然地卑有濕食辛熱藥亦能去濕西北雖寒然地多高燥食辛熱藥卻能助燥故而治病用藥者須識此意東垣丹溪多自制方蓋二公深明本草藥性洞究內經處方要法故能自制自宋以來局方盛行人皆遵用不敢輕率自為局方論症治疾雖多差謬丹溪曾論辨之然方皆明醫所制其君臣佐使輕重緩急大小多寡之法則不差也近因東垣丹溪之書大行世醫見其不用古方卒皆效顰輒自制方然藥性不明處方之法莫究魯莽亂雜反致生害甚有變證多端遂難識治且夫藥之氣味厚薄不同如五味子之味厚故東垣方少者五六粒多則十數粒今世醫或用二三錢石膏味淡薄故白虎湯用半兩今世醫不敢多用補上治下劑宜輕少今不論上下率用大劑丸散湯液各有攸宜今不論緩急率用湯煎如此類者多矣今之為醫者若不熟讀本草深究內經而輕自制方者鮮不誤人也或問今人言東垣之法可用於北丹溪之法可行於南如何曰東垣北醫也羅謙甫傳其法以聞於江浙丹溪南醫也劉宗厚世其學以名於陝西果如其言則本草內經皆神農黃帝岐伯之說亦正宜施於北方耶夫五方所生異病及治之異宜內經異方法宜論五常正大論已詳言之矣又如北方多寒南方多熱江湖多濕嶺南多瘴謂其得此氣多故多生此病非謂北方無熱南方無寒也至於治寒以熱治熱以寒則五方皆同豈有南北之異耶但人之臟腑火各居二天之六氣熱者三分又半故天下之病熱多而寒少觀內經至真要大論病機一篇可見又濕熱相火致病甚多自王太朴注文湮沒以致局方偏用溫熱之藥故丹溪出而闡內經之旨辨局方之偏論濕熱相火之病以補前人之未備耳後人不識見其多用芩連梔柏之類苦寒之藥遂以為宜用於南淺矣哉證有疑似辨天下皆輕談醫醫者輒以長自許一旦臨疑似之症若處雲霧不辨東西幾微之間瞬眼生殺矣夫虛者補之實者瀉之寒者溫之熱者清之雖在庸淺當不大謬至如至實有羸狀誤補益疾至虛有盛候反瀉含冤陰症似乎陽清之必弊陽症似乎陰溫之轉傷當斯時也非察於天地陰陽之故運氣經脈之微鮮不誤者抑積聚在中實也甚則默默不欲語肢體不欲動或眩暈昏花或泄瀉不實皆大實有羸狀也正如食而過飽反倦怠嗜臥也脾胃損傷虛也甚則脹滿而食不得入氣不得舒便不得利皆至虛有盛候也正如飢而過時反不思食也脾腎虛寒真陰症也陰盛之極往往格陽面目紅赤口舌裂破手揚足擲語言錯妄有似乎陽也正如嚴冬慘肅而水澤復堅堅為陽剛之象也邪熱未解真陽症也陽盛之極往往發厥厥則口鼻無氣手足逆冷有似乎陰也正如盛夏炎灼而林木流津津為陰柔之象也諸凡疑似之症不可更僕數一隅三反是有望乎智者大抵症既不足憑當參之脈理脈又不足憑當取諸沉候彼假症之發現皆在表也故浮取脈而脈亦假焉真症之隱伏皆在裡也故沉候脈而脈可辨耳脈辨已真猶未敢恃更察稟之厚薄症之新久醫之誤否夫然後濟以湯丸可以十全使諸疑似之症瀕於死而復生之何莫非仁人君子之遺澤耶寒熱虛實表裡陰陽辨病有總要寒熱虛實表里陰陽八字而已病情既不外此則辨症之法亦不出此一病之寒熱全在口渴與不渴渴而消水與不消水飲食喜熱與喜冷煩躁與厥逆溺之長短赤白便之溏結脈之遲數以分之假如口渴而能消水喜冷飲食煩躁溺短赤便結脈數此熱也假如口不渴或假渴而不能消水喜飲熱湯手足厥冷溺清長便溏脈遲此寒也一病之虛實全在有汗無汗胸腹脹痛與否脹之減與不減痛之拒按與喜按病之新久稟之厚薄脈之虛實以分之假如病中無汗腹脹不減痛而拒按病新得人稟厚脈實有力此實也假如病中多汗腹脹時減復如故痛而喜按按之則痛止病久稟弱脈虛無力此虛也一病之表裡全在發熱與潮熱惡寒與惡熱頭痛與腹痛鼻塞與口燥舌苔之有無脈之浮沉以分之假如發熱惡寒頭痛鼻塞舌上無苔脈息浮此表也假如潮熱惡熱腹痛口燥舌苔黃黑脈息沉此里也至於病之陰陽統上六字而言所包者廣熱者為陽實者為陽在表者為陽寒者為陰虛者為陰在裡者為陰寒邪客表陽中之陰熱邪入里陰中之陽寒邪入里陰中之陰熱邪連表陽中之陽而真陰真陽之別則又不同假如脈數無力四肢倦怠唇淡口和飢冷便溏飲食不化此真陽不足也寒熱虛實表里陰陽之別總不外此然病中有熱症而喜熱飲者同氣相求也有寒症而喜冷飲卻不能飲者假渴之象也有熱症而大便溏瀉者挾熱下利也有寒症而大便反硬者名曰陰結也有熱症而手足厥冷者所謂熱深厥亦深熱微厥亦微是也有寒症而反煩躁欲坐臥泥水之中者名曰陰躁也有有汗而為實症者熱邪在裡也有無汗而為虛症者津液不足也有惡寒而為里症者直中於寒也有惡熱口渴而為表症者溫熱之病自里連表也此乃陰陽變化之理為治病之權衡龍辨之不可不早辨也直中傳經辨直中陰症則先不發熱四五日或六七日後反發熱者陰極生熱也傳經陰症則先發熱五六日後而變四逆厥冷熱極反兼寒化也亦有始本陽症汗下太過而變虛寒反熱煩躁者陰陽俱虛也傷寒無脈辨傷寒六七日或十餘日脈伏而不起者此欲戰汗而解也如大下後厥冷下痢無脈是驟虛脈隨氣脫也與三陰厥冷無脈炙之不溫及服姜附脈不出皆死症也痞滿結胸辨痞滿為虛邪必居胸脅不在中也雖滿而不痛結胸為實邪正在胸中痛不可近者為大結胸按之方痛者為小結胸下利清水漏底辨熱邪傳裡燥屎內結小腹硬痛譫語惡熱渴飲水漿而利下旁流純清臭水為熱結利若下利清穀腹痛喜按者為內寒又夾食傷寒因本虛不化不結而自利或因誤用消導及攻下遂利不止者俗名漏底也如狂發狂辨傷寒初起無熱狂言煩躁不安精采不與人相當此因熱結膀胱也又有當汗不汗五六日後小便利大便黑此蓄血如狂也若陽明內熱發必妄言譫語欲登高棄衣此躁結失下而致也是謂發狂譫語狂言辨譫語有虛有實熱入胃腑水涸燥結者陽邪內實也可下之若大劫取汗譫語者神明擾亂也宜和之下利純清水而譫語者陽邪暴虐有似陰寒也急下之若狂言不能食者是失志也為腎絶不治合病並病辨合病則初起便見兩經之症並病則先見一經之症一二日又加一經症見前症不罷兩經俱病也若先見一經症便變他經者又屬傳經矣噦與乾嘔辨噦為胃虛誤攻其熱或飲冰水所致其聲濁惡而長乾嘔則似吐而無物出胃中熱與穀氣相併及水逆痰氣所致非惡候也短氣發喘辨呼吸短促而反盛者為短氣此失於汗下所致宜分表裡汗下之若氣息虛微不續為少氣此汗下太過所致宜生津兼和營衛若裡氣逆上張口抬肩者為發喘此因水飲傷肺宜疏表邪散水飲為首務若夫真陽不歸而衛氣逆上者又當從事桂附然多難救也蚊蜴發斑辨發斑多見於胸腹脈洪大病人昏憒先紅後赤者是也蚊蜴多見於手足脈不洪大病人自靜先紅後黃者是也腑病經病辨腑病是胃腑受病六七日不大便譫語發渴而脈實經病是經絡受病身熱目疼鼻乾不得臥而脈長溫熱發於陽明則自腑連經煩渴自汗壯熱目赤而脈洪大溫瘧風瘧辨溫瘧是溫病熱邪未盡重感於寒而成發於春夏之交其症多熱少寒風瘧多在夏秋也疫痢漏底辨疫痢乃是冬時伏氣因春夏多雨火邪復為濕伏延至秋時真陽內人其邪內不能容外不得泄古人以敗毒散加陳倉米治之誤與攻積利水必死若漏底則因腎氣素虧或夾冷食而見外熱裡寒之症其脈必尺中微弱當以夾陰例治之亦有熱邪傳裡而下利穢積者又當以傳經熱症治之發黃辨血症發黃則小便自利傷血而不傷氣也濕熱發黃則小便不利氣病而血不病也中濕風濕辨中濕則一身盡痛而重脈來沉緩或面黃頭痛鼻塞風濕則一身盡痛而腫關節不利不能轉側惡風不欲去衣其脈浮虛而澀燥症濕症辨燥症則肌膚枯槁血少不能榮食百脈而必痿弱無力濕症則肢體浮腫經隧道中為濕所襲而痹著不舉也表熱裡熱辨其脈浮緊無汗為傷寒浮緩有汗為傷風皆風寒外襲表發熱也其脈實而蒸蒸發熱六七日不大便者為里發熱邪氣內傳而熱也裡寒表寒辨初起不熱但惡寒而體倦息微脈沉遲無力此寒中三陰里惡寒也若初起惡寒而體重氣促脈陰陽俱緊為表惡寒始雖惡寒後必發熱也女勞復陰陽易辨瘥後御女瘥者病新愈之謂也為女勞復此虛邪為患復犯虛虛之戒必死若不病人與新瘥者交而得病者為陰陽易此熱毒雖乘虛入犯少陰猶可用祛熱藥治之陰症有三辨世人論傷寒輒曰陰症而不知有傳經之陰症陰中之熱症也有直中之陰症陰中之寒症也有房室之陰症陰中之虛症也既犯房室而得熱症則灼熱極甚犯房室而得寒症則陰寒極盛熱之甚則清劑宜輕寒之甚則溫劑宜重斯無弊耳乃世人混稱夾陰而醫者漫不加察反從而和之噫陋矣陽厥陰厥辨陽厥者先自三陽經氣分因感寒邪起於頭疼發熱惡寒以後傳進三陰血分變出四肢厥冷大便燥實譫語發渴揚手擲足不惡寒反怕熱脈沉有力此傳經熱證謂之陽厥外雖厥冷內有實熱蓋因大便結實不下便氣血不通故手足乍冷乍溫也如火鍊金熱極金反化水水寒極而成冰反能載物厥微熱亦微用四逆散厥深熱亦深大承氣大承氣芒硝枳實川軍厚朴正所謂亢則害其物承乃制其極也若疑為陰厥而進熱藥一如抱薪救火矣陰厥者因三陰經血分自受寒邪初病無身熱無頭痛就便惡寒四肢厥冷直至臂脛以上過乎肘膝不溫引衣踡臥不渴或兼腹痛吐瀉或戰栗面如刀刮口吐涎沫脈沉遲無力此為直中直陰寒症不從陽經傳入謂之陰厥也輕則理中湯重則四逆湯溫之陽症似陰辨陽症似陰者乃火極似水也蓋傷寒熱甚失於汗下陽氣亢極鬱伏於內反見勝已之化於外故其身涼手足厥冷狀若陰症唇焦舌燥能飲水漿大便閉硬小便赤澀沒有糞水利出內有燥屎結聚乃傍流之物非冷痢也再審有屁極臭者是也其脈雖沉切之必滑數有力或時燥熱不欲衣被或揚手擲足或譫語有力此陽症也輕則用四逆散合小柴湯渴用白虎湯合解毒湯黃連解毒湯川連黃柏黃芩山梔漸熱大便實者用大柴湯大柴胡湯柴胡半夏黃芩大黃枳實芍藥生薑大棗重則燥實堅硬痞滿全具者用大承氣湯下之陰症似陽辨陰證似陽者乃水極似火也蓋傷寒傳變或誤服寒涼攻熱太過其人素本腎虛受寒遂變陰症冷極於內逼其浮陽之火發見於外面赤煩躁欲坐井中身有微熱渴欲飲水復不能飲大便閉結不通或自利小便淡黃或嘔逆或氣促或鄭聲或咽痛狀似陽證庸醫不識妄投寒涼之劑下咽遂斃可不謹哉切其脈若沉細遲而微以通脈四逆湯倍加參附以接真陽之氣從脈舍症法設或救遲遂至陰盛陽衰雖使參附亦不能救中風辨凡中暑中寒中濕痰厥氣厥食厥熱厥虛暈皆卒倒不語但風必有歪斜搐搦或偏枯之症為異就諸類症之中惟中氣與中風尤相似但中氣身冷脈沉無痰涎中風身溫脈浮有痰涎也真中類中辨真中風者中於太陽則與傷寒外感傳經相符若中血脈必有偏枯歪斜之症中臟雖為在裡亦必兼有經絡偏枯之症若類中者寒則厥冷嘔瀉而暴痛也暑則亦日中行而卒倒也濕則痰涎壅盛而閉塞也火則面赤煩渴唇燥而便閉也食則因於過飽而胸脹滿悶也氣則因於盛怒而閉塞無音也惡則因於登冢入廟冷屋棲遲而卒然頭面青黯也虛則面色㿠白鼻息輕微也見症各殊與真中之偏枯歪斜自是不同其間或有相同者乃真中類中相兼也必須一一辨明察其多寡兼併之處辨其標本緩急之情審度得宜用古人經驗良方隨手而起矣閉證脫證辨凡卒僕暴厥須分閉脫牙關緊閉兩手握固即是閉證其症易治如口開鼾睡小便自遺即是脫證其症難治閉者邪氣閉塞於外元氣猶然在內但與開關利氣熱閉牛黃丸牛黃丸牛黃辰砂梔子黃芩黃連玉金冷閉橘半薑汁湯其熱閉極盛胸滿便結者或用三化湯以攻之三化湯厚朴枳實川軍羌活脫者元氣泄於外邪氣溷於內口張心絶眼合肝絶手撒脾絶聲如鼾睡肺絶遺屎腎絶更有髮直搖頭上攛面赤如妝汗出如珠此際須用理中湯加參兩餘以溫補元氣若寒痰阻塞或用三生飲加人參以灌之雖與峻補而臟已傷殘矣諸症皆然不獨中風也中風不語辨不語有心脾腎三經之異心者君主之官神明出焉心經不語必昏冒全不知人或兼直視搖頭等症蓋心不受邪受邪則殆此敗症也若胞絡受邪則時昏時醒或時自喜笑若脾經不語則人事明白或唇緩或口角流涎語言蹇澀若腎經不語則腰或痿痹或耳聾遺屎此為辨又有風寒客於會厭亦令不語不過喊風聲啞之屬口能收舌能轉樞機皆利但不發音耳傷風傷暖辨外風所傷鼻流清涕咳嗽清痰舌無苔膜內熱生風鼻流濁涕咳嗽稠痰舌有紅點其餘諸症則相似也傷風傷寒辨風循經絡亦有六經傳變其初起頭疼身熱與傷寒同但傷風必鼻塞流涕且多惡風居暖室之中則恆然自如傷寒惡寒雖近烈火仍復怕寒又傷風在表者有汗而手足微煩傷寒在表者無汗而手足微冷傷風在裡肺熱而皮膚髮疹即是風溫症傷寒在裡胃熱而肌肉發斑皆各異也外感陰毒辨陰毒者受天地殺厲之氣入三陰經而成病此中寒稍輕如被杖手足清冷短氣不得息四五日可治六七日不可治宜用發表之劑升麻鱉甲湯雄黃蜀椒主之內傷真陰辨內傷真陰者因房勞傷腎生冷傷脾內既伏陰外又感寒比之中寒更重亦有傷寒陽症過服涼藥而變成者其症六七日後漸見精神恍惚身倦懶言頭額手背冷汗時出舌上生苔淡黑冷滑心下結硬如石四肢寒冷如冰唇青甲黑鼻如煙煤腹痛吐利咽痛睛疼身如被杖囊縮舌卷宜溫經之劑回陽散返陰丹並外灸丹田氣海兩穴數壯夏月雜症辨風寒暑濕燥火及傷熱飲食外火也外可驅而不可留驅外火有四法一曰發風寒壅閉火邪內郁宜升發之如升陽散火湯之類是也升陽散葛升柴羌獨防參芍生草炙草薑棗二曰清內熱極盛宜用寒涼如黃連解毒湯之類是也三曰攻火氣鬱結大便不通法當攻下此釜底抽薪之法如承氣湯之類是也四曰制熱氣拂鬱清之不去攻之不可此本來真水有虧不能制火所謂寒之不寒是無水也當滋其腎如地黃湯之類可用也七情色欲勞役耗神內火也內可養而不可害養內火有四法一曰達肝經氣結五郁相因當順其性而升之所謂木鬱則達之如逍遙散之類是也此以一方治木鬱而諸郁皆解也二曰滋虛火上炎必滋其水所謂壯水之主以鎮陽光如六味湯之類是也三曰溫勞役神疲元氣受傷陰水乘其土位經曰勞者溫之又曰甘溫能除大熱如補中益氣湯之類是也四曰引腎氣虛寒逼其無根之火浮游於上當以辛熱雜於壯水藥中導之下行所謂導龍入海引火歸原如八味湯之類是也八味湯熟地丹皮淮山藥澤瀉茯苓山萸肉桂枝附子此名附桂八味虛火實火辨大約實火之熱日夜無間口渴能飲大便堅閉然實火亦有日晡潮熱者如外感陽明裡症是也亦有大便泄瀉者如暑濕氣食之症也虛火之熱向夜潮熱口燥不飲大便不閉然虛火亦有晝夜俱熱者如氣血兩虛之證也亦有大便乾燥者如産後病後及勞弱血枯便燥是也當合兼症脈息辨之火升有三辨氣從左邊起者肝火也氣從臍下起者陰火也氣從湧泉穴起者虛之甚也要知上升之氣自肝而出中挾相火自覺冷者非真冷也乃火極似水耳虛火有五辨有勞倦內傷身熱無力為氣虛火者有失血之後陰分轉劇為血虛火者有遇事煩冗心火焦灼為陽強病者有房室過度腎水不足陽光上亢為陰虛火者有勞弱病後吐瀉脫元上熱下寒為陽虛火者鬱火有三辨有平素內熱外感風寒腠理閉塞而為鬱熱者有恚怒不發謀慮不遂肝風屈曲而為鬱火者有胃虛食冷抑遏陽氣於脾土之中四肢發熱捫之烙手而為火鬱症者痰病分辨痰症初起停留中焦頭痛寒熱類外感表症久則停於脾肺潮熱咳重類內傷陰火又痰飲流注肢節疼痛類風家痹症但痰病胸滿食減肌色如故脈滑或細為異飲與痰辨飲者蓄水之名自外而入痰者腸胃之液自內而生其初各別其後同歸故積飲不散亦能變痰是飲為痰之漸痰為飲之化也若其外出則飲形清稀痰形稠濁又不同也失精脫營辨飲食居處暴樂暴苦始樂後苦皆傷精氣病從內生其先富後貧而病曰失精先貴後賤而病曰脫營外症身漸瘦無精神又有鬱結在脾不思飲食午後發酉戌時止或煩悶渴嘔或坐臥呆癡喜向暗處婦人經少男子溺澀皆郁病也更有失名利之士有志恢圖過於勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中因而內熱亦郁病也宜歸脾湯隨症調之脾胃受病辨飲食勞倦則傷脾胃故有勞倦受傷者有飲食受傷者有勞倦後繼以食傷者有食傷後加以勞倦者大抵勞役傷脾者心口按之不痛飲食傷脾者心口按之刺痛又食傷則其症初寒後變鬱熱者多勞倦則其症初起後變虛寒者多故經曰始受熱中未傳寒中即是謂歟脾胃變病辨脾屬陰主濕化胃屬陽主火化傳在脾者陰不配陽而胃獨旺則為濕熱之病如癰腫瘡瘍食㑊黃疸消渴肉痿噎膈痰火食少之類是也傷在胃者陽不配陰而脾陰獨滯則為寒濕之病如身重肢麻面黃浮腫痞脹噫氣倦怠積塊瀉痢之類是也又不能食者病在胃能食而不能化者病在脾勞倦症似陽明辨有體虛氣弱之人飢困勞役之後肌膚壯熱燥渴引飲目赤面紅譫語悶亂或日晡轉甚或晝夜不息症雖有餘脈實不足洪大空虛重按全無經曰脈虛則血虛血虛則發熱證似白虎而脈不長實為異勞倦症似傷風辨有勞役辛苦腎中陰火沸騰或脫衣或沐浴歇息涼處其陰火不行還歸皮膚腠理極虛無陽以護被風與陰涼所遏以此表虛不任風寒與外感惡風相似但氣息短促懶於言語困倦無力有別內傷外感辨夫勞倦內傷而認作外感者因有惡風惡寒發熱頭疼之症也殊不知外感寒熱齊作無間內傷寒熱間作不齊外感頭痛如破如裂內傷頭痛時作時止外感惡寒雖近烈火不除內傷惡寒得救溫暖即解外感惡風不耐一切風寒內傷惡風偏惡些少賊風外感發熱無有歇息直待汗下方退內傷發熱晝夜不常或自袒裸便涼外感筋骨疼痛不自支持便著床褥內傷四肢不收無力倦怠而已間有氣衰火旺變為骨消筋緩者然非初病即顯是症也內傷神思昏怠語言懶倦先重而後輕外感神思猛壯語言強健先輕而後重內傷手心熱而手背不熱外感手背熱而手心不熱內傷症顯在口故口不知味外感症顯在鼻故鼻塞不利內傷從內而出故右脈洪大外感從外而入故左脈浮盛虛損辨凡陰陽虧損皆因水火不濟真陰內虧虛火炎灼肺金受傷無以生腎水腎水枯竭無以濟心火心火一旺腎水從之而夢遺精脫之病作肺氣一虛則腠理疏豁而盜汗自汗之病生火動其血血隨火生而咳嗽吐紅之症起虛損辨症虛損之症因名以責實不過氣虛血虛陰虛之異耳凡脾肺不足皆氣虛也心肝不足皆血虛也腎水不足即陰虛也故心肝損而色敗汗多為陽虛腎肝損而形痿汗多為陰虛勞有陰陽辨陽病口乾舌瘡咽痛聲啞能嗜滋味五心煩疼小便黃赤大便燥結用甘涼氣藥陰病胃逆噁心飲食雖化痰淡白色四肢懈惰小便常多大便溏泄用甘溫氣藥佐血藥又有嗽痰仰臥不得者必陰陽俱病也虛分脾腎辨夫人之虛不屬於氣即屬於血五藏六腑莫能外焉以水為萬物之源無形之本土為萬物之母有象之基二臟安和一身皆治故救腎者必本乎陰血血主濡之血屬陰主不陷虛則上升當斂而抑六味等六味丸熟地丹皮淮藥澤瀉茯苓山萸肉救脾者必本乎陽氣氣主煦之氣為陽主上升虛則下陷當升而舉四君等故邵氏曰死生之機升降而已發熱作止辨夫外感寒熱齊作無間內傷寒熱間作不齊此特論其常耳然外感初起似瘧狀發有作止此邪氣尚淺而未能混淆正氣故乍離乍合脈必至數有力仍當解散更有內傷勞倦似陽明白虎發熱晝夜不減此氣血兩虛故亦齊作無間脈必重按無力仍當溫補晝熱夜熱辨晝則發熱夜則安靜是陽氣偏勝於陽分也晝則安靜夜則發熱是陽氣下陷於陰中也晝則發煩熱燥夜亦發熱煩躁是重陽無陰也更有晝熱陽虛口中無味病責之胃宜甘溫補氣暮熱陰虛口中有味病責之腎宜甘寒滋陰三焦發熱辨熱在上焦咽乾口糜熱在中焦心煩口渴熱在下焦便閉溺赤虛熱實熱辨胸悶而噁心引飲便實者實熱也胸爽而少食自汗短氣者虛熱也表熱裡熱辨有表症而身熱者外感表熱也無表症而身熱者內傷裡熱也氣熱血熱辨氣分虛熱者用甘溫以除熱蓋大熱在上大寒必伏於內用甘溫以助地氣使真氣旺而邪火息熄血分虛熱者用甘寒以勝熱蓋陰火浮於外必真陰竭於內用甘寒以補腎使真水充而虛焰潛滅也真熱假熱辨真熱則發熱惡寒脈數有力按之有實煩躁口渴大便燥小便赤澀或利臭積發言壯厲不欲近衣者是也在表者散之在裡者瀉之假熱亦發熱惡寒而足必不熱脈大而虛按之微弱身雖熾熱而不燥不渴或見虛狂而項之即止終不及高聲詈罵者也經曰寒熱有真假治法有逆從此之謂也假熱有二辨如大熱而甚寒之不寒是無水也熱去復來晝見夜伏夜見晝止時節而動是無火也熱動復止倏往倏來時作時止是無水也當助其腎又寒之不寒責腎之虛寒之不入責腎之少火有治熱以寒寒之而穀食不入此為氣不疏通壅而為實也有病熱脈數按之不鼓擊於指下者此陰盛格陽內真寒而外假熱陰症似陽也病熱忽寒手足俱冷按之脈來鼓擊於指下有者此陽盛拒陰外假寒而內實熱陽症似陰也從脈不從症疸兼雜症辨黃疸初起多兼雜症如風症色黃帶青寒症色黃帶黯暑症色黃帶赤瘀血發黃喜妄如狂溺清便黑食積發黃惡食噫氣胸滿腹脹又有瘀熱入心發黃者痰火入肺發黃者不拘外感內傷拂鬱不舒皆能成疸痓癇有別辨病發身軟時醒者為癇身強直角弓反張不醒為痙頭風分辨血虛者朝輕夕重氣虛者朝重夕輕風熱痛者遇熱則發風濕痛者陰雨則甚濕痰痛者綿密無間眩暈吐逆火鬱痛者喜暖畏光面赤口渴咽喉虛實辨實火因過食煎炒熱毒蘊積胸膈不利煩渴便閉虛火因七情勞欲氣虛火炎咽膈乾燥二便如常喘分虛實辨虛者氣乏身涼冷痰如冰實者氣壯胸滿身熱便硬短氣分辨若夫少氣不足以息呼吸不相接續出多入少名曰短氣短氣者氣微力弱非若喘症之氣粗奔迫也哮喘分辨哮以聲音言喘以氣息言又喘促而喉中如水雞聲者謂之哮氣促而連續不能以息者謂之喘血分浮沉辨有三種血吐水內浮者肺血也沉者肝血也半浮半沉者心血也色赤如太陽之紅者腎血也各隨見症而參之吐衄咳咯血辨有四種吐血出於胃吐行濁道衄血出於經衄行清道喉與咽二者不同也蓋經者走經之血走而不守隨氣而行火性急速故隨經直犯清道而出於鼻其不出於鼻者則挾火凌金滲入肺竅而出於咽為咳咯也胃者守營之血守而不走存於胃中胃氣有傷不能攝血故令人嘔吐從嘔而出於口也厄逆虛實辨不足者因內傷脾胃及大病後胃弱多面青肢冷便軟有餘者因外感胃熱及大怒大飽多面紅肢熱便閉虛者難治實者易愈如尋常無別症忽然發厄者屬氣逆與痰滯嘔吐噦辨嘔屬陽明氣血居多之鄉故有聲有物氣血俱病也吐屬太陰多血少氣之所故有物無聲血病也噦屬少陽多氣少血之部故有聲無物氣病也噎膈翻胃辨飲食入於噎間不能下噎隨即吐出自噎而轉故曰噎膈是膈膜之膈非隔截之謂也飲食下噎至於膈間不能下膈乃徐吐出自膈而轉故曰膈翻胃是飲食已入胃中不能運化而下脘有燥結不通朝食而暮吐暮食而朝吐明其自胃中而倒出故曰翻胃也均一吐也而有上中下之分類數千年間惟潔古老人治吐而有上中下論曰上焦吐者主於氣中焦吐者主於積下焦吐者主於寒故令今人有用香燥而治愈者實寒氣使然也反胃分辨有損傷胃氣而吐者有脾不運化而吐者有中焦積熱者有下焦虛寒者脈大有力當作熱治脈小無力當作寒醫色之黃白而枯者為虛寒色之紅赤而澤者為實熱吞吐各別辨吐酸者吐出酸水平時津液上升之氣鬱滯清道溫中生熱故從火化遂作酸味如穀肉在器得熱則易酸也吞酸者鬱滯日久不能自湧而出伏於肺胃之間咯不得上咽不得下噁心分辨胃有寒氣噁心者嘔清水不濁脈遲胃有痰火噁心者嘔酸水煩渴脈洪癇與卒中痓病辨叄症相因但癇病僕時口作六畜聲將醒時吐涎沫醒後復發有連日發者有一日三五發者若中風中寒中暑之類則仆地無聲醒時無涎沫亦不復發惟痙病雖時發時止然身體強直反張如弓不似癇病身軟作聲也腹痛分辨痛而脹悶者多實痛而不脹悶者多虛拒按者為實可按者為虛喜實者多實受熱者多虛飽則甚者多實飢即悶者多虛脈強氣粗者多實脈虛氣少者多虛新病年壯者多實久病年高者多虛補而不效者多實攻而愈劇者多虛病在經者脈多弦大病在藏者脈多沉微腹痛各別辨腸癰痛者腹重而痛身皮甲錯繞臍生瘡小便如淋疝氣痛者大腹脹小腹急下引睪丸上衝而痛痧症痛者或大吐或大瀉上下絞痛厥冷轉筋陰毒痛者爪甲青面唇黑厥逆嘔吐身冷欲絶積聚痛者有形可按痢疾痛者後重逼迫至於婦人腹痛多有關於經水胎孕者宜先審之霍亂寒熱分辨因寒者不煩不渴或吐利後仍見煩渴以津液外亡也因暑者大煩大渴吐利清水未吐利前預見煩渴以暑邪內擾故也癥瘕各別辨癥者徵也以其有所徵驗也腹中堅硬按之應手不能移動瘕者假也假物而成蠢動之形如血鱉之類中雖硬而聚散無常且有活性故或上或下或左或右癥因傷食瘕是血生二症多見於臍下痃癖痞異辨痃在腹內貼進臍旁左右一條筋脈急痛有時而見癖居兩肋有時而痛外不可見痞居心下滿悶壅塞按之不痛而無形跡脹分虛實辨腹脹堅硬按之而痛者為實按之不堅不痛者為虛先脹於內而後脹於外者為實先脹於外而後脹於內者為虛小便黃赤大便閉結為實小便清白大便溏瀉為虛脈滑數有力為實弦浮微細為虛色紅氣粗為實色枯氣短為虛水分血分辨婦人身腫有水分血分之殊水分者中州停濕心下堅大病發於上先水腫而後經斷治在中焦血分者血結胞門臍下脹病發於下先經斷而後水腫治在下焦且血分之病小便硬痛手不可按而水道清長與脾虛之候大腹柔軟水道澀滯者各別宜破瘀之劑若屬懷孕亦有氣遏水道而腫者但宜順風安胎俟産而腫自消疝病分辨疝必睪丸先痛次連小腹次攻胸脅有自下而上之象若小腸氣者臍旁鉤痛連及腰脊膀胱氣者腫脹溺澀手按有聲腎氣脹者臍下繞身撮急引痛或連胯內三症之發必從腹而下及睪丸有自上而下之象其偏墜於腎者惟睪丸為病而無攻衝諸症腸鳴分辨濕多成五泄腸走若雷奔此寒濕之患然亦有火勢攻衝搏擊水氣而鳴者兼腹痛暴注下迫肛門濕滯小水色黃非若濕症之腹不痛也完穀分辨完穀不化其因有四曰氣虛曰胃寒曰胃火曰胃風夫氣虛胃寒固不能傳化矣火者火性急速傳運失常即邪熱不殺穀也至於胃風者肝風傳脾土受其克不能變化名為飧泄乃五泄之一也痢疾虛實辨世俗多以白為寒赤為熱似矣然白色亦有屬熱者如穀食腐熟而成膿也赤色亦有屬寒者因血瘀凝澀而入腸也不可以赤白為準但常以脈辨之裡急分辨裡急而不及更衣者火也火性急速能燥物也裡急而頻見更衣者虛也元氣滑脫不禁固也後重分辨邪迫而後重者至圊稍減未幾復作此大腸經積滯不能宣通也虛滑而後重者至圊不減後反加甚此肺脾氣降不能發升也濁分虛實辨大約竅端結蓋為多火不結蓋者為兼濕小水赤澀而痛或濁帶赤色者為小腸濕熱小水不澀不痛而所下色白或滲利轉甚者為脾氣下陷莖中痛癢而發寒熱或有結痛者為毒邪所侵濁分精溺辨要知濁出精竅淋出溺道由敗精瘀腐者十常六七由濕熱流注甚多與脾虛而下陷者果少十中二三壬午年杏月初三日午後抄
