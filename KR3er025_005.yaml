body:
  text: 卷之五病因賦上夫百病之生也各有其因因有所感則顯其症症者病之標因者病之本故曰知標本者萬舉萬當不知標本是謂妄行蓋百病皆生於六氣諸症莫逃乎四因傷寒傳變六經必須熟認瘟疫感冒四氣務要先明內傷脾胃者辨有餘與不足外感熱病者知夏熱與春溫卒中風因有四端治分三法破傷風亦有四種治別三經中暑有動靜之異受濕有內外之分火有七說痰有十因氣有九論郁有六名瘧犯暑風更兼痰食痢因濕熱及受積停嘔吐者胃氣逆而不下泄瀉者脾胃傷而不平霍亂脾寒傷食所致痞滿脾倦積濕而成咳逆者胃氣之不順咳嗽者肺氣之不清噯氣皆由於痰火咽酸盡屬乎食停中滿膨脹者脾虛不運噎膈反胃者氣食相凝喘急有虛有實痙痓有陽有陰五積六聚總是氣逆其痰血五勞六極皆由於火爍乎天真吐血出於胃腑衄血出於肺經痰涎血屬於脾藏咯唾血屬於腎經牙宣者陽明之熱極腸紅者大便之血流腹內窄狹兮痰火各別胸中煩熱兮虛實可分驚悸痰迷恐懼所致健忘血少憂鬱而成癲狂者分心肝之熱極癇症者尋痰火之重輕便濁者有赤白之異汗出者有自盜之名九種心疼痛在胃脘七般疝氣病在厥陰脅痛有兩邊之別頭風有左右之分腰痛腎虛而或閃挫腹痛寒氣而或食停痿症不足與濕熱痹證寒濕與風乘四種遺精心腎不能既濟五般黃疸濕熱熏蒸而成眩暈者無痰不作消渴者無火不生不寐者痰火旺而血少多睡者脾胃倦而神昏大便祕乃血液燥結小便祕乃氣滯不行痔疾腸風濕熱所致發斑癮疹風熱所乘耳聾者腎虛之故目疾者肝火之因齒痛有胃熱蟲蛀喉痹乃火動痰生鼻塞者肺氣之不利口瘡者脾火之遊行女人經水不調皆因氣滯寡婦心煩潮熱多自郁生帶下砂淋由於濕熱血山崩漏為損衝任胎孕不安治有二理産後發熱原有七因茲七十四種之病略舉其要而賦云欲知其備後論詳明看方猶看律用藥如用兵機毋輕發學貴專精百病皆生於六氣六氣者風寒暑濕燥火也經云諸風掉眩皆屬於肝諸痛癢瘡皆屬於心諸濕腫滿皆屬於脾諸氣膹郁皆屬於肺諸寒收引皆屬於腎此五運主病也六氣為病者諸暴強直肢痛軟戾裡急筋縮皆屬於風厥陰風水乃肝膽之氣也諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹腫大鼓之如鼓癰疽瘍疹癭瘤結核吐瀉霍亂瞀郁腫脹鼻塞鼽衄血溢淋閉身熱惡寒戰栗驚恐悲笑譫妄衄蔑血汙之病皆屬於熱少陰君火乃真心小腸之氣也諸熱瞀瘛暴喑冒昧躁擾狂越罵詈驚駭胕腫痠疼氣逆上衝噤栗如喪神守嚏嘔瘡瘍喉痹耳鳴及聾嘔湧溢食不下目昧不明暴注瞤瘛暴病暴死皆屬於火少陽相火乃心包絡三焦之氣也諸痙強直積飲痞膈中滿霍亂吐下體重胕腫肉如泥按之不起皆屬於濕太陰濕土乃脾胃之氣也諸澀枯涸幹徑皺揭皆屬於燥陽明燥金乃肺與大腸之氣也諸病上下所出水液澄徹清冷癥瘕痞疝腹滿急痛下痢清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒太陽寒水乃腎與膀胱之氣也風有二風寒風熱風寒則發散祛風而風自解風熱則疏散鬱熱而風自平熱有三虛熱實熱鬱熱虛者補之實者瀉之郁者散之濕有四寒濕風濕濕熱濕氣寒濕者熱藥以燥之風濕者風藥以勝之濕熱者寒藥以清利之濕氣者氣藥以通陽之火有四陰陽虛實陰火從其補陽火從其瀉虛火從其補實火從其瀉燥有三寒燥風燥熱燥寒燥者溫經風燥者祛風熱燥者清熱亦必以養血潤燥之藥為君寒有三外寒內寒虛寒外寒者發表為先內寒者溫中為主虛寒者壯陽而兼固本諸症莫逃乎四因四因者氣血痰郁也丹溪治法氣用四君子湯血用四物湯痰用二陳湯郁用越鞠丸參差互用各盡其妙薛立齊從而廣之氣用補中而參以八味益氣之源也血用四物而參以六味壯水之主也痰用二陳而兼以六君補脾土以勝濕治痰之本也郁用越鞠而兼以逍遙所謂一方治木鬱而諸郁皆解也用藥之妙愈見精微以愚論之氣虛者宜四君輩而氣實者則香蘇平胃之類可用也血虛者宜四物輩而血實者則手拈失笑之類可用也尋常之痰可用二陳而頑痰膠固致生怪症者自非滾痰之類不濟也些小之郁可用越鞠逍遙輩而五郁相混以致腹膨腫滿二便不通者自非神佑承氣類弗濟也大抵尋常治法取其平和病勢堅強必取峻劑以攻之若一味退縮則病不除不察脈氣不識形情浪施攻擊為害尤烈務在平時將此氣血痰郁四字反復討論曲盡其情辨明虛實寒熱輕重緩急一毫不爽則臨症灼然而於治療雜症之法思過半矣傷寒傳變六經必須熟識內經曰人之傷於寒也則為病熱雖病不死其兩感於寒病必不免於死蓋傷寒一日巨陽膀胱受之巨陽者諸陽之所屬也其脈連於風府而為諸陽主氣故頭項痛腰脊強二日陽明胃受之陽明主肉其脈俠鼻絡於目故身熱目痛而鼻乾不得臥也三日少陽膽受之少陽主膽其脈循脅絡於耳故胸脅痛而耳聾四日太陰脾受之太陰脈布胃中絡於嗌故腹滿而嗌乾五日少陰腎受之少陰脈貫腎絡於脾脾系舌本故口燥舌乾而渴六日厥陰肝受之厥陰脈循陰器而絡於肝故煩滿而囊縮其未滿三日者可汗而已其滿三日者可泄而已其兩感於寒者一日巨陽與少陰俱病則頭痛膀胱病口乾腎病而煩滿二日陽明與太陰俱病則腹滿脾病身熱胃病不欲食譫語三日少陽與厥陰俱病則耳聾膽病囊縮肝病而厥水漿不入不知人六日死其病不兩感於寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思飲食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縮少愈六氣皆去病自已矣然此言其常耳或始終只傳一經者或越經而傳者或初入太陽不作鬱熱便入少陰而成陰症者或直中陰經者有合病者有並病者有日傳二經陰陽互病為兩感者或汗下有差而傳至於六經者臨症之際可不審察乎霜降後至春分前感寒而病者名曰傷寒其病頭項痛腰脊強發熱者太陽症也膀胱經無汗惡寒此寒傷榮血脈來浮緊有力麻黃湯主之有汗惡風此風傷衛氣脈來浮緩無力桂枝湯主之太陽病項背直強無汗惡風名曰剛痙葛根湯主之又太陽與陽明合病必自下痢下痢里症也俗呼為漏底不治仲景蓋以邪氣並於陽則陽實而陰虛故下痢也與此湯以散表邪則陽不實而陰氣平痢不治而自已矣太陽病無汗惡寒脈來不緊而緩此傷寒中風也大青龍湯主之太陽隨經之邪直達膀胱小便不利其人如狂者此太陽不傳他經自入其腑也五苓散主之傷寒眼眶痛鼻乾不得眠脈來微洪者陽明症也無汗惡寒發熱者表有寒邪也升麻葛根湯主之身熱渴而不解或經汗過不解白虎湯主之傷寒耳聾脅痛寒熱往來口苦而嘔脈弦者少陽證也小柴胡湯主之傷寒腹硬滿而痛咽乾而渴手足溫暖脈來沉而有力者桂枝大黃湯主之若腹滿自痢脈沉而細者附子理中湯主之寒熱往來脅痛口苦尚在而又大便難者大柴胡湯主之陽明症具大便祕譫語脈實者調胃承氣湯主之傷寒便實譫語咽乾口燥心下硬而繞臍痛脈沉數實者少陰症也六乙順氣湯主之少陰本無熱而反發熱脈沉而遲者麻黃附子細辛湯助陽而汗之傷寒煩滿囊縮便堅消渴舌卷手足乍冷乍溫脈沉實者厥陰症也大小承氣湯主之若厥冷耳聾囊縮脈沉而弦者少陰兩感不治之症也此則三陰有可汗可下可溫之法也傷寒腹脹滿潮熱狂言而喘者小承氣湯主之傷寒陽邪入里痞滿燥實者堅閉俱全者大承氣湯主之傷寒外症已解小腹急大便黑小便利其人如狂者有蓄血也桃仁承氣湯主之傷寒下之早熱結胸中按之則痛者小結胸也小陷胸湯主之傷寒下之早從心下至小腹硬老書上鞭滿而痛不可近者大結胸也大陷胸湯主之傷寒下之早胸滿而不痛為痞半夏瀉心湯主之傷寒心下痞汗出惡寒者附子瀉心湯主之傷寒中風醫反下之其人下痢日數行完穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不安者生薑瀉心湯主之傷寒身目發黃小便不利大便實發渴或頭汗出到頸而還脈來沉實者茵陳湯主之傷寒血熱發斑者裡實表虛也人參白虎湯主之一名化斑湯傷寒汗吐下後煩躁口渴陽厥極深者表裡大熱也黃連解毒湯主之傷寒瘥後食復勞後者梔子豆豉湯主之傷寒病後不得眠此心膽虛也溫膽湯主之傷寒汗下後昏悶不省人事者獨參湯主之中寒附中寒者寒邪直中三陰經也比傷寒尤甚若不急治死在旦夕其病初起無頭痛無身熱就便怕寒四肢厥冷或腹痛吐瀉或口吐痰沫或流冷涎或戰栗面如刀刮引身踡臥不渴脈來沉遲無力如寒中太陰脾則中脘痛理中湯主之寒中少陰腎則臍腹痛五積散主之寒中厥陰肝則少腹痛四逆湯加當歸又曰直中三陰惡寒身冷色青不渴大小便自利其脈沉遲人皆可曉如或反常則難知也若身熱面赤大小便少利口乾醫家至此但察其脈勢雖大來意虛豁力薄不渴或沉滑而微形氣有不足之象俱為寒症或服冷藥太過身熱不退亦然此非真熱乃假熱也蓋因寒邪太盛逼出虛火遊行外內經云陰盛格陽若不用心而用苦寒之藥立死無疑傷寒脈法陽症見陰脈者死陰症見陽脈者生陽者脈大而有力不亂陰者脈小而虛微至亂內傷真陰症附凡房勞傷腎生冷傷脾內既伏陰外又感寒比之中寒更重亦有寒傷陽症過服涼藥而變成者其五六日後漸見精神恍惚身倦懶言頭額手背冷汗時出舌上生苔淡黑冷滑心下結硬如石四肢寒冷如冰唇青甲黑鼻如煙煤腹痛吐利咽痛睛疼身如被杖囊縮舌卷者宜溫經之劑回陽散返陰丹並外灸丹田氣海兩穴數壯瘟疫感冒四氣務要先明春應溫而反寒夏應熱而反涼秋應涼而反熱冬應寒而反溫此天時不正之氣也人感此氣而為病則長幼之病皆相似者名曰瘟疫病也其病初起憎寒壯熱頭疼身痛口渴惡寒不治以人參敗毒散表之小柴胡湯和解之里症見者大柴胡湯下之疫病日久寒熱不除皆是風寒不清疫結脾家也當用常山草果知母檳榔之劑以開其痰癖宿食一劑而愈衆人病一般者先各飲藿香正氣散一碗以防疫發內傷脾胃者辨有餘與不足人之有生以脾胃為主脾胃者以五行為土土生萬物為陽氣之原也或勞役過多飲食不節致傷脾胃脾胃受傷則陽氣下陷陰火上升而為內熱名曰內傷症也法當辨其有餘與不足如勞役太過心煩事冗忘於飲食因飢餓而成者此不足也其證四肢懈散倦怠嗜臥少氣不足以息甚則氣高而喘身熱而煩氣口脈豁大而無力宜補中益氣湯主之如勞役太過始因事冗而不食事畢而過餐則食不能化停滯而發熱此不足中繼以有餘其症胸膈痞滿惡聞食氣甚則身熱頭痛氣口脈緊急而有力宜以枳實丸消導為先而補脾次之又有內傷而挾寒者此亦不足之中而繼之有餘也治以散邪為主而補氣佐之又有內傷而挾房勞者此不足之中而又加之不足也治以調榮為主而溫術佐之傷食暴病附凡人醉飽之後或感風寒或著氣惱飲食填塞胃氣不行忽如中風口不能言目不能開四肢不舉若作中風中氣治之而用驅風解表行氣化痰之藥則胃氣重傷死在旦夕內經有暴病暴死之症多有因於食者前輩不曾明言故人不識今遇此等症須審問明白若方飲食醉飽或纍傷飲食但覺胸膈有食滯者只作傷食治之急煎生薑淡鹽湯多飲探吐之吐出飲食即愈然後調理枳實丸論附人之一身脾胃為主胃陽主氣脾陰主血胃司納受脾司運化一納一運化生精氣津液上升糟粕下降斯無病矣人惟飲食不節起居不時損傷脾胃胃損則不能納脾損則不能化脾胃俱損納化俱難元氣斯弱百邪易侵而飽悶痞積關格吐逆腹痛瀉痢等症作矣況人於飲食豈能一一調節或有傷脾胃便損飲食減常元氣漸憊矣故潔古制枳朮丸東垣發脾胃論使人常以調理脾胃為主也後人稱為醫中王道厥有旨哉近世論治脾胃者不分陰陽氣血而率皆理胃所用之藥又皆辛溫燥熱助火消陰之劑遂致胃火益旺脾陰受傷消絶沖和之氣變為燥熱胃脘乾枯大腸燥結脾藏漸絶而死期迫矣殊不知脾屬土為濕位居長夏故濕熱之病十居八九況土旺四季寒熱溫涼各隨其時豈可偏用辛熱之劑哉今舉枳朮方立加減法於後外感熱病者知夏熱與春溫發熱之病霜降後至春分前感寒即病者名曰傷寒症也春分至夏至前者名曰溫病也夏至後至處暑前者名曰熱病也又有非時暴寒感至而病者名時行瘟疫今人通謂四時傷寒殊不知冬時傷寒其寒邪自外而入故仲景用麻黃桂枝發表之重劑春夏發熱之病其由冬時傷寒感不即發寒毒藏於肌膚至春發為溫病至夏發為熱病其寒邪自內而出故潔古用防風羌活解表之輕劑若夫春夏秋三時感冒所謂非其時而有其氣但宜疏表利氣之藥如香蘇散芎歸散十神湯參蘇飲之類以疏表氣而已卒中風因有四端治分三法內經曰風者百病之長也腠理閉拒雖有大風苛毒弗之能害又曰邪風之至疾如風雨故人中之則卒然倒僕矇昧喎僻不省人事痰涎壅盛或口噤不語或口眼歪斜或左癱右瘓此為中風之候也劉河間曰中風癱瘓者非謂肝木之風亦非外中之風良由將息失宜心火暴甚腎水虛衰則陰虛陽實而熱氣拂鬱心神昏冒筋骨不固而卒倒無所知也李東垣曰中風非外來風邪乃本氣自病也凡人年逾四旬氣衰之際或因喜怒憂忿傷其氣者多有此症壯歲之時無有也若肥盛者間而有之亦是形盛氣衰故耳朱丹溪曰西北氣寒為風所中誠有之矣東南氣溫而地多濕有風者非風也皆是濕生痰痰生熱熱生風也觀夫內經主於風河間主於火東垣主於氣丹溪主於濕蓋內經言中風之症三子言中風之因也東垣又云中風有中腑中臟中血脈之分中腑者多著四肢面加五色脈浮而惡風寒四肢拘急不仁或中身之前或中身之後或中身之側皆曰中腑其治多易中臟者多滯九竅故唇緩失音耳聾鼻塞目瞀大小便祕結皆曰中臟其治多難中血脈者口眼歪斜三者治各不同若中血脈者則外有六經之形症宜從小續命湯以發其表調以通聖散辛涼之劑若中腑而內有便溺之阻隔則從三化湯以攻其里然汗下又不可太過汗多則亡陽下多則亡陰亡陽則虛其衛亡陰則虛其榮此又不可不曉也如外無六經之形症內無便溺之阻隔但手足不遂言語蹇澀者此邪中於經也宜大秦艽湯羌活愈風湯以補血養筋故云治風宜活血血行風自熄此之謂也內經又云風之所中其氣必虛夫中身之前者足陽明胃經之虛也中身之後者足太陽膀胱經之虛也中身之側者足少陽膽經之虛也左半身不遂者血虛也右半身不遂者氣虛也左癱右瘓者氣血俱虛也因其虛則風邪侵襲痰火流注初中之時切不可因其虛而驟補之蓋用參耆阻塞風痰道路當治以疏風利痰之藥為君而以順氣養血之藥為臣更以引經之藥為使則得之矣中風痰厥昏迷卒倒不省人事者先以皂角末捻紙條燒煙衝入鼻中有嚏可治無嚏難治隨用吐痰法將牙皂末五分半夏白礬各三分為細末薑汁調服探吐後隨服導痰湯治之半身不遂左曰癱右曰瘓或屬瘀血或血虛在左用四物湯加桃仁紅花竹瀝薑汁在右用四君子湯加半夏陳皮竹瀝薑汁自汗多者加黃耆為君少用茯苓半夏佐以附子行經也口眼歪斜無他症者用白附子白殭蠶全蠍俱生用為末每服二錢酒調下又用萆麻子一兩冰片三分共搗為膏寒月加乾薑附子各一錢如歪在左敷右在右敷左或用蜣螂末片敷之或以蟺血敷之皆效中風舌強不能言語用青黛硼砂薄荷各二錢冰片牛黃各三分為極細末先以蜜水洗舌後以薑汁擦之將藥蜜水稀調舌上內服神仙解語丹中風口噤不開不能下藥用烏梅肉擦其牙關牙關痠軟則易開矣或藜蘆末又佳麝香每用五分水調灌入鼻內吐之凡中風口開者為心絶手撒者為脾絶眼合者為肝絶遺尿者為腎絶聲如鼾睡者為肺絶汗出如油者為無氣肉脫筋痛者為無血兩目直視搖頭上竄面赤如妝汗出如珠者皆不治之症也中風脈弦浮遲則吉急實數大則難治矣癘風附癘風者乃惡風沿入臟腑血肉皆死內生細蟲食人脂膏也第一死人身上蛆炒乾為末好酒送下為妙不可得用白花蛇全蠍大楓子益母草胡麻牙皂防風荊芥羌活獨活白芷當歸山甲姜蠶等分為末煉蜜丸服神效一法用桃柳桑楮槐五般枝煎洗俟湯如油出浴東坡四神丹治大風神效羌活元參當歸熟地等分丸酒下腳氣五積散加減破傷風亦有四種治列三經破傷風症或為跌打損傷風邪乘間而客之或為瘡瘍久不合口風邪乘隙而襲之或用熱湯淋洗或艾火灸之其湯火之氣亦與風邪無異其為症寒熱間作甚則口噤目斜身體強直角弓反張死在旦夕甚可畏也脈浮無力太陽也汗之而愈脈長有力陽明也下之而愈脈緊而弦少陽也和解而痊若傳變入理則不治矣破傷風身體強直牙關緊急者用蟬蛻五錢為末酒調服即效中暑有動靜之異二種夏至後病熱為暑張潔古曰動而得之為中暍靜而得之為中暑豫老中暍之病其因勞役於外曰色暴其肌膚熱氣入於鼻竅肺經受傷其症身熱頭痛灑然毛聳微寒口開齒燥舌苔煩渴宜人參白虎湯治之中暑之病其由安處家庭行走閭巷驀然鬱熱熏蒸口吸暑氣心包絡受傷其症煩渴自汗面垢脈虛或腹痛吐瀉或嘔噦躁悶重則昏不知人宜香茹飲治之或夏月攤曬衣服書冊乘熱收藏日後用時吸其熱氣卒然心腹疼痛霍亂吐瀉亦謂之中暑亦用香茹湯夏月有四症傷寒傷風脈症五見中暑熱病疑似難明脈緊惡寒謂之傷寒脈緩惡風謂之傷風脈實壯熱謂之熱病脈虛身熱謂之中暑臨症之際切要詳明七劑一差天淵相隔矣受濕有內外之分二種丹溪曰六氣之中濕熱為病十居八九有外感而得之矣有內傷而得之者或居卑濕或早行霧露或冒雨涉水或汗衣濕履則濕從外感者也或恣飲酒漿過飧生冷則濕從內傷者也又曰飲食入胃無非濕也脾土旺則能運化水穀上歸於肺下輸膀胱無濕氣之可留也惟夫脾弱不能運化水穀亦謂之濕也治濕之法古人惟以利水為主豫謂必當因其症而藥之不可執一濕氣在於皮膚者宜用麻黃桂枝防己蒼白朮之類以攻下之譬如水滿溝渠非導之不去也寒濕在於肌膚筋骨之間拘攣作癰或麻痹不仁者宜用乾薑附子丁香肉桂之類以溫其經譬如太陽中天則陰濕自干也濕氣在於藏腑肌膚之間微而不甚者宜用蒼白朮厚朴半夏木香桑皮之類以健脾燥濕譬如些老書上此微之濕以灰土絶之則濕自干也又濕氣在於小腸膀胱之間或腫或渴或小水不通宜用澤瀉豬苓滑石茵陳木通葶藶車前海金砂之類以滲泄之譬如水滿溝澮非疏通之其竇不達也濕氣在於皮膚者宜防風白芷羌活獨活之風藥以勝濕譬如清風薦爽濕氣自消也熱傷血不能養筋故大筋軟短而為拘攣濕傷筋不能束骨故小筋弛長而為痿弱矣濕在上宜微汗濕在中宜利小便濕在下宜升提利小便自外而入宜汗散久則疏通滲泄之火有七說丹溪曰五行各一其性惟火有二曰君火曰相火君火者心火也相火者命門火也此二火出於天造又有五志之火大怒則火起於肝悲哀動中則火起於肺醉飽過傷則火起於脾房勞過度則火起於腎思想無窮則火起於心此五火出於人為蓋水火者人生之陰陽也一水豈能濟七火哉故火常多而有虛實之辨脈浮而虛者為虛脈細而小者為實洪而有力者易治沉而細者難治夫火之為病不特五臟十二經中凡氣有餘何莫非火也諸風掉眩脅痛目赤肝火動也柴胡黃連主之口舌生瘡諸痛癢瘡瘍心火動也黃連主之諸濕腫滿口瘡口臭脾火動也芍藥主之諸氣憤郁乾咳鼻衄肺火動也山梔枯芩主之遺精白濁赤濁便泄夢遺腎火動也知母主之目黃口苦坐臥不寧膽火動也柴胡主之癃閉淋瀝赤白帶濁小腸火也木通主之牙痛齦宣頰腮頤腫胃火動也石膏主之舌苔喉痛便閉不通大腸火也條芩主之小腹作痛小便不利膀胱火也黃柏主之頭眩體倦手足心熱三焦火也柴胡黃芩主之陽事頻舉精濁不止命門火也知母黃柏主之凡此皆苦寒之味但能瀉有餘之火耳以上是實火以下是虛火若夫飲食勞倦內傷元氣為陽虛之病又當以甘溫之劑補之如人參黃耆之屬若陰微陽強相火熾盛以乘陰位日漸煎熬為血虛之症以滋陰之劑濟之如當歸地黃之屬心火亢盛鬱熱內實為陽強之病以鹹冷之劑壯之如大黃芒硝之屬若腎水受傷真陰失守無根之火為陰虛之病以壯水之劑制之如生地玄參之屬若命火衰為陽脫之病以溫熱之劑濟之如附子乾薑之屬若胃虛過食生冷抑遏陽氣於脾土之中為火鬱之病以升散之劑發之如升麻葛根之屬痰有十因痰者津液之別名也痰不自生因有故而生或因風或因寒或因熱或因濕或因暑或因燥或因酒積或因食積或因脾虛或因腎虛今之治痰者但知南星半夏不能治痰之因故痰不去也必當審其因而藥之則無不瘥矣夫因風而生者痰吐涎沫其脈浮弦治以前胡旋覆花之類因寒而生者痰吐清冷其脈沉遲治以乾薑肉桂之類因熱而生者痰吐膠黃其脈洪數治以芩連梔膏之類因濕而生者痰吐碧緑其脈浮緩治以蒼朮白朮之類因暑而生者痰吐腥臭其脈虛微治以香茹厚朴之類因燥而生者痰吐如線或如小珠或如膠漆咳嗽難出其脈澀數治以瓜蔞天花貝母之類因酒積而生者其吐嘔惡清晨發嗽治以葛花豬苓之類因食積而生者痰吐如桃膠蜆肉之狀胸腹悶而不安治以香附枳殼神麯麥芽之類因脾虛而生者痰吐之時即如潮湧咳發於五更之際治以天門冬五味子之類因腎虛而生者吐有紅絲血縷遇夜發熱熱過即冷時出盜汗夜臥恍惚治以參耆歸芍熟地茯苓五味阿膠半夏炙草之類然此皆輔佐之藥而君主之劑二陳湯又不可少也痰飲附痰屬濕如津液所化因風寒濕熱之感或七情飲食所傷以致氣逆液濁變為痰飲或吐咯上出或凝滯胸膈或留聚腸胃或客於絡經四肢隨氣升降遍身上下無處不到其為病也為喘為咳為噁心嘔吐為痞膈壅塞關格略異病為泄為眩暈為嘈雜怔忡驚悸為癲狂為寒熱為腫痛或胸膈轆轆有聲或背心一點常如冰冷或四肢麻痹不仁皆痰所致百病中多有兼痰者世所不知也痰有新久輕重之殊新而輕者形色清白稀薄氣味亦淡久而重者黃濁稠黏凝結咳之難出漸成惡味酸辣辛苦甚至於帶血而出治法痰生於脾胃宜實脾燥濕又隨氣而升宜順氣為先分導次之又氣升屬火順氣在於降火熱痰則宜清之濕痰則宜燥之風痰則散之郁痰則開之頑痰則軟之食積則消之在上者吐之在中者下之又中氣虛者宜固中氣以運痰若攻之太重則胃氣虛而疾愈重矣治宜加味二陳湯化痰丸論附人之一身氣血清順則津液流通何痰之有惟其氣血濁逆則津液不清熏蒸成聚而變為痰焉痰之本水也原於腎痰之動濕也主於脾古人用二陳湯為治痰通用者所以實脾燥濕治其標也然以之而治濕痰寒痰痰飲痰涎則用是矣若夫痰因火上肺氣不清咳嗽時作反老痰鬱痰結成黏塊凝滯喉間吐咯難出此等之痰皆因火邪炎上熏於上焦肺氣被郁故津液之隨氣而升者為火熏蒸凝結濁鬱而成歲月積久根深蒂固故名老名郁而其原則火邪也痰在上焦心肺之分咽喉之間非中焦脾胃濕痰冷痰痰飲痰涎之比故湯藥難治亦非半夏茯苓蒼朮枳殼南星等藥所能治也惟在開其鬱降其火清潤肺經而消化凝結之痰緩以治之庶可效耳今制化痰丸於後氣有九論氣者一身之主也內無七情所傷外無寒暑所犯則一氣周流而百骸舒暢者也如有七情之所幹寒暑之所觸則氣之變亂百病生矣內經曰怒則氣上喜則氣緩悲則氣滯恐則氣下驚則氣亂勞則氣耗思則氣結寒則氣收暑則氣泄九氣不同為症亦異張子和論之詳矣豫不復贅始以氣之虛實論之夫實者邪氣實也虛者正氣虛也氣虛為病或精神短少或倦怠嗜臥或少進飲食或眩暈或痿蹙或自汗或泄瀉或遺脫之病生焉審其症候診其脈息果是氣虛則人參黃耆白朮之類必當用也若夫心痛脅痛小腸氣痛此則邪氣實也作有餘治之因寒者散寒為先因熱者清熱為主因痰者利痰因食者消食因血者治血去其邪氣則正氣自通而痛不作矣切不可驟用參朮丹溪曰諸痛不可補氣氣旺則其痛愈甚豫又見痛病日久胃氣漸衰病氣不減者此皆醫家不明認病不的血病治氣氣病治血痰病治食食病治痰如此差誤病根不去正氣反損為今之治又當以補氣之藥為主去邪之藥為佐丹溪曰氣虛不補氣何由行內經曰壯者氣行而愈怯者著而成病正此謂也又曰氣屬陽調氣之藥必用溫散如沉香木香茴香藿香白豆蔻陳皮香附砂仁之類如病日久則氣從火化而溫熱之劑又不可以單投必以芩連梔柏之類為主而少加熱藥為嚮導又問氣者血之先血者氣之配氣既病焉則血不得以獨利故亦從而病也是以治氣藥中必加理血之藥如當歸芍藥川芎紅花桃仁必選用郁有六名丹溪曰氣血沖和百病不生一有抑鬱諸症生焉大抵諸症中多有兼郁者或郁久而成病或病久而生郁故凡治病必以郁參治之郁有六氣血痰火濕食也氣鬱者胸脅痛脈沉澀血鬱者四肢無力能食便紅脈沉芤結濕鬱者周身走痛或骨節痠痛遇陰寒而發脈沉細緩火鬱者瞀悶尿赤脈沉而數食鬱者噯酸飽滿不喜飲食人迎脈平氣口脈盛痰鬱者動則喘滿寸脈沉滑治以六郁湯越鞠丸主之濕加白朮白芷羌活茯苓氣加木香檳榔食加山楂砂仁血加桃仁紅花熱加柴胡黃芩青黛痰加半夏南星海石瓜蔞仁春加防風夏加苦參秋冬加吳萸瘧犯暑風更兼痰食十五種內經曰夏傷於暑秋必痎瘧又曰瘧發時耳聾脅痛寒熱往來口苦而嘔脈弦者名風瘧小柴胡湯主之獨寒無熱脈遲者名曰牝瘧七棗湯主之獨熱無寒脈數者名曰疸瘧香茹飲或白虎湯加人參先寒後熱腰背頭項疼痛者名曰寒瘧荊防敗毒散先熱後寒邪氣與汗皆出者名曰濕瘧白虎湯加桂枝一身盡痛手足沉重寒多熱少脈濡者名曰濕瘧柴平散口苦咽乾大小便赤澀熱多寒少脈數者名曰暑瘧清脾飲因飲食飢飽傷胃而成者名曰胃瘧人參養胃湯因山嵐海瘴乍寒乍熱者名曰瘴瘧平胃散加藿香石菖蒲生薑痰多胸滿發時昏亂譫語脈弦滑者名曰痰瘧二陳湯加常山草果柴胡黃芩胸膈不寬惡聞食氣脈實者名曰食瘧清脾飲加山楂神麯麥芽痰滯胸腹熱多寒少大便燥實者大柴胡湯下之經年不愈者痎瘧也補中益氣湯微勞即發連綿不止者勞瘧也小柴胡加天花粉去半夏瘧發於夜者因風暑入於陰分宜用血藥引至陽分而散如川芎當歸紅花蒼朮白芷黃柏甘草水煎露一宿服邪伏肝經肋下有塊者名瘧母用丸藥消導之醋炙鱉甲為君三稜蓬朮香附海石青皮桃仁紅花神麯麥芽隨症加減為丸截瘧方用常山草果檳榔知母各一錢熱酒一鍾浸露一宿臨發五更溫服久瘧不愈用常山一錢五分檳榔一錢丁香五分烏梅三個好酒一鍾浸一宿臨發早服一服即止永不復發瘧疾無汗要有汗散邪為主有汗要無汗正氣為本不可一二發便截截則邪氣閉塞變成壞症又不可遲截遲則中氣虛弱病邪已深而難治當在三四發之後截則為妙瘧痞法用阿魏膏須犬皮攤甚佳因犬屬陽大熱之物故也不愈真蓍艾當頂灸三壯則使痞氣消而瘧頓止之疒白小如灸之偏邪恐難取效日久沿過其時灸亦無益瘧脈自弦弦數多熱宜清之弦遲多寒宜溫之遲緊者下之浮大者吐之弦短者傷食弦滑者多痰微則為虛代則為死痢因濕熱及受積停三種痢疾之症裡急後重或膿或血或膿血相雜或痛或不痛此其候也原其所因濕熱食積三者傷於氣分則下者白傷於血分則下者赤氣血俱傷則赤白相雜黃色者食積黑色者濕勝也劉河間曰和血則便膿自愈調氣則後重自除又曰後重則宜下腹痛則宜和身重則除濕脈弦則去風膿血稠黏以重藥竭之身冷自汗以熱藥溫之風寒外來宜汗之騖溏為利宜溫之初起大便膿血裡急後重者芍藥湯白痢溫六丸赤痢清六九赤白相雜兼裡急後重者立效散痢疾初時失下反用固澀之藥以致邪熱內蓄血不得行腹痛欲死者桃仁承氣湯痢疾發熱腸胃中有風邪也敗毒散加黃連陳倉米煎服及治時行疫痢噤口不食加石蓮肉七枚下痢日久赤白已盡虛寒脫肛真人養藏湯粟殼訶子肉蔻當歸肉桂木香白朮白芍人參甘草夏秋泄瀉瘧痢同乎一源多由暑濕傷脾所致飲食讒傷便作泄瀉為輕停滯既久變成瘧痢為重而瘧與痢又有分別飲食為痰充乎胸膈則為瘧飲食為積膠乎腸胃則為痢古云無痰不成瘧無積不成痢故當初起人強積盛之時輕則三稜莪朮檳榔枳實青皮陳皮木香之類重則酒製大黃利之不可姑息猶養虎遺害焉因有病者病當之無損於人也若因循日久元氣已虛積氣猶盛攻補莫施便成壞症況諸痢疾雖屬裡症多染時行故七日前甚者積多人壯雖早不死善於調理七日後其症當漸愈若初起不甚人多忽略七日之後積氣逗留人衰胃弱痢勢大作每多難治不可不知須知寒者必虛熱者必實更以虛實細詳之而寒熱愈明矣脹滿惡食急痛懼按者實也煩渴引飲喜冷畏熱者熱也脈弦而實者實也脈數而滑者熱也外此皆屬寒矣然相似之際尤當審察如以口渴為實熱似矣不知凡系瀉痢必少津液液亡於下則津涸於上安得不渴更當以喜熱喜冷分虛實也以腹痛為實熱似矣不知痢出於臟腸胃必傷膿血剝膚安得不痛更當以痛之緩急按之可否腹之脹與不脹脈之有力無力分虛實也以小便之黃赤短少為實熱似矣不知水從痢去溲必不長液以陰耗溺因色變安得不小便赤少更當以色之澤與不澤液之涸與不涸分虛實也以裡急後重為實熱似矣不知氣陷則傳運不健陰亡則腸潤乃枯安得不裡急後重更當以病之新久質之厚薄脈之強弱分虛實也則病無遁情矣世之病痢者十有九虛醫之治痢者百無一補氣下陷而再行其氣後重不益重乎中本虛衰而復攻其積元氣不愈竭乎濕熱傷血者自宜調血若過行推蕩陰血不轉傷乎津亡作渴者自宜養陰若但與滲利津液不轉耗乎世有庸工專守痛無補法且口不宜補早不知因虛而痛者愈攻則愈虛愈痛每見有形之疾病未除而無形之元氣先脫悔之晚矣故脈來微弱者可補形色虛薄者可補疾後而痢者可補因攻而劇者可補尤有至要者則在脾胃兩臟如先痢而後瀉者為腎傳脾微邪易治先瀉而後痢者為脾傳腎賊邪難醫是知在脾者病淺在腎者病深夫腎主禁固腎為胃關未有久痢脾虛而腎陰不損腎陽不亡者四君歸脾十全補中皆補脾虛未嘗不善若病在火衰土位無母非桂附大補命門火以復腎中之陽以救脾之母則飲食何由而進門戶何由而固真元何由而復耶如畏熱不前僅以參朮補土多致不起大可傷也又有一等陰虛似痢者即五泄中大瘕泄是也經曰裡急後重數至圊而不能便必莖中痛其症紅白相雜裡急後重悉以痢疾必小便短澀痛或不通而痛或欲小便而大便先脫或欲大便而小便自遺兩便牽引而痛腎虛之危症急以八味地黃加補骨脂肉豆蔻阿膠兼理中湯加升麻桂附相繼間服庶可挽回世以痢藥致斃者不可枚舉王肯堂治痢法用以黃連黃芩白芍楂肉各一錢二分厚朴檳榔枳殼青皮各八分當歸甘草地榆各五分酒洗紅花三分桃仁炒研六分木香二分水煎空心下紅白身熱者俱可服單白無紅者去地榆桃仁加橘紅四分廣木香二分澀滯者酒炒大黃二錢一二劑服之即除此方用於三五日及旬日內神效惟十日半月後當加減於後用川連黃芩白芍三味酒炒各六分生用各四分楂肉一錢厚朴陳皮青皮檳榔各四分甘草炙三分生二分當歸五分地榆四分桃仁六分紅花三分木香三分延至半月餘脾胃虛滑者用酒炒芩連白芍各六分陳皮厚朴木香各三分醋炒地榆四分紅花二分當歸人參白朮炙草各五分有胎婦人去紅花桃仁檳榔隨用輒效間有不效者必補劑太早邪氣在內纏綿已久欲補而澀之則助邪清而疏之則愈滑遂至不可救療者初投溫補故也戒之戒之故治痢惟清熱一忌溫補恐蘊熱為害也一忌大下恐傷胃氣也一忌發表恐表虛且燥劑助熱也一忌分利小便恐澀滯愈甚且異治水瀉之法也痢疾之脈宜微小不宜浮洪宜滑大不宜弦急宜身溫不宜身熱又不宜身冷下痢純血者如塵腐色者如屋漏水者大孔開如竹筒者唇如硃紅者俱死如魚腦髓者半生半死先水瀉而後膿血者此脾傳腎賊邪難愈先膿血而後水瀉者此腎傳脾微邪易愈嘔吐者胃氣逆而不下九種有聲者為嘔有物者為吐聲者氣與火也物者痰與食也或為寒氣所中或為暑氣相干或惱怒氣逆或飲食過傷或蛔蟲作痛或久痛胃虛凡此數者皆能令人嘔吐耳大抵脈虛而細者吉脈實而大者凶治以二陳湯為主胃寒者水漿不入脈息沉遲加乾薑肉桂丁香益智仁之類傷暑者煩渴面垢脈虛身熱加川連扁豆香茹厚朴之類氣逆者怒則肝火出胃嘔而口苦脅不利脈弦而數加香附石膏芍藥姜炒川連竹茹之類傷食吐者吐出餿酸臭氣加山楂神麯草果麥芽砂仁枳實之類飲酒過多而嘔吐者加乾葛神麯麥芽豬苓澤瀉之類蛔蟲上攻而嘔吐者加烏梅川椒黃柏乾薑白朮蓋蛔蟲得苦而頭伏見酸則軟久病胃虛聞穀氣而嘔者加人參白朮伏龍肝藿香之類積痰在胃而嘔吐加南星枳實竹瀝薑汁瘀血在胃而嘔吐加桃仁泥生韭汁調服孫真人曰嘔家聖藥是生薑凡嘔吐必宜加生薑汁熱嘔宜加烏梅食痹症附二種食痹者食已則心下痛吐出乃止此由胃脘痰積故惡血留滯於中所致薤白半夏湯治之噁心附六種噁心者無聲無物但心中兀兀然無奈欲吐不吐欲嘔不嘔此病在胃口有寒有熱有痰火有胃虛有食積有水飲治法與嘔吐同亦二陳湯加減泄瀉者脾氣傷而不平十種泄瀉之病四時感受不同或因風寒濕所幹或因七情飲食所犯動傷脾氣故作泄瀉治當分其新久審其原因新則伐邪之藥為主而健脾之藥為佐久則以補脾之藥為君而升提之藥為佐豫曾辨症用藥確然有驗者録於後瀉下青色腹痛脈弦者挾風也宜羌活防風之類瀉下白色腹痛脈遲四肢清冷小便澄徹者挾寒也宜乾薑肉桂附子之類瀉下焦黃色口渴煩躁脈虛身熱挾暑也宜黃連扁豆香茹之類瀉下清冷或如塵腐水色腹不痛身體重倦怠無力脈沉而緩者濕也宜蒼朮白朮厚朴之類瀉下穀肉不化酸臭異常胸膈飽悶惡聞食氣瀉後痛減者傷食也宜山楂草果神麯麥芽萊蔔子之類瀉下或多或少或瀉或不瀉或如魚凍者挾痰也宜南星半夏之類青州白餅子治之用半夏七兩南星白附子各三兩川烏去皮臍五錢為丸腹痛腸鳴瀉如熱湯痛一陳瀉一陳者火也宜滑石木通黃芩山梔之類小水不利者當分陰陽小便長則大便自實宜赤苓滑石豬苓澤瀉木通之類如泄瀉久者又不可用用之則損陰氣常見眼胞下陷而死以上皆伐邪之藥也大抵脾胃之氣上升則為生長之令脾胃之氣下降則為收藏之令如飲食入胃不住完穀不化腹不痛者氣虛也宜四君子倍加白朮黃耆升麻柴胡防風之類補以調之又瀉久穀道不合或脫肛此元氣下陷及大腸不行收令而然用白朮白芍神麯陳皮肉豆蔻訶子肉五倍子烏梅肉為丸以四君子湯加升麻煎湯送下泄瀉腹痛不止者肝實脾虛也用炒白朮二錢炒芍藥二錢防風一錢炒陳皮一錢半水煎服又有每夜子時後五更前作瀉者乃腎虛作瀉也宜用肉果破故紙五味子以補腎凡泄瀉初起須用消食利水之藥三四劑而後調理脾胃則可若就服參耆等甘溫之劑能生濕熱而反助病邪久則濕熱甚而為疸病又泄瀉久不止者多由泛用消食利水劑損其陰真元氣不能自持遂成久瀉須用參苓白朮散補中益氣湯補其本元諸書皆以泄瀉宜利小便此不易之論若久瀉脾虛陽氣衰弱伏於陰中而用淡滲之藥降之是益其陰而重竭其陽陽愈削而精神愈衰矣宜用升陽風藥以羌活獨活升麻柴胡防風甘草治之大法云寒濕之症勝取風以平之又云下者舉之得陽氣升騰而病去矣此東垣之治法也壬午民國三十一年杏月念五日抄
