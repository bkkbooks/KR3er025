body:
  text: 卷之六病因賦中霍亂脾家傷食所致卒忽也然心腹疼痛上吐下瀉者謂之濕霍亂也屬寒者吐痢腥穢上下所出水液澄出清冷脈沉而遲四肢厥冷腹痛不喜飲食此陰邪勝也屬熱者吐利煩熱自汗口渴欲飲涼水脈沉而數四肢溫暖此陽邪勝也總用藿香正氣散加減治之寒加乾薑熱加姜炒黃連腹痛加官桂痛甚去藿香加吳茱萸小便不利加豬茯苓轉筋加木瓜發熱加麥冬淡竹葉若頻登圊不通利者加枳殼中暑加香薷扁豆心下痞加枳實青皮肉食不化加山楂米穀不化加神麯麥芽藿亂吐利腹痛服藥即吐者百沸湯半碗冷井水半碗合而服之即安其或心腹疼痛不吐不瀉者謂之乾霍亂也宜用鹽湯探吐吐後亦以正氣散調理如探之不吐者死在頃刻大凡霍亂之脈代伏為常微而弱者吉兆澀而數者凶殃霍亂轉筋用大蓼一握煎湯洗北人以麥糠代之使腠理開泄邪氣散而愈也霍亂已死腹中尚有溫氣者以鹽納臍中用艾灸之不計壯數蘇醒即止痞滿脾倦積濕而成痞滿者非痞塊之痞也乃胸中痞悶而不舒暢也此由脾倦不能運化飲食以致釀成痰飲留於胃脘而覺痞悶也治宜健脾燥濕順氣消食為主枳朮丸主之肥人多濕痰加半夏橘紅名橘半枳朮丸瘦人多鬱熱加橘紅黃連名橘連枳朮丸如飲食後及噯氣逆而作痞者加木香砂仁名香砂枳朮丸如脾虛不能轉運飲食不化而作痞者加人參茯苓陳皮神麯麥芽山楂名枳朮健脾丸麵食傷而作痞者保和丸尤妙保和丸神麯山楂茯苓半夏陳皮連翹蔔子麥芽不能食附不能食有虛有實虛則心下軟和宜異功散加砂仁有虛痰者六君子湯用補脾不效者宜二神丸虛則補其母也若善飢不食屬胃熱脈洪而虛者異功散加竹茹黃連脈洪而實者人參白虎湯治之咳逆者胃氣之不順咳逆者俗謂之發厄也中焦厄逆其聲短水穀之病也下焦厄逆其聲長虛邪相搏也脈之浮緩者易治弦急者必死有傷寒失下大便祕而厄者承氣湯主之有因吐利胃寒而厄者丁香柿蒂湯主之有因吐利胃熱而厄者橘皮竹茹湯主之有因飲食間或言語或思慮因而氣逆作厄者木香調氣散有因病後元氣虛弱胃氣閉而發厄者難治咳嗽者肺氣之不清治以二陳湯加減潔古曰咳者有聲而無痰傷於肺氣嗽者有痰而無聲動於脾濕咳嗽者有聲有痰因傷肺氣而動於脾濕也又曰鼻塞聲重惡寒者風寒也嗽動便有痰聲痰出嗽止者痰飲也有聲痰少面赤者火鬱也盜汗出痰多作寒熱者勞嗽也動則喘滿氣急息重者肺脹也咳嗽之病豫常驗之聲者出於肺也痰者出於胃也肺氣不清則咳嗽不絶胃氣不和則痰涎自多亦有因氣不清而吐痰者亦有因痰多而滯氣者醫者須識其致病之原主以二陳湯風加羌活防風前胡紫蘇寒加麻黃杏仁蔥白金沸草熱加黃芩山梔桑皮濕加蒼朮防己赤苓食積加山楂枳殼氣滯加蘇子桔梗不足主以二冬二母火加款冬元參黃芩痰加瓜蔞桑皮蘇子郁加苦梗紫菀枇杷葉勞嗽加參耆芍藥見血加阿膠紫菀滋陰加丹皮黃柏脾泄者以異功散加石斛五味百合薏仁腎虛以六味湯加麥冬五味枇杷葉肺脹者加白果麻黃杏仁生脈散治咳嗽日久之聖藥也加款冬花紫菀其效捷如影響有血者加阿膠生地有痰者加白朮茯苓一方久嗽不止款冬紫菀各一兩百部五錢為極細末每服三錢用烏梅生薑煎湯下食後臨臥各進一服噯氣皆由於痰火有三等治以二陳湯加減噯氣者胃中有痰有火用南星半夏石膏香附炒山梔或丸或煎任用有胃寒噯氣用二陳湯加乾薑益智木香有婦人噯氣連噯十餘聲不盡噯出則心寬不噯即緊用越鞠丸效咽酸盡屬乎食停有二種治以平胃散加減咽酸者酸水刺心也吐酸者吐出酸水也俱是飲食入胃脾虛不能運化鬱積已久濕中生熱濕熱相蒸故作酸也譬如穀肉在器濕熱則易酸矣治用平胃散加神麯麥芽山楂草果茱萸黃連枳朮燥去濕熱消化飲食則不作酸矣吐清水者用壁泥炒白朮蒼朮陳皮茯苓炒滑石等分水煎服嘈雜附有三等嘈雜者俗謂之心嘈也有胃中痰因火動而嘈者二陳湯加酒炒黃連山梔仁有心血少而嘈者八物湯加麥冬山梔仁陳皮烏梅炒米有飲食鬱而嘈者香砂平胃散治之中滿臌脹者脾虛不運中滿臌脹者四肢不腫單腹脹也有似乎臌故名臌脹此症有四曰氣臌血臌食臌水臌皆由脾虛不能運化以致停聚而為脹也治宜健脾順氣利水寬中為主切不可用火毒猛烈之藥致傷脾胃病必復來不可治矣宜用分消湯加減治之如腹脹氣急脅痛面黑者是氣臌加沉香青皮去白朮脅滿小腹脹痛身上有紅絲血縷者是血臌加當歸赤芍紅花丹皮去白朮茯苓噯氣作酸飽悶臌脹者是食臌加山楂神麯麥芽卜子去白朮茯苓惡寒手足厥冷瀉去青水者是水臌加官桂胸腹脹滿有塊如臌者是痞散皮臌加山楂神麯半夏青皮歸尾玄胡鱉甲去白朮茯苓豬苓澤瀉丹溪曰朝寬暮急者是血虛暮寬朝急者是氣虛朝暮俱急者是氣血俱虛治腫大法宜寬中行血利小水以參朮為君蒼朮陳皮茯苓為臣黃芩麥冬為使以制肝木少加厚朴以消腹脹氣不通加木香木通氣下陷加升麻柴胡以提之血虛加補血藥痰多加利痰藥隨症加減治之肥人腹脹用胃苓湯瘦人腹脹用柴芩湯二方甚捷若臍凸肉硬肚大青筋足背手掌俱平者皆不治脹滿脈弦脾利於肝洪數為熱遲弱為寒涼則為虛緊則為實浮大者生虛小者危水腫附內經曰諸濕腫滿皆屬於脾諸氣膹郁皆屬於肺蓋虛腫之由皆因脾虛不能運化水穀肺虛不能通調水道以致水漬妄行泛濫於皮膚而發為浮腫以手按之若窟舉手即滿者是也身有熱者水氣在表治當汗之身無熱者水氣在裡治當下之又云腰以上腫者宜發汗腰已下腫者宜利小便兼以順氣和脾斯為良法慎不可用大戟芫花甘遂等猛烈之藥以攻其虛症恐峻決者易固閉者難水氣復來而無可治之機矣夫腫脹有七曰風腫曰氣腫曰水腫曰血腫曰瘡腫曰病後脾虛足腫曰異鄉人浮腫風腫者皮膚麻木不仁走注疼痛分心氣飲氣腫者皮厚四肢瘦削腹脅脹滿流氣飲水腫者腰以上者腫分心氣飲腰以下腫加味五皮飲血腫者皮間有血絲紅縷婦人多有此病是敗血化為水也調經散治之瘡腫者有瘡頻浴濕熱太甚而發也大便燥者防風通聖散大便溏者人參敗毒散小水不利者五皮飲不可缺也病後脾虛足跗腫者由中氣下陷也補中益氣湯異鄉人不服水土浮腫者藿香正氣散若見大便滑泄與其唇黑缺盆平臍凸起足平背平或肉硬或手掌平或男從腳下腫而上男怕足腫女怕面腫女從面上腫而下或脈沉細皆不可治附臌脹中滿蠱脹水腫黃腫面腫眼腫足腫肢腫陰腫囊腫子腫兒腫臌脹者似臌之形外堅中空擊之有聲按之有形皮肉之急脹脾肺之大病也治當實脾理氣為要治宜二陳去甘草加楂朴白朮香附之類初起者紫蘇大腹皮久病者沉香當歸中滿者中氣之滿悶當胸之下胃口之上一掌之橫按之不痛內覺滿塞而外無形跡由忿怒太甚不能發越鬱結中州痰涎停結而成也虛痞不食大便利實痞能食大便閉虛痞以芍藥陳皮和之實痞以厚朴枳實消之蠱脹者受山嵐瘴氣或食蛇蟲蠱毒之物因感入腹聚而不散結為腹滿之症肚見青紅之紋治當利其胸胃去其惡積則蠱自除而脹可平如承氣湯加黃連甘草雄黃檳榔之類水腫者脾虛不能健運水溢於皮膚按之多冷重按多凹病腫之處青紅下陷肌肉如腐或皮膚出水起泡濕爛或射於肺則咳嗽氣急逆於脾則痰涎不利宜用實脾利水之藥如二陳加厚朴薏仁白朮澤瀉之類黃腫者皮膚黃色四肢怠惰頭眩體倦懶於作為小便短而少大便溏而頻食雖善進不能生力治當健脾為主宜二陳加參朮黃連厚朴香附之類面腫者此氣虛也蓋面為諸陽之首陽聚於面所以耐寒今面目浮腫皆因陽之不聚氣之不行停滯上焦壅塞而為腫也治當清理上焦之氣使肅清而不濁通利耳目之竅使周行而不滯如枳實二陳加花粉元粉連翹之類若脾虛者當實填脾白朮茯苓薏仁山藥濕腫者當清其濕蒼朮厚朴澤瀉茵陳有風者兼驅其風防風防己有寒者可祛其寒羌活獨活消風膈散亦可眼腫者眼泡上下腫也因脾氣空虛心事不樂怒不能越飲食不進朝夕致臥而令眼泡作腫也治宜清氣健脾之劑如二陳加歸朮青皮黃連之類足腫者謂腿足俱腫也有濕熱太盛而作腫者其色紅當清濕熱當歸拈痛湯之類有脾虛不足而作腫者其色白當養脾氣如參苓白朮散加牛膝薏仁有脾虛氣滯而不行者必有水出破則難痊當實脾為要如參苓白朮散加升麻澤瀉有病久而作腫者其腫下連足趺皮腫可治肉腫難醫當養正健脾如補中益氣加牛膝續斷有久臥而作腫者此氣不行也以行氣為要如二陳加蒼朮白朮厚朴香附有久立而作腫者此氣不順也以順氣為先如當歸續斷香附烏藥肢腫者四肢作腫也蓋四肢者脾之脈絡也脾有所郁氣血不調以致四肢作腫大抵滯於血則痛腫難移滯於氣則俯仰不便行血宜芎歸湯加丹皮白芷秦艽續斷行氣宜二陳加厚朴山楂白朮黃芩陰腫者男子陽物作腫婦人陰戶作腫皆由肝氣之不和腎氣之不泄瀉肝補腎可也治宜黃連青皮當歸芍藥山楂柴胡烏藥香附囊腫者陰囊作腫也此因脾濕聚而作腫宜利水實脾燥濕為要如蒼朴吳茱萸茴香青皮烏藥山楂青木香之類子腫者陰子大而生腫亦肝氣不和也宜清氣伐肝如囊腫之藥可用但腫而紅者去吳萸加山梔腫而冷者去山梔加吳萸偏墜亦能有用擦囊以艾葉川椒焙燥作囊袋之其濕自可以卻兒腫者婦人孕子之時面目身足作腫此脾虛成孕也宜以安胎健脾其腫自退如四物加白朮人參阿膠香附黃芩之類大抵腫之為證皆屬於脾然脾不能行氣則氣滯而腫不可專理其氣而用導泄之藥不可治其本及次其末也丹溪曰氣虛不補其何由以行經曰塞因塞用正此謂也治腫之時即以是求而為法守噎膈翻胃者氣食相凝氣留於咽嗌者為噎氣滯於胸膈者為膈食入而反出者謂之翻胃其因七情過傷飲食失節食因氣逆而食不下降氣因食阻而氣不運化氣食痰涎互相凝結留於咽膈妨礙飲食而為痞為痛為噯氣為咽酸為噎膈為嘔吐翻胃之症也丹溪曰自氣成積自積成痰痰挾瘀血遂成窠囊此症若不早治為難愈之候也初起者以安中調氣丸或枳朮丸治之又曰翻胃大率有四有氣虛有血虛有痰有熱脈緩無力為氣虛脈數無力為血虛脈滑數為有痰脈洪數為有熱通用二陳湯加薑汁竹瀝童便韭汁為主如氣虛肥白之人加人參白朮如血虛瘦弱之人四物湯加杏仁紅花如胸中覺有熱悶加土炒芩連瓜蔞桔梗如飲酒人加盧尿砂糖如因七情鬱結加香附川芎木香檳榔瓜蔞仁砂仁脾不磨者加神麯麥芽以助化之如大便燥結者加酒蒸大黃桃仁潤之噎膈仙方九伯餅皆經驗者也大抵咽膈病血液枯燥胃脘乾槁難服丸藥宜煎膏服之凡翻胃口中吐沫糞如羊尿者不治年過五十者難醫脈沉數者死最忌辛香燥熱之藥煎爍血液則胃脘乾槁是促之死耳梅核氣附梅核氣者痰氣窒塞於咽喉之間咯之不出咽之不下狀如梅核此因濕熱內郁痰氣凝結治宜開鬱順氣消痰加味二陳主之一方用韭汁一杯薑汁半杯和勻細細溫服得下漸加之喘急有虛有實有六種喘者上氣急促不能平息之謂也喉中有聲如水雞鳴者又謂之哮也大率暴病發喘謂之實久病發喘謂之虛脈滑而四肢暖者可治脈澀而四肢寒者難醫丹溪曰有痰喘有火喘有陰虛而喘有氣虛而喘有感寒而喘有傷水而喘原夫喘動便有痰聲者痰也乍進乍退得食則減食已則喘者火也氣從臍下起直衝清道而上者陰虛也呼吸短而無痰聲者氣虛也惡寒發熱脈浮緊者感寒也胸中漉漉怔忡而喘者水停心下也痰吐用瓜蔞枳實湯火喘用清肺飲加蘇子沉香貝母或白虎湯加瓜蔞仁枳殼黃芩陰虛喘用滋陰降火湯加蘇子沉香杏仁桑皮竹瀝氣虛喘用四君子湯加蘇子沉香陳皮當歸薑棗寒喘用五虎湯水喘用元武散痰火喘嗽常服玉露霜可除病根大抵患病至於發喘亦為惡候未易治也喘急隨絶者用人參二錢不去衣胡桃肉二枚水煎有效喘脹相因附有二種喘與脹相同必皆小便不利喘則必脹脹則必喘須要識標本先後先喘而後脹者主於肺先脹而後喘者主於脾何則肺金司降外主皮毛經曰肺朝百脈通調水道下輸膀胱又曰膀胱者州都之處津液藏焉氣化則能出矣是以小便之行由於肺金之降下而輸化也若肺受邪而上喘則失降下之令故小便漸短以致水溢皮膚而生腫滿也此則喘為本而脹為標治當清金降氣為主而行水次之脾土惡濕外主肌肉土能剋水若脾土受傷不能制水則水妄行浸漬肌肉水既上溢則邪反侵肺氣不得降而生喘矣此則脹為本而喘為標治當實脾行水為主而清金次之苟肺病而用燥脾之藥則脾得寒而脹愈甚矣近世治喘脹者但知實脾行水而不分別脾肺二症故為發明之痙痓有陽有陰有二種痙者徑也痓者翅也其症頸項強直腰背反張如鳥之張翅故名痙痓也一屬外感一屬內傷外感者風寒濕氣客於太陽傷其大筋筋牽而急攻令痓也然得之風濕者今人有汗不惡寒名曰柔痙得之寒者令人無汗惡寒名曰剛痙俱以小續命湯治之但有汗者去麻黃內傷者或因發汗過多或因失血大甚筋無血養則筋急而牽故令百節強直十全大補湯主之五積六聚總是氣凝其痰血有二種五臟五積六腑六聚積屬陰而有定位聚屬陽而無常形肝曰肥氣心曰伏梁脾曰痞氣肺曰息奔腎曰奔豚世人皆謂人氣塊丹溪曰塊乃有形之物氣不能成形俱是痰與食積死血也在中為痰飲在右為食積在左為死血婦人腹中有塊俱是死血不能移動者曰癥能移動者曰瘕大法咸以軟之堅以削之行氣開痰為主潰堅湯治之如左脅有塊左右二字疑倒置加青皮右脅有塊加莪朮肉食成塊加姜炒黃連食積成塊加神麯痰塊加海蛤瓜蔞去山楂飽脹加萊蔔子檳榔去白朮血塊加桃仁紅花肉桂去半夏瘦人加人參少許另服潰堅丸外貼琥珀膏或三聖膏五勞六極皆緣火爍乎天真五勞應五臟如運神機則勞心盡力謀慮則勞肝意外過里則勞脾預事而憂則勞肺矜持志節則勞腎六極應六腑血極則面枯咽腫發墮善忘筋極則拘攣轉筋爪黯甲痛肉極則體瘦肉削倦怠嗜臥氣極則喘嗽少氣皮枯毛焦骨極則面垢齒浮腰痠脊痛精極則目暗耳鳴遺濁莖弱大抵勞怯之人兮二有此六極皆因二火無制煎爍天真氣血精神日漸衰弱不能充養一身以致病成六極輕則期年而斃重則半載而凶良可嘆者凡治勞之法須要辨其何臟之虛何臟之實或氣虛或血虛或氣熱或血熱務必真知灼見則治之無差蓋其臟之虛者診其臟之脈必虛而細小其臟之實者診其臟之脈必實而洪大氣虛者面白而無神血虛者面黑而枯瘦氣熱者面紅而光聲雄而清病甚於晝脈浮而數血熱者面赤而黯聲雄而濁病甚於夜脈沉而數氣血俱熱者病則晝夜俱甚氣息而津枯依此辨之無不的中氣虛用四君子湯血虛用四物湯氣血俱虛用八珍湯清氣用麥冬竹葉銀柴胡知母之類涼血用天門冬生地胡連黃柏枯芩之類安心神用茯神遠志棗仁壯筋骨用牛膝杜仲虎骨補陽用鹿茸枸杞鎖陽肉蓯蓉菟絲子補陰用山藥牡丹皮龜板柏子仁降相火用知母黃柏澀精用山茱萸龍骨牡蠣鹿角霜赤石脂之類帝曰陰虛生內熱奈何岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱此言氣虛之候也東垣宗其說發補中益氣之論卓在千古朱丹溪從而廣之以為陽常有餘陰常不足人之勞心好色內損腎元者多屬真陰虧損宜用四物湯加知母黃柏補其陰而火自降此又以血虛為言也後人論補氣者則宗東垣論補血者則宗丹溪且曰水為天一之元土為萬物之母其說至為有理然而陽虛易補陰虛難療治虛損者當就其陰血未枯之時而早補之患虛損者當就其真陰未槁之時而調養之庶乎其可也今照葛仙翁十藥神書例附於後以便觀覽虛勞不服參耆為不受補者死勞嗽聲啞者死一邊不能睡者死久瀉者死大肉去者死吐血淺紅色似肉似肺為之咳白血必死從上下者骨痿不能起於床者死謂從肺病而至腎也從下上者皮聚而毛落者死謂從腎病而至肺也久而嗽血咽痛無聲為自下傳上不嗽不痛久而溺濁脫精泄瀉為自上傳下皆死證也久病脈沉細數者死骨肉相失聲散嘔血陽事不禁日涼夜熱者死脈急者三年內死脈代者三月內死左手脈細右手浮大徑急為正虛邪盛必死骨蒸乾咳聲啞寒熱似瘧者必死王節齊先生勞瘵論附男子二十前後色欲過度損傷精血必生陰虛火動之病睡中盜汗午後發熱哈哈咳嗽倦怠無力飲食少進痰涎帶血咯唾出血或吐血衄血夢遺經閉以及肺痿肺疽咽痛音啞側臥傳尸鬼注等症此名勞瘵最重之症必須病人受命堅心定志絶房室息妄想戒惱怒節飲食以自培養其根否則雖服良藥無益也此病治之於早則易若肌肉削爍沉因著床脈沉細數則難為矣又此病大忌服人參若曾服過多者亦難治今制滋陰降火湯趁早服之滋陰降火湯黃柏蜜水浸火炙知母蜜水浸炒各一錢川芎熟地薑汁炒各一錢當歸白芍炒各一錢二分白朮炒一錢三分陳皮天冬各七分生地酒洗甘草炙各五分乾薑炒黑三分生薑三片水煎加薑汁竹瀝童便調服咳嗽痰盛加款冬花紫菀杏仁各七分或馬兜鈴五味子喘盛加桑白皮痰盛加薑製半夏貝母瓜蔞仁茯苓各一錢潮熱盛加地骨皮柴胡沙參各七分赤白濁加茯苓一錢黃連炒三分遺精夢泄加龍骨牡蠣萸肉各七分盜汗加牡蠣酸棗仁各七分浮麥一錢若兼衄血咳血出於肺也加桑白皮一錢黃芩山梔各五分嗽血涎血出於脾也加桑白皮貝母黃連瓜蔞仁各七分嘔吐血出於胃也加山梔黃連乾葛蒲黃各八分韭汁半杯薑汁少許和服咯唾血出於腎也加桔梗元參側柏葉炒各一錢此病屬火大便多燥亦要節飲食勿令泄瀉若胃氣一壞則前項寒冷之藥難用矣急宜調理脾胃用白朮陳皮茯苓半夏神麯麥芽棗子甘草生薑煎服候胃氣復再用前方若先見血症或吐衄者宜先治血輕少者涼血止血盛大者必先消瘀血然後止血涼血蓋血來多必有瘀胸膈不先消化之則止之涼之不應也葛氏十神方可次第檢用方內惟獨參湯止可用於大吐血後昏倦脈細氣虛者若陰虛火動潮熱盜汗咳嗽脈數者不可用也以後可合補陰丸常服之補陰丸論附人之一身陰常不足陽常有餘況節欲者少過欲者多精血既虧相火必旺火旺則陰愈消而癆瘵咳嗽咯血吐血等症作矣故宜常補其陰使陰與陽齊則水能制火而水升火降斯無病矣丹溪先生髮明補陰之說謂專補左尺腎水也古方滋補藥皆兼補右尺相火不知左尺原虛右尺原旺若左右平補依舊火勝於水只補其左制其右庶得水火相平也右尺相火因不衰若果相火衰者方宜補火但世之人火旺致病者十居八九火衰成病者百無二三且人在少年腎水正旺似不必補而欲心正熾妄用太過至於中年欲心雖戒然少年斫喪既多焉得復實及至老年天真漸絶只有孤陽攻補陰之藥自少至老不可缺也丹溪發明先聖之旨以正千載之訛其功盛哉今主補陰丸備加減於後補陰丸方黃柏酒炒褐色知母酒炒敗龜板酥炙各五兩熟地酒蒸忌鐵器五兩鎖陽酥炙枸杞各一兩五味子一兩白芍藥酒蒸天門冬去心各一兩乾薑炒紫色四錢寒月六錢為細末煉蜜丸豬脊髓五條和藥末杵極勻丸梧子大每服八九十丸空心淡鹽湯下寒月可用溫酒若有夢遺精滑病者加牡蠣童便煅白朮炒各一兩萸肉椿根皮炒各七錢赤白濁者加白朮茯苓各一兩山梔仁黃連炒各五錢腳膝軟弱無力者加牛膝酒浸二兩虎脛骨炙一兩防己酒洗木瓜各五錢疝氣者加蒼朮鹽和炒一兩五錢黃連薑汁炒山梔仁炒各六錢川芎一兩吳茱萸青皮五錢脾胃虛弱畏寒易泄者加白朮二兩陳皮一兩乾薑炒七錢眼目昏暗者加當歸川芎菊花各一兩柴胡黃連酒炒烏犀角各三錢蔓荊子防風各三錢兼氣虛之人加人參黃耆蜜炙各二兩左尺虛脫右尺亦微命門火衰陽事不舉加黑附子小便浸炒肉桂各一兩沉香五錢示吉曰男女之人大欲存焉每致過度陰虛症多故丹溪以此立論然病名虛損亦從陽氣不足者若因彥修之法既治虛損能免廢人乎故有反是說者謂陽生陰長只當以參耆補之滋陰之劑無益也籲一症一藥豈客偏僻參耆補陽東垣制方治內傷元氣矣丹溪豈有誤者是不善用丹溪者誤也陰虛陽虛論附發熱晝重夜輕口中無味胃逆噁心飲食難化痰涎白色四肢懈惰小便常多大便溏泄陽虛也午後發熱夜半則止口中有味口乾舌瘡咽痛聲啞能嗜滋味五心煩疼小便黃赤大便燥結陰虛也陽虛責之胃陰虛責在腎蓋飢飽傷胃則陽虛房勞傷腎則陰虛以藥論之甘溫補氣則宗東垣昔寒滋陰則宗丹溪又有嗽痰仰臥不得者必陰陽俱虛也若氣血兩虛只補其氣氣旺自然生血陽能生陰也若中氣虛誤用苦寒禍不旋踵潮熱論附凡潮熱之症有陰陽之分若平旦潮熱自寅至申行陽二十五度諸陽用事熱在行陽之分肺氣主之宜白虎湯以瀉肺中之火若日晡潮熱自申至寅行陰二十五度諸陰用事熱在行陰之分腎氣主之故用地骨皮以瀉血中之火蓋地骨皮瀉腎火總治熱症在外牡丹皮治心胞絡之火無汗而骨蒸又能瀉陰中伏火四物湯中加地骨皮牡丹皮治陰分潮熱極效婦人骨蒸潮熱以逍遙散加此二味纍用尤效若氣虛潮熱用黃耆三錢人參甘草各一錢五分甚者加熟附子五分二三服即效蓋甘溫能除大熱也若血虛發熱四物湯加柴胡防風地骨皮極效吐血出於胃腑五種吐血嘔血出於胃也其因有飲酒過傷有負重遠行或跌打損傷有色欲太過陰虛火動有勞心過度有大怒氣逆而吐者種種不同必須切脈問證方可治之大法以四物湯為主飲酒過傷者加葛根黃連茅根藕節負重跌打損傷者加牡丹皮桃仁紅花韭汁童便醇酒以活其血不可就止陰虛火動者加知母黃柏山梔犀角生地丹皮竹瀝薑汁勞心過度者加茯神遠志元參生地辰砂犀角大怒氣逆者加青黛條芩丹皮如精神壯盛吐血不止苟非脾虛泄瀉羸瘦不禁者皆當以大黃醋製和生地汁及桃仁泥丹皮丹參阿膠黑荊芥元明粉赤芍當歸之屬折其鋭氣從大便導之使血下行以轉逆為順然後區別治之或問失血復下虛何以當殊不知血既妄行迷失墳道不去蓄利瘀轉逆為順則以妄為常何以御之且去者自去生者自生何虛之有不知此而徒事於芩連梔柏輔專四物而行之未有不傷氣血而敗脾胃者血既下行之後多用薏仁及百合麥冬鮮地骨皮嗽渴加枇杷葉五味子桑白皮有痰加貝母皆氣薄味淡西方兌金之本藥如可用滋補者以地黃麥冬金水二臟之藥相佐之有負重為物所壓或持重遠行忽心口痛口鼻出血俗名脫力吐血乃肺胃內膜傷損掙破也若用涼藥愈遏愈出卒至胃損咳嗽而死急以人參細末飛羅面童便調服最佳或白及末童便調下亦可但不可服涼藥耳凡服藥而血不止是肺上有竅也用白及末豬肺煮熟蘸食日三四次竅為及末填滿血自止也欲知何臟之血吐水碗內浮者肺血沉者肝血半浮半沉者心血各隨所見以羊肺肝心煮熟蘸及末食之然須靜養方可施治如吐血過多形容脫色脈微欲絶但存一息之氣者四物湯禁勿與之因川芎之氣竄能散幾微之氣而當歸芍地皆滋降陰火之品不能生血於一時反失救死之權而速人夭折矣急以人參一兩煎湯飲之所謂血脫益氣氣旺則能生血內經曰陽生陰長此之謂也吐血不止將本人所吐之血用砂鍋焙乾為末每服一錢麥冬去心煎湯調下此謂血導血歸也一方用管仲淨末二錢血餘三錢燒灰側柏葉搗汁一碗攪勻於大碗內重湯煮一柱香取出入童便黃酒少許頻頻溫服即止衄血出於肺經衄血者血出於鼻也鼻為肺竅故曰本乎肺經治以犀角地黃湯加柏芩茅根柏葉藕節或用山茶花一味煎服痰涎血屬於脾臟痰中帶血者出於脾也治以犀角地黃湯加白芍白朮貝母陳皮薑汁竹瀝如血紫黑者加桃仁當歸韭汁咯血吐血屬於腎經咯血者咯出血屬也吐血者鮮血隨吐而出也俱屬腎治以犀角地黃湯加知母黃柏元參熟地咳血附咳血是肺中有竅肺乃清虛之臟纖芥不容一有其竅則血滲入肺矣愈滲愈咳愈咳愈滲此為難醫褚澄云以寒涼治之百不一生以童便治之百無一死每朝服之為妙或用百花膏亦捷牙宣者陽明之熱極齒縫中出血謂之牙宣乃陽明經之熱也足陽明胃之脈絡貫上齦手陽明大腸之脈絡貫下齦腸胃中濕熱上熏以致齒肉腐壞而出血清胃湯治之又有腎經虛熱齒縫中出血條者宜生脈散治之舌衄附舌上無故出血如線不知或如簪孔者是也宜香茹汁一升日三服外以槐花炒末干滲之腸紅者大便之下血大便下血清而色鮮者名腸風濁而色黯者名臟毒糞前來者為近血糞後來者為遠血富貴之人淫色厚味藜藿之人勞役憂思均致熱積於中風生於內血溢流走盡屬於熱總用犀角地黃湯加芩連槐花荊芥地榆三味炒黑凡水煮側柏煎服若久而不已面黃體倦四肢無力身發浮腫飲食不化者治以地黃湯加百藥煎白芷槐花烏梅極效或服加味補中益氣湯而愈不宜妄投苦寒伐胃之劑使氣血凝滯難以奏效溺血附溺血者小便中鮮血來之不止也此乃心火鬱熱下流心與小腸為受盛之官則小便出焉痛者為血淋不痛者為溺血不可用大涼之藥痛者牛膝四物湯主之不痛者以升麻甘草湯調益元散服之或實熱用木通湯虛熱用六味地黃丸一用炒山梔五錢為末水煎服腹內窄狹兮痰火各別有二種腹中窄狹須用蒼朮肥人自覺腹中窄狹乃是濕痰流注臟腑不能升降用蒼朮香附以燥飲行氣瘦人自覺腹中窄狹是熱氣熏臟腑用蒼朮黃連以開鬱清熱胸中煩熱兮虛實可分有二種胸中煩熱須用梔子仁實熱者加黃連若虛熱而煩躁者須用人參黃耆麥冬茯苓竹茹白芍驚悸痰迷心竅所致驚悸者心中忽然跳動也其因驚恐所致痰迷心竅神不安了治用二陳湯加茯神遠志當歸柏子仁酸棗仁人參丸藥用八物定志丸天王補心丹五味人參元參丹參桔梗當歸遠志天冬麥冬棗仁黃柏茯神硃砂生地健忘血少憂鬱而成健忘之病遇事多忘做事有頭無尾談言有始無終此乃病之名也非若生成愚蠢者因其憂慮過度損傷心胞以致神舍不清故今轉盼遺忘用歸脾湯八物定志丸怔忡附有四種怔忡者心中惕惕然如畏人捕之狀無時而作者是也因其用心過度心血耗散則心無血養而神不安也用四物湯加茯神遠志酸棗仁柏子仁黃連白朮炙甘草之類肥人痰多火旺者加貝母竹瀝薑汁枳實如水停心下怔忡者半夏茯苓湯癲狂者分心肝之熱極心氣極則癲肝氣極則狂癲多喜狂多怒脈大者吉脈細者凶癲宜清心養神寧志化痰湯治之狂宜去風除熱防風通聖散主之癡呆附手足動搖而言語蹇澀者謂之癲罵詈叫呼而乘力奔走者謂之狂不知人事而行動失常者謂之癡語言不出坐而默想者謂之呆不知飢飽而語言錯亂者謂之瘋又有不避親疏而忽然出言焦厲者謂之妄語寤寐呢喃而自言心事者謂之鄭聲閉目如見鬼神而心神不定者謂之狐惑凡此數病皆因神志不守作事恍惚一時痰迷心竅更加大熱鬱結痰涎壅盛神思不定卒然而為病也治宜清痰降火為要次當安養心神益血榮脾之劑與之如初起用蘇合香丸散理痰氣次用牛黃清心丸安養心神治無不效矣若用煎劑如二陳加芩連膽星歸朮犀角亦可癇症者尋痰火之重輕三種癇症發作則卒然而僕手足搐搦口眼相引胸背強直叫吼吐沫食頃乃蘇者是也丹溪曰癇症大卒屬痰火與驚治法行痰為主黃連南星瓜蔞半夏尋火尋痰分多分少而治無有不愈及平肝之藥青黛川芎之類便濁者有赤白之異二種便濁者小腸經之熱膀胱經之結血受熱則赤氣受熱則白治用清心蓮子飲主之赤加木通黃柏白加赤苓滑石痛者去人參黃耆用甘草梢梔子仁汗出者有自盜之名二種自汗者無時而濈濈然出動則為甚屬於陽虛盜汗者寐中而通身如浴覺來方知屬於陰虛自汗宜補陽調衛盜汗宜補陰降火自汗用補中益氣湯加麻黃根浮小麥虛甚者加熟附子一二片但升柴俱用蜜水炒以制其升發之性因非升柴不能領參耆至於肌表故用之耳盜汗用當歸六黃湯若大病之後新産之餘及久出盜汗不止則陽氣亦虛宜補氣固陽固陽能生陰氣為水母甘溫化氣陰液斯斂若拘泥濟陰烏能衛外故表而出之汗甚服止汗固表之藥不效者當理心血蓋汗乃心之液心虛不能攝血故溢而為汗宜大補黃耆湯加酸棗仁有微熱者加石斛有痰症冷汗自出者宜理氣降痰湯痰去則汗自止頭汗心汗附頭汗三種心汗一種頭汗者以六陽之脈上循於頭三陰之經到頸而還陰虛陽浮故汗出頭項不能周身有相火迫其腎水上行心之分野者有陽氣失所依附飛越於高巔者有寒濕相搏者有瘀血內蓄者若關格小便不通而頭汗者難治及陽脫唇舌口鼻清冷而頭汗者亦不治心汗者圓圓一片只在心堂因憂思驚恐以傷其心宜斂神益氣歸脾湯主之或用豬心一具帶血破開入人參當歸末一兩煮熟去藥食之仍以艾煎湯調茯苓末一錢服九種心疼痛在胃脘心痛即胃脘痛也古云心痛有九種蟲痛者懊憹不安口吐清水面多蟹爪紋路用白礬雄黃檳榔米湯調下疰痛者平素無心痛之疾忽然作痛妄言鬼神脈息乍大乍小乃飛尸鬼疰也用忍冬藤一兩或加桃奴三錢水煎服或灸兩大指界甲七艾丸悸痛者其痛不甚但覺胸中隱隱作痛此因驚氣乘心也治用二陳湯加茯神遠志黃連枳實當歸飲痛者因痰飲留於胃脘阻塞氣道故作痛也其人眼下必如灰煙燻黑之狀胸中常如冰水之停甚者以滾痰丸下之輕者以導痰湯加苓朮香附撫芎食病者胸中痞滿或噯氣吞酸惡聞食氣用平胃散加枳實山楂萊蔔子神麯麥芽之類寒痛者客寒犯胃其痛大作四肢清冷六脈沉遲燔蔥散主之熱痛者積熱在胃心煩身熱大小便少利二陳湯加山梔黃連撫芎香附金鈴子來去痛者時作時止面赤口渴瘦弱之人多有此病乃胃火作痛也四物湯加山梔香附陳皮瘀血痛者凡人喜食熱物致熱傷胃口清血流出而蓄積於胃中多作心痛其症得熱飲則痛愈加其脈沉澀甚者以桃仁承氣湯下之輕者四物湯加桃仁紅花沒藥五靈脂玄胡索心痛正作切不可補補則邪氣閉塞其痛愈甚須用吐之吐則邪氣宣通所謂痛因不通通則不痛是也吐後調理須獲全功吐法用緑礬炒紅研末砂糖為丸如桐子大每服四十丸白湯下凡遺體傳心痛者用藥不能見效真心痛者其痛掣背四肢青黑不治心痛之脈沉細者吉緊大者凶胸痛附胸者肺之分野然少陽膽經受病亦令胸痛此邪氣初傳入里而未歸於里故胸痛也古方用柴胡湯加枳殼治之如未應本方對小陷胸湯一服其效如神又風寒在肺胸滿氣痛宜用桔梗湯加理氣之劑又飲食填塞者宜吐法七般疝氣病在厥陰肝經疝氣者或有形如瓜或有聲如蛙或無形或無聲陰囊連小腹作痛者皆是疝氣也屬足厥陰肝經與腎絶無相干多因熱鬱於內而寒束於外也宜發散外寒疏通內火痛即愈矣用香蘇飲加官桂木通橘核青皮歸尾赤苓寒疝腰痛牽引睪丸屈而不伸尺脈沉遲者燔蔥散主之水疝腎囊腫大陰汗不絶者外用伏龍肝即灶心泥摻之內服升陽除濕湯筋疝莖筋掣痛挺脹不堪此因眷女御女也之故也用黑豆甘草湯水煎服血疝睪丸偏大有時疼痛也宜於夜分時自以一手托其下一手按其上由輕至重九弄百回彌日之間瘀血消盡又用防風丹皮各一兩每朝酒下二錢神效疝拂鬱則睪丸腫大悲哀則不樂而消用青皮香附枳實木香烏藥橘核川楝子狐疝晝則氣出而腎囊腫大令人不堪夜則氣入而腫脹皆消少無痛苦方以補中益氣湯加知母黃柏治之病愈而止㿗疝者頑疝也睪丸大而無痛苦也不必治脅痛有兩邊之別四種脅痛者肋痛也經云左右者陰陽之道路也脅居一身之左右陰陽六氣之所行或痰涎或死血或食積流滯於其間使不運行氣不升降故作痛也左脅痛是肝氣不順右脅痛是肺氣受傷治以二陳湯左痛加官桂青皮柴胡赤芍歸尾桃仁龍膽草黃連之類右痛加蒼朮撫芎南星枳殼香附麥芽砂仁白芥子薑汁竹瀝之類又有腎氣上攻胃口作酸分兩脅而痛者生艾汁調五苓散服之脅下一條扛起作痛者保和丸脅下悠悠痛不止者是肝氣不是也四物湯加柴胡治之肥白人氣虛發熱脅下痛者用參耆補氣柴芩退熱木香青皮以調其氣瘦弱人平昔多怒脅痛寒熱者必有瘀血宜桃仁紅花柴胡青皮大黃之類行之肩背臂痛附五種肩背痛不可回顧及肩痛項強腰以折項似拔者此太陽氣鬱不行經脈不運也宜通氣防風湯因濕熱沉重而痛者當歸拈痛湯因汗出小便數而黃者是風熱乘脾脾氣鬱而痛也宜升麻柴胡湯有痰飲流注作痛者宜導痰湯有腎氣不循故道氣逆挾背而上肩背作痛宜和氣飲加鹽炒小茴少許其症日中不疼夜間作痛至雞鳴時疼止一用胡黃連吳茱萸各一錢研末將飯黏為丸空心淡鹽湯送下一錢數服全愈有勞力或有棋書久坐而致肩背疼者補中益氣湯或八物湯加黃耆有醉飽後多痛欲槌者是脾不能運而濕熱作楚也宜助脾勝濕更須節飲凡臂為風寒濕所搏或痰飲氣滯或提掣重物皆能致痛蓋飲伏於內停滯中脘脾主四肢脾滯而氣不下故上行攻臂而痛其症一臂不遂而復移一臂輕用蠲飲枳實丸重用控涎丹然有腫者有不腫者若臥為風濕所襲遇外寒即痛者九味羌活散若飲酒太過濕痰流注者二陳湯加南星蒼朮桂枝酒芩有血不榮筋者四物湯加薑黃秦艽蓋薑黃能入臂故也有氣血凝滯經絡不行所致者舒筋湯東垣曰臂痛有六道各加引經藥乃驗以兩手伸直垂下大指居前小指居後而定之前廉痛者屬陽明以升麻葛根白芷行之後廉痛者屬太陽以藁本羌活行之外廉痛者屬少陽以柴胡行之內廉痛者厥陰以柴胡青皮行之內前廉痛者屬太陰升麻白芷蔥白行之內後廉痛者屬少陰細辛獨活行之頭風有左右之分三種頭居一身之上當風寒之沖一有間隙則風邪乘虛而入作為頭風之症此方為主加對症藥立效用片薑黃錢半蒼朮防風白芷羌活各一錢細辛六分加姜三片水煎食略遠服左痛屬風與血虛加川芎當歸各一錢荊芥薄荷各八分右痛屬痰加半夏錢半茯苓陳皮各一錢生甘草二分瘦人多兼熱倍用酒芩少佐石膏肥人多是濕痰加川芎南星半夏錢半倍蒼朮痰厥頭痛非半夏不能除頭旋眼黑風虛內作非天麻不能退六經頭痛附五種太陽頭痛惡風寒脈浮緊痛在巔頂二額角陽明頭痛發熱自汗脈長大痛連目眥頰齒少陽頭痛往來寒熱脈弦痛連耳根太陰頭痛有痰體重或腹痛脈沉頭重少陰頭痛足寒氣逆為寒厥脈沉細厥陰頭痛吐痰沫厥冷脈浮緩痛引目系氣虛頭痛者脈息虛微必兼眩暈耳鳴之症血虛頭痛者痛從奐屬上皮而形體黑瘦氣虛頭痛與眉稜骨痛者其脈皆沉微而澀發厥頭痛必形貌色白痛在右真頭痛者痛連於腦手足青黑至節旦發夕死夕發旦死治以二陳湯加白芷川芎為主太陽加羌活陽明加石膏少陽加柴胡黃芩太陰加蒼朮少陰加細辛厥陰加吳茱萸肥人必是濕痰加蒼朮白朮瘦人是熱氣上壅多加酒洗片芩如感冒風邪加防風羌活藁本升麻葛根風熱者加天麻蔓荊子川芎酒芩氣虛加參耆血虛加歸芍酒炒巔頂痛加藁本升麻不用川芎頸項強痛附四種戴人曰頸項痛非是風邪即是氣挫宜服和氣之劑亦有挫閃及睡久失枕而頸強不可轉移者此由腎氣不能生肝肝虛無以養筋故機關不利宜服補腎之劑亦有患筋急項不能轉側者此必從足起經言十二經絡有筋惟太陽之筋自足至項準繩曰頸項強直發熱惡寒之症多由風寒客於三陽之位寒搏則筋急風搏則筋弛左屬血右屬痰並宜祛邪湯若動則微痛脈弦而數右甚此痰熱邪客三陽經宜消風豁痰湯若動則微痛脈弦而澀左甚此血虛邪客太陽陽明經治宜疏風滋血湯
