三錢黑龍丹治死胎胎衣不下敗血沖痛欲死者五靈五錢當歸五錢川芎五錢熟地五錢良薑五錢曬乾以鹽泥固臍小罐盛燈盞蓋扎住封口周密文武火煅一炷香去火毒如黑糟色研細加花蕊石二錢琥珀一錢乳香一錢半百草霜三錢再研細末醋糊丸彈子大每服一丸用薑汁好酒童便半杯將藥一丸炭火上燒略紅入酒內調化頓服求嗣門女金丹治婦人無子服此鼓動微陽當歸川芎芍藥人參白朮茯苓藁本白芷白薇桂心丹皮玄胡赤石脂俱用酒浸三日曬乾各一兩加沒藥甘草各半兩香附醋浸一斤上為細末蜜丸桐子大每服五十丸溫酒下螽斯丸調經受補者服七日即交合孕後忌服香附白薇半夏茯苓杜仲厚朴當歸秦艽各三兩防風肉桂乾薑牛膝沙參各二兩細辛人參各四錢蜜丸如桐子大每服三十丸下百子附歸丸調經養血安胎順氣久服可能有孕香附四制十二兩阿膠艾葉四物湯料各二兩上為細末用陳石榴一枝連皮搗碎煎水打糊丸如桐子大每百丸空心淡醋湯下巨勝子丸治右尺命門脈微欲脫陽痿不舉陽脫之症巨勝子菟絲子破故紙覆盆子生地首烏天冬枸杞牛膝酒洗蓯蓉茯苓天雄棗仁柏子仁巴戟山藥楮實五味續斷各一兩熟地四兩韭子芡實川椒胡蘆巴蓮心木香各五錢上為細末蜜丸壯陽丹蛇床子仙茅五味茯苓蓯蓉山藥杜仲各一兩韭子巴戟熟地破故紙萸肉菟絲子各二兩紫菀花一兩海狗腎一枚用雄雞肝三副搗成一塊陰乾為末再用雄雞腎雄鱉肝腎各一副以鹽酒椒末蒸熟搗爛上為細末合一處用酒煮山藥和丸如桐子大每服百丸用淡鹽湯服下小菟絲子丸治腎氣虛損目眩耳鳴四肢倦怠夜夢遺精石蓮肉二兩菟絲子酒煮五兩茯苓二兩山藥內分一半搗糊二兩為細末用山藥糊丸如桐子大每服五十丸空心用好酒服下還少丹五勞七傷陽事不舉真氣衰弱精神短少不能行走小便無度眼目昏花腰膝疼痛兩腳麻冷山藥熟地枸杞杜仲酥蜜炙去絲山萸去肉緩和焙石葛銅刀刮去皮節嫩葉枝條相伴蒸出曬乾續斷酒浸一伏時焙遠志甘草湯浸一宿曬乾巴戟枸杞子湯浸一宿待稍軟取出用酒浸一伏時漉出菊花同焙令黃取出菊花五味子用酒浸蒸一時許漉出用漿水浸一宿焙乾牛膝用黃精自然汁浸漉出酒浸一宿楮實子用水浸三日去心曬乾酒浸一伏時漉去浮蒸半日許焙乾茯神小茴香酒浸一宿焙乾肉蓯蓉酒浸一宿去浮甲上各等分為細末酒打麵糊丸桐子大每服三十丸空心用鹽酒白湯送下天門冬膏天門冬不拘多少用炭火煎至半入蜜熬滴水不散為度昔有一人單服生三十二子又能補肺氣療咳嗽失血潤五臟殺三蟲輕身益氣令人不飢五子衍宗丸古今為第一種子方甘枸杞八兩菟絲子酒蒸搗羅八兩車前子揚淨二兩遼五味二兩覆盆子酒洗去皮上藥擇精新者焙乾為細末煉蜜丸每空心服五十丸臨臥時服五十丸用白湯或鹽湯送下修合之日春取丙子己午夏取戊巳辰戌丑未秋取壬子癸亥冬取甲乙寅卯忌見鰥寡師尼之人及雞犬六畜四聖不老丹松脂透明者一斤四兩以無灰酒鍋內桑柴火煮數沸竹枝攪黏住火以磁器盛水傾入水內結塊又復以酒煮九遍凡如此煮三日共二十七遍其脂瑩然如玉不苦澀乃止為細末淨用十二兩凡煮脂不宜酒少少則易干煮之三分之一就可傾入水內用白茯苓去皮甘菊花去梗柏子仁去殼去油淨各八兩煉蜜丸桐子大每服七十五丸清晨用好酒送下合時必擇天醫黃道吉星勿令婦人師尼及雞犬六畜等見之服藥亦擇吉日此方陝西總戎某公年九十餘歲而精力如壯王都憲五一翁懇得之修服八十有六能御數女人以仙稱種子仙方男服治男精清如水冷如冰或舉而不堅堅而不久如服此方助精壯陽得子如神菟絲子酒浸一日煮爛搗餅焙乾一兩五錢蛇床子酒炒去殼一兩六錢大甘草一兩沙苑一兩肉蓯蓉酒洗去甲銼片焙乾二兩五錢山萸肉淨一兩五錢覆盆子去蒂二兩五錢車前子一兩七錢五味子一兩三錢補骨脂二兩三錢上俱焙為細末煉蜜丸如桐子大每早晚服三十丸用淡鹽湯送下種子仙方女服治婦人月經不調子宮虛冷或有熱者如服此方調經攝精受胎如神無有不效肉蓯蓉蛇床子菟絲子川芎當歸各一兩二錢黃芩五錢艾葉三錢五味子六錢烏賊骨即海螵蛸去皮八錢覆盆子一兩二錢白芍藥一兩二錢煅牡蠣八錢防風六錢醫家五戒一戒凡病家大小貧富人等請視病者一請便往勿得延遲欲往不往以致誤人病症煙茶藥金毋論輕重有無必當盡力一律施於調治能如此之自然生意日增揚名四海毋傷於方寸矣二戒凡婦女及孀婦尼僧等請視病者雖而即至必候侍伴在傍人房診視切忌輕身自看倘無伴侍恐有不便之處及至宥時更宜真誠窺視忌對外言內人亦宜忌言何以為之此因閨閫故也三戒凡病家將珠珀珍貴等送家合藥不得出脫以存假物換真如果該用令彼自制而入倘服不效自無疑謗於人代彼制之恐彼不信生悔物色之好切勿稱讚彼家以假換真此等非君子也四戒凡醫或在家或設局等各有時運為醫之道不可行樂登山攜酒遊玩不可離局片時抱病至者親視用意發藥診治藥帖又要依經寫出存心用藥不可杜撰藥方受人駁問此為保身之要也五戒凡娼妓及私夥人家等請看症者雖而即至亦當正色窺視如良家女不可他意兒戲視畢便回恐取不正之嫌貧窘之者藥金可壁病愈之後只可與藥調治不可再去以圖邪淫之報醫家十要一要先知儒理然後方可醫業或內或外勤誦先賢明醫確論之書須要旦夕不離一一參明融化神機仙變即之在心慧之耳聞目視凡臨症時自然無錯謬矣二要選買藥品必遵雷公炮炙凡用之藥有醫方修合者又因病症有隨時加減者湯散宜近膏藥愈久愈靈丸丹預製線藥越陳越異藥不吝惜終久必濟於人三要同道之士不可輕侮傲慢凡遇鄉井切要謙和謹慎彼年尊者鞠躬而恭敬之彼有學者當師而事伴之彼驕傲者謙和而遜讓之如此信和自貴而無怨也四要治家與病同人不惜元氣斫喪太過百祈不得回也輕者廢人重者喪害性命治家之法不固根本基業奢華太過而流蕩日生者輕則無積重則貧窘者也五要人受天命不可負天之命凡致進取當知彼心願否天道順逆然後可以進取順取者昌逆取子孫受殃人生世上終當輕利遠害何為如此以防還報之業六要凡親友情婚喪疾病慶賀其餘外務終要正理而行饋送往來不可求奇好勝凡臨餐飧只宜一魚一菜一則省費二則惜祿增功此謂廣求而不如儉用也七要貧窘之家及遊僧道衙役凡來看病不可要他藥錢再遇貧難終當施藥與彼量力微贈如此方為仁術如其不然有藥而無火食其命亦難不如不施與乎八要凡有所蓄隨其大小便當置買田産以為根本基業忌收玩器以及不緊之物浪費錢財又取不正之名囊橐皆空難防不測之日一律禁之自然無謗怨矣九要凡在寓中應用各樣物具俱要整齊勿使臨時缺少古之聖賢以及近時名公今古醫理必尋一一參閲以進學問此為醫之本物次習談說為守身之計也十要凡官所請必得速而去毋得怠緩而要誠意恭敬告明病源然後開具藥方病愈之後不得圖求匾禮以為功顯使民何敢相請閒不近公自宜守身為實貴以上五戒十要乃保身保家之法守身守成之道故置言而不文當為置於座右若有賢能子孫必須朝夕二覽倘能遵而行之可以成家立業若不聽信此書必有飢寒不足凡人何不預聽不思蓄積根基直待臨時懊悔雖有百足難追故余整辦此書以為後學之法壬午民國三十一年四月初七日抄畢
