body:
  text: 卷之十病因賦類方卷下五勞六極門葛仙翁十藥神書程國彭增損方法甲字號方止咳嗽為主豫見虛損之成多由於吐血吐血之因多由於咳嗽咳嗽之原多起於風寒仲景云咳而喘息有音甚者吐血者用麻黃湯東垣師其意改用麻黃人參芍藥湯可見咳嗽吐血之症多有因於外感者不可不察也豫治外感咳嗽用止嗽散加荊芥蘇梗以散之散後肺虛即用五味異功散補脾土以生肺金虛中挾邪則用團魚丸解之虛損漸成咳嗽不止乃用紫菀散月華丸清而補之此治虛咳之要訣也止嗽散治諸般咳嗽桔梗炒荊芥紫菀蒸百部蒸白前蒸各二斤甘草炒十二兩陳皮去白一斤共為末每服三錢開水調下食後臨臥服初感風寒生薑湯下五味異功散即四君子加陳皮團魚丸治久咳不止恐成癆瘵貝母去心知母前胡柴胡杏仁去皮尖及雙仁各四錢大團魚重十二兩以上者去腸一個上藥與魚同煮熟取肉連汁食之將藥渣焙乾為末用魚骨煮汁一盞和藥為丸如桐子大每服二十丸麥冬湯下日三服海藏紫菀散潤肺止嗽並治肺痿人參五分紫菀知母蒸貝母去心桔梗茯苓真阿膠蛤粉炒成珠各一錢五味子炙甘草各三分水煎服月華丸滋陰降火消痰祛瘀止咳定喘保肺平肝消風熱殺尸蟲此陰虛發咳之聖藥也天冬去心蒸麥冬去心蒸熟地九蒸九曬生地酒洗山藥乳蒸百部蒸沙參蒸川貝母去心蒸真阿膠各一兩獺肝茯苓乳蒸廣三七各五錢用白菊花去蒂二兩桑葉經霜者佳二兩熬膏將阿膠化入膏內和藥稍加煉蜜為丸如彈子大每服一丸噙化日三服乙字號方止吐血為主凡血症有陽乘陰者有陰乘陽者假如脈數內熱口舌乾燥或平素血虛火旺加以醇酒炙煿之物此乃熱氣騰沸迫血妄行名曰陽乘陰法當清降四生丸等主之吐止後則用六味地黃丸補之又如脈息沉遲口舌清潤平素體質虛寒或兼受風冷之氣此謂天寒地涼水凝成冰名曰陰乘陽法當溫散理中湯主之凡治血症不論陰陽俱以照顧脾胃為收功良策誠以脾胃者吉凶之關也書云自上損下者一損損於肺二損損於肝三損損於脾過於脾則不可治自下損上者一損損於腎二損損於心三損損於胃過於胃則不可治所謂過於脾胃吐瀉是也古人有言不問陰陽與冷熱先將脾胃要安和丹溪云凡血症須用四君子之類以收功其言深有至理然而補脾養胃不專在藥而在飲食之得宜難經曰損其脾者調其飲食適其寒溫誠以飲食之補遠勝於藥耳世之治損者亦可恍然悟矣四生丸治陽盛陰虛內熱迫血而妄行以致吐血咯血衄血法當清降生地生荷葉生側柏葉生艾葉各等分細切同極爛為丸如雞子大每服一丸水煎去渣服吐甚者用此丸煎湯調下花蕊散一二錢尤佳花蕊石散能化瘀血為水而不動臟腑真神藥也花蕊石斤明硫黃四兩入瓦罐內封鐵線緊扎鹽泥包裹曬乾硬炭圍定煉二炷香細研節過每服二三錢童便熱酒調服生地黃湯生地三錢牛膝丹皮黑山梔各一錢丹參元參麥冬白芍各一錢五分鬱金廣三七荷葉各七分水煎加陳墨汁清童便各半杯和服六味地黃丸理中湯四君子湯俱見前丙字號方治吐血成升斗者先用花蕊石散止隨用獨參補之所謂血脫益氣陽生陰長之理貧者以歸脾湯代之獨參湯人參兩水煎服聽其熟睡切勿驚醒則陰血復生矣歸脾湯白朮人參當歸棗仁炒白芍各一錢黃耆一錢半遠志去心泡七分甘草炙五分龍眼肉五枚水煎丁字號方治咳嗽吐紅漸成骨蒸勞熱之症如人胃強氣盛大便結脈有力此陽盛生熱法當清涼清骨散主之若胃虛脾弱大便溏脈虛細此陰虛法當養陰逍遙散四物湯主之若氣血兩虛而發熱者八珍湯補之若元氣大虛變症百出難以名狀不問其脈不論其病但用人參養榮湯諸病自退經云甘溫能除大熱如或誤用寒涼反伐生氣多致不救清骨散治夜間灼熱無汗乃陰分之熱瀉者不可用柴胡白芍各一錢秦艽七分甘草五分丹皮青蒿地骨皮鱉甲各一錢二分知母黃芩胡黃連各四分水煎服加童便尤妙凡逍遙四物八珍方內皆可加入逍遙散四物湯八珍湯俱見前人參養榮湯白芍炒二錢人參黃耆蜜炒當歸白朮熟地各一錢半甘草炙茯苓遠志去心泡各七分桂心北五味陳皮各四分姜一片棗二枚水煎服戊字號方治肺痿肺癰久咳不止時吐白沫如米粥者名曰肺痿此火盛金傷肺熱而金化也保和湯主之咳嗽吐膿血咳引胸中痛此肺內生毒也名曰肺癰加味桔梗湯主之保和湯知母蒸五分貝母二錢天冬去心一錢米仁五錢北五味十粒甘草桔梗馬兜鈴百合阿膠蛤粉炒成珠各八分薄荷二分水煎入飴糖一錢虛者加人參加味桔梗湯桔梗白及橘紅甜葶藶微炒各八分甘草節貝母各一錢半苡仁金銀花各五錢水煎服初起加荊芥防風各一錢潰後加人參黃耆各一錢己字號方治咽痛音啞喉瘡夫勞症至此乃真陰枯涸虛陽上泛之危症多屬難起宜用六味丸滋腎水而以治標之法佐之可也百藥煎散治咽痛百藥煎五錢硼砂一錢半甘草二錢為末每服一錢米飲調食後細細咽之通音煎治音啞白蜜一斤川貝母去心為末一兩款冬花去梗為末一兩胡桃肉去衣研爛十二兩上四味和勻飯上蒸熟不拘時開水點服柳華散治喉瘡並口生瘡咽喉腫痛青黛蒲黃炒黃柏炒人中白各一兩冰片三分硼砂五錢共為細末吹喉極效庚字號方治男子夢遺精滑其夢而遺者相火之強也不夢而遺者心腎之虛也宜分別之祕精丸有相火必生濕熱則水不清不清則不固故本方以理脾導濕為主濕祛水清而精自止矣治濁之法亦然白朮山藥茯苓茯神蓮肉去心蒸各二兩芡實四兩蓮花須牡蠣各一兩五錢黃柏五錢車前子三兩共為末金櫻膏為丸如桐子大每服七八十丸開水下氣虛者人參一兩十補丸氣旺則能攝精時下體虛者象服此纍效黃耆白朮各二兩茯苓山藥各一兩五錢人參一兩熟地三兩當歸白芍各一兩山萸肉杜仲續斷各三兩棗仁二兩遠志一兩北五味龍骨牡蠣各七錢五分金櫻膏為丸每服四錢開水下辛字號方治女人經水不調並治室女經閉成損按女人經水不調乃氣血不和其病尚淺室女經閉則水源斷絶其病至深夫所謂天癸者癸生於子天之所生之本也所謂月經者經常也反常則災病至矣室女乃血氣完足之人尤不宜閉閉則鬚髮焦咳嗽發熱諸病蜂起勢難為也澤蘭湯調經通血脈治經閉澤蘭二錢柏子仁當歸白芍熟地牛膝茺蔚子各一錢五分水煎服益母勝金丹熟地當歸各四兩白芍酒炒三兩川芎一兩五錢牛膝二兩白朮香附酒醋薑湯鹽水各炒一次丹參茺蔚子各四兩益母草一斤酒水各半熬膏和煉蜜為丸每早開水下三錢晚用清酒下二錢經水後期而來小腹冷痛為寒加肉桂五錢經水先期妄行自覺血熱加丹皮二兩酒炒條芩五錢凡遇經來作痛乃血凝氣滯加延胡索一兩壬字號方治傳尸癆瘵驅邪殺蟲癆症之有蟲如樹之有蠹去其蠹而後培其根則樹木生長癆症不去蟲而徒恃補養未見其受益者古法具在不可廢也驅蟲丸明雄黃一兩蕪荑雷丸鬼箭羽各五錢獺肝一具丹參一兩五錢麝二分五釐煉蜜丸如桐子大每食後開水下十丸日三服紫金丹亦效或用真蘇合香丸治之尤佳癸字號方補五臟虛損凡病邪之所湊其氣必虛況由虛致病者乎則補法為最要難經云損其肺者益其氣損其心者和其榮衛損其脾者調飲食適其寒溫損其肝者緩其中損其腎者益其精按法主之補天大造丸補五臟虛損人參二兩黃耆蜜炙白朮陳土蒸各三兩當歸酒蒸棗仁去殼炒遠志去心甘草水泡炒白芍酒炒山藥乳蒸茯苓乳蒸各一兩五錢枸杞子酒蒸大熟地九蒸曬各四兩紫河車甘草水洗一具鹿角熬膏一斤龜板熬膏八兩以龜鹿膠和藥加煉蜜丸每早開水下四錢陰虛內熱甚者加丹皮二兩陽虛內寒者加肉桂五錢加味虎潛丸附治諸虛百損降相火助精神壯筋骨健脾胃生氣血人參二兩黃耆炙蜜各五錢熟地二兩山藥茯苓山萸各一兩丹皮知母澤瀉各七錢天冬麥冬各一兩黃柏五味各五錢當歸八錢白芍牛膝杜仲陳皮各一兩鎖陽五錢虎骨菟絲子龜板枸杞子鹿角霜各一兩蜜丸桐子大每服百丸空心白滾湯下冬月去白芍加炒乾姜五錢色欲虛勞用滋降陰火湯六味地黃丸固是聖藥然亦有勞心內傷勞力內傷飢餓內傷跌僕內傷淹淹不愈或成虛勞病者不言其故醫者不問其由誤認陰虛妄投湯劑不惟不得去病而反害之故望聞問切四者缺一不可錦囊加減地黃丸十方附按熟地滋陰補腎生血生精山茱萸溫肝逐風澀精祕氣牡丹皮瀉君相之火伏涼血退熱山藥清虛熱於肺脾補脾固腎茯苓滲脾中濕熱而通腎交心澤瀉瀉膀胱水邪而聰耳明目六經備治而功專補腎肝寒燥不偏而補兼氣血苟能常服其功未易闡述也錢氏加減法血虛陰衰熟地為君精滑頭昏山藥為君小便或多或少或赤或白茯苓為君小便淋瀝澤瀉為君心虛火盛及有瘀血丹皮為君脾胃虛弱皮膚乾澀山藥為君二妙地黃丸治濕熱內郁而為便濁六味內地黃用微火焙燥加川黃柏七錢熟附子五錢二味鹽酒同浸一宿各揀開黃柏炒褐色附子焙燥茅山蒼朮二兩切大塊米泔水浸透切片黑脂麻拌燥黃如濕多熱少附子七錢如濕少熱多附子五錢黃柏七錢共為細末用金石斛四兩煎濃汁入白蜜二十兩同煉為丸每晚早前食白湯各服三錢忌食酒面雞魚濕熱炙煿之物育脾固腎地黃丸治腎虛晨瀉六味內熟地八兩姜酒煨搗爛入藥萸肉白茯苓四兩山藥六兩澤瀉三兩去丹皮加五味子二兩補骨脂四兩鹽酒浸一宿炒香菟絲子酒洗曬乾另磨淨末六兩切宜勿使出氣用熟地搗爛入藥如干加飴漿為丸每早米飯湯送下四錢臨晚食前白湯送下三錢戒酒面以杜濕熱雙補地黃丸熟地山茱萸以補腎精蓮肉菟絲子以固腎氣故名雙補六味內熟地八兩微火焙燥加建蓮肉去心六兩炒菟絲子酒淨曬乾炒另磨細末四兩入藥勿使出氣煉蜜丸每早空心白湯送下五錢清心滋腎地黃丸六味內熟地八兩清水煮加遠志肉二兩甘草濃汁煮透曬乾焙五味子一兩每個銅刀切作二片蜜酒拌蒸曬乾焙麥門冬去心焙三兩為末用熟地搗爛入藥加蜜杵好為丸每早空心蓮子去心衣煎湯送下四錢阿膠地黃丸治金水兩臟受傷咳嗽吐紅六味丸內用熟地膏其法熟地一斤將八兩煮汁去渣又八兩入汁內煮爛成膏加麥冬去心四兩真阿膠三兩切塊蛤粉拌炒成珠為末用熟地膏入藥加煉蜜為丸每早空心用白湯或鹽湯送下四錢滋金壯水地黃丸養陰配陽滋金壯水六味內熟地黃三斤煎汁去渣煉成膏十二兩加牛膝四兩淡鹽水拌炒麥門冬去心五兩炒為末用熟地膏入藥加煉蜜杵好為丸每早空心用白湯送服四錢加味七味丸清肺金補腎水納氣藏源引火歸源六味內熟地八兩用清水煮加五味子一兩每個銅刀切二片蜜酒拌蒸曬乾焙麥冬去心炒三兩肉桂臨磨刮去粗皮一兩不見火為末用熟地搗爛入藥加煉蜜杵好為丸每早空心淡鹽湯送下四錢或生脈飲送服滋陰八味丸六味內熟地八兩清水煮加麥門冬炒三兩五味子制一兩肉桂一兩製附子一兩如腎家偏於氣分不足者去麥冬五味加牛膝三兩杜仲三兩俱用鹽酒拌炒為末用熟地搗爛入藥加煉蜜杵好為丸每早空心送下四錢如肺氣不足者生脈飲送服有浮火未歸原者淡鹽湯送服如偏於陽虛者或獨參湯送服或白滾湯送服加味滋腎地黃丸女科尤宜此方六味內熟地八兩酒煮加當歸酒拌炒三兩白芍三兩蜜水拌曬乾