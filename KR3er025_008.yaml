body:
  text: 卷之八用藥須知九陳橘皮三周四載麻黃亦要多年大黃日久最堪憐荊芥須還長遠木賊芫花半夏用時不要新鮮吳茱枳殼古來傳今按先賢正典十忌甘草忌心黑蟾酥怕赤睛鹿茸畏銅鐵鱉甲去旁裙青枳除穰隔桃杏禁雙仁蛇不連頭用全蠍白似銀十八反本草明言十八反半夏蔞瓜貝母蘞白及白攻烏頭藻海戟大遂芫俱反草諸參辛芍叛藜蘆參謂人參丹參苦參玄參沙參黨參十九畏硫黃原是火之精朴硝一見便相爭水銀莫與砒霜見狼毒最怕密陀僧巴豆性烈最為上偏與牽牛不順情丁香莫與鬱金見牙硝難合京三稜川烏草烏不順犀人參最怕五靈脂官桂善能調冷氣若逢石脂便相欺大凡修合看順逆炮炙煿莫相依引經藥報使小腸膀胱屬太陽藁本羌活是本鄉三焦膽與肝包絡少陽厥陰柴胡強大腸陽明並足胃葛根白芷升麻當太陰肺脈中焦起白芷升麻蔥白鄉脾經少與肺部異升麻兼之白芍祥少陰心經獨活主腎經獨活加桂良通經用此藥為使豈能有病到膏肓妊娠藥禁蚖斑及虻蟲烏頭附子配天雄野葛水銀並巴豆牛膝薏苡與蜈蚣三稜代赭芫花麝大戟蛇蛻黃雌雄牙硝芒硝牡丹桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑桃仁通硇砂乾漆蟹甲爪地膽毛根都不中産後藥禁産後最忌是生梨梔子芩連大不宜白朮黃耆須緩用人參白芍亦如之地黃泥膈麻黃烈冷物傷脾滑物遺又有石膏名白虎倘然誤服立傾危臌脹藥禁白朮黃耆白茯苓蜂蜜大棗及黃精二麥二門並五味誤服痰涎必上升制度引經製藥貴在適中不及則功效難求太過則氣味反失火制四煅炮炙炒也水制三漬泡洗也水火共制蒸煮二者焉法造雖多不離乎此酒製升提薑製發散入鹽走腎而軟堅用醋注肝而住痛童便制除劣性而降下米泔制去燥性而和平乳制潤枯生血蜜制甘緩益元陳壁土製竊真元氣而驟補中焦麥麩皮製抑酷性勿傷上隔烏頭湯甘草湯漬曝並解毒致令平和羊酥油豬脂油塗燒咸滲骨容易脆斷去穰者免脹抽心者除煩大概具陳初學熟記炮製藥歌共六首芫花本利水非醋不能通緑豆本解毒帶殼不見功草果消膨效連殼反脹滿黑醜生利水遠志苗毒逢蒲黃生通血熟補血運通地榆醫血藥連稍不住紅陳皮專理氣留白補胃中附子救陰症生用走皮風草烏解風痹生用使人蒙人言燒煅用諸石火烜紅入醋堪研末制度必須工川芎炒去油生用痹痛攻炮爁長依法方能奪化工知母桑皮天麥冬首烏生熟地黃分偏宜竹片銅刀切鐵器臨之便不馴烏藥門冬巴戟天連心遠志五般全並宜剔去心方妙否則令人煩躁添厚朴豬苓與茯苓桑皮更有外皮生四般最忌連皮用去淨方能不耗神益智天麻柏子仁更加草果四般論並宜去殼方為效不去令人心痞增何物還須湯泡之蒼朮半夏與陳皮更宜酒洗亦三味蓯蓉地黃及當歸諸藥相濟治病法麻黃得蔥白則能發汗桂枝得芍藥則能止汗麻黃得桂亦能行汗芍藥得甘草則止腹痛枳實得黃連則消痞滿黃連得木香則和痢疾木香得檳榔則行滯氣白朮得黃芩則能安胎陳皮得白朮則能補脾白朮得芍藥亦能補脾芍藥得川芎則能補肝人參得麥冬則能生脈五味得乾薑則止寒嗽生附配乾薑補中有發熟附配麻黃發中有補附子得乾薑則熱甚梔子得連翹降周身之火梔子同甘草瀉心經之火厚朴得蒼朮則平胃氣黃柏得蒼朮去經絡之濕枳實得山楂去胃家之積三稜得莪朮亦去胃家之積紫蘇得枳殼可平氣滿甘草同大棗能補脾胃陳皮得半夏能去風痰甘草節得忍冬藤能消腫毒梔子同香附能去鬱火梔子得陳皮去心中之痰麥冬得地黃阿膠得麻仁則能潤筋益血復脈通心手足三陽表裡引經主治例太陽足膀胱手小腸上羌活下黃柏少陽足膽手三焦上柴胡下青皮陽明足胃手大腸上升麻柴胡下石膏少陰足腎手心腎知母心黃柏厥陰足肝手胞絡肝青皮胞絡柴胡太陰足脾手肺脾白芷肺桔梗臟腑瀉火藥黃連瀉心火木通瀉小腸火黃芩瀉肺與大腸火梔子佐之柴胡瀉肝膽火黃連佐之白芍藥瀉脾火石膏瀉胃火知母瀉腎火黃柏瀉膀胱火柴胡瀉三焦火黃芩佐之五臟補瀉主治例肝虛者陳皮生薑之類補之虛則補其母腎者肝之母也以熟地黃柏補之如無他症錢氏地黃丸主之實則白芍藥瀉之如無他症錢氏瀉青丸主之實則瀉其子以甘草瀉心心者肝之子也心虛者炒鹽補之虛則補其母肝者心之母也以生薑補之如無他症錢氏安神丸主之實則甘草瀉之如無他症錢氏方中重則瀉心湯輕則導赤散以清熱肺虛者五味子補之實則桑白皮瀉之如無他症錢氏五膠散主之虛則補其母以甘草大棗補脾脾乃肺之母實則瀉其子腎者肺之子以澤瀉瀉腎脾虛者甘草大棗之類補之實則枳實黃連瀉之如無他症錢氏益黃散主之虛則補其母心乃脾之母以炒鹽補心實則瀉其子肺乃脾之子以桑白皮瀉肺腎虛者熟地黃柏補之腎無實不可瀉錢氏只有補腎地黃丸無瀉腎之藥虛則補其母肺乃腎之母以五味子補肺治病主藥論頭痛必須用川芎不愈各加引經藥太陽羌活少柴胡陽明白芷還須著太陰蒼朮少細辛厥陰吳萸用無錯頂巔之痛又不同藁本須用去川芎肢節之痛用羌活去風去濕亦其功小腸痛用青皮治心痞黃連枳實從腹痛須用白芍藥惡寒加桂熱黃柏腹中窄狹用蒼朮腹痛厚朴薑製法腹中實熱將何治大黃芒硝真有力虛熱虛汗用黃耆肌膚浮熱黃芩宜脅下疼痛往來熱日晡潮熱柴胡宜脾胃受濕因無力怠惰嗜臥用白朮下焦濕腫有火邪知母防龍並酒柏上焦濕熱用黃芩中焦濕熱黃連釋瀉用乾葛白茯苓半夏燥脾當禁革嗽用五味喘阿膠枳實黃連消宿食煩躁須用梔子仁水瀉芍藥苓白朮調氣必當用木香若然氣盛又非良補氣必是用人參肺經熱甚不相應痰涎為病須半夏熱加黃芩風南星胸中寒痰多痞塞白朮陳皮兩件增胃脘痛用草豆蔻瘡痛必須黃連湊眼痛黃連當歸根心中恍惚用茯神小便黃時用黃柏澀者澤瀉用之靈氣刺痛時用枳殼血刺當歸上下分痢疾當歸白芍藥瘧疾柴胡為之君滯血桃仁與蘇木滯氣青皮與枳殼枳殼青皮若用多反泄元神宜改作凡用純寒純熱藥必用甘草緩其力寒熱相雜亦用之調和其性無攻擊惟有中滿不食甘臨證還須用端的生甘梢治莖中疼心下痛兮吳茱力調血延胡補血芎傷風甘術佐防風上部見血防風醫中部黃連下地榆表虛桂枝同芍藥表實麻黃葛根宜表寒桂枝柴胡熱裡虛參朮何必疑肩背痛疼防羌活足膝痿軟柏防己喉痛頷腫山梔炒黃芩貝母桔梗齊乾嘔竹茹黃連使冷涎丁藿二香奇吐酸黃連須土炒吞酸炒連拌茱萸腎虛地黃牡蠣粉肺虛二冬五味居多夢紛紜用龍骨遠志菖蒲棗仁宜用藥寒熱相得論夫發表之藥用溫攻裡之藥用寒溫里之藥用熱者各有所宜也蓋表既有邪則為陽虛陰盛溫之乃以助陽陽有助則陽長而陰邪所由以消故用辛甘發散之以為陽也此指表藥用溫者而言也里既有邪則為陰虛陽盛寒之乃以助陰而抑陽阻受其抑則微而真陰所由以長故用酸苦湧泄之以為陰也此指里藥用寒者而言之也至於陰經直受寒邪則為臟病主陽不足而陰有餘故用辛熱之劑而溫之所以助陽而益陰也助則陰消陽長此指溫里之藥亦明矣若表有邪而不汗之其邪從何而解里有邪而不下之其邪從何而出臟有邪而不溫之其邪從何而除以此三者故用藥有陰陽寒熱之別其於熱藥寒服寒藥熱服中和之劑溫而服之此則寒因熱用熱因寒用不寒不熱溫而用之之義也且藥之相得也如麻黃得桂枝則能發汗蘇葉得蔥白亦能發汗芍藥得桂枝則能止汗黃耆得白朮則能止虛汗防風得羌活亦治諸風蒼朮得羌活則止身痛柴胡得黃芩則寒附子得乾薑則熱羌活得川芎止頭痛川芎得天麻止頭眩乾葛得天花粉則止渴石膏得知母亦止渴香薷得扁豆則消暑黃芩得連翹則消毒桑皮得蘇子則定喘杏仁得五味則止嗽丁香得柿蒂則止厄乾薑得半夏則止嘔半夏得薑汁則回痰半母得瓜蔞則開結痰竹瀝得薑汁則行經絡桔梗得升麻則開提氣血枳實得黃連則消心下痞枳殼得桔梗能使胸寬知柏得山梔則降火豆豉得山梔治懊憹辰砂得棗肉則安神白朮得黃芩則安胎陳皮得白朮則補脾人參得麥冬五味則生脈蒼朮得香附開鬱結厚朴得腹皮開臌脹草果得山楂開肉積神麯得麥芽能消食烏梅得乾葛則消酒砂仁得枳殼則寬中木香得薑汁則散氣烏藥得香附則順氣白芍得甘草則治腹痛茱萸得良薑亦止腹痛乳香得沒藥大止諸疼芥子得青皮則治腸痛參耆得附子則補陽知柏得當歸則補陰當歸得生地則生血薑汁磨京墨則止血紅藤得當歸則活血歸尾得桃仁則破血大黃得芒硝則潤下皂莢得麝香則通竅訶子得肉果則止泄瀉木香得檳榔則止後重澤瀉得豬苓則能利水豬苓得白朮則能收濕此用藥相得之心妙也藥性賦寒藥賦藥有四性寒熱溫平先陳寒藥之性以見治病之能黃連清心經之客熱黃柏降相火之遊行黃芩瀉肺火兮最妙梔子散內熱兮如神芒硝通大腸之結燥大黃乃蕩滌之將軍犀角解乎心熱牛黃定乎膽驚連翹退風熱而除瘡腫菊花明眼目而治頭痛滑石利小便之結澀石膏瀉胃火之炎蒸山豆根解熱毒而治喉痹桑白皮瀉肺氣而利水停龍膽治眼目之熱痛瞿麥利膀胱之血淋鱉甲療瘧而療癖龜板補陰而補心茵陳治黃疸而利水香薷療瘧亂以清神柴胡退往來之寒熱前胡治咳嗽之痰升元參治結熱毒癰清利咽膈沙參補陰虛咳嗽保定肺經丹參除舊而生新血槐花治痔而去腸風竹葉竹茹治虛煩兮立效茅根藕節止吐衄兮多靈苦參退風熱細疹地榆止血痢血淋車前子止瀉利小便兮尤能明目瓜蔞仁下氣降痰咳兮又且開音秦艽退骨蒸之勞熱丹皮破瘀血兮行經熟地補血而療虛損生地涼血而醫眼昏白芍藥治腹痛而熱煩亦除赤芍藥通血凝而膀胱可利麥門冬生脈以清心天門冬補血而潤肺骨皮除夜熱之勞蒸知母退腎經之火沸葛根止渴而解肌澤瀉補陰而滲利茲乃藥性之寒投劑須當酌議熱藥賦又有熱藥可以溫經麻黃散表邪而根苗有別官桂治冷氣而厚薄須分木香調氣治腹痛沉香理氣治腰疼丁香止嘔暖胃家之冷藿香止吐療胃脘以溫吳茱萸治小腹之寒氣山茱萸壯腰腎而澀精豆蔻砂仁理胸中之食氣腹皮厚朴治膈內之脹膨肉豆蔻開胃口而止痢延胡索止血痛而調經附子回陽救陰寒之藥乾薑止冷轉臟腑以溫草果消熔宿食檳榔去濁推陳蓯蓉鎖陽兼鹿茸而補精血川烏草烏同首烏而治風疼沒藥乳香散血氣而除疼立止牽牛巴豆削積堅而通祕時行紫蘇表寒邪之汗烏藥快冷氣之凝五靈脂治惡血之腹痛白花蛇療麻風之病經此熱藥之主治分佐使與君臣溫藥賦乃論溫藥各逞其能甘草為和中之國老人參乃補氣之元神葶藶瀉肺喘而利水苦甜有別茯苓補脾虛而滲利赤白鬚分黃耆止汗而補衛山藥助胃而開心蓬朮三稜磨腸胃之積聚山楂神麯消飲食而寬膨順氣化痰陳皮為首寬中快膈香附當行白朮健脾祛濕當歸補血調經半夏治痰燥胃枳實去積推陳川芎治頭疼之要藥桃仁去瘀血之佳珍艾葉安胎而治崩漏細辛溫表而療頭疼杏仁止風寒之嗽五味療肺氣之升防風乃諸風之必用荊芥乃疥癩之相應紫薇花通月經而下孕酸棗仁斂心肝以安神藁本治頭痛於頂巔之上桔梗載藥物有舟楫之能杜仲壯腰膝而補腎紅花活血脈以調經此溫藥之性味學者由是推循平藥賦既已明其三種豈不悉舉其平常山使之截瘧阿魏用之消癥防己木瓜治下焦之濕腫菖蒲遠志通心府之神明治腰痛而無如虎骨定驚悸而當用茯神阿膠止嗽而止血牡蠣澀汗而澀精羌活散風治骨節之痛麥芽消食化乳汁之膨獨活寄生理腳氣之風濕薄荷白芷散頭額之風疼木賊蒺藜退眼睛之浮翳玄明海石降痰火升騰枳殼瀉肺氣而積痰亦化青皮伐肝木而宿氣可行五加皮消腫而活血天竺黃降痰以清心鼠黏子清咽喉之不利薏苡仁理腳氣之難行琥珀安神而散血硃砂鎮驚而定心貝母開心胸之鬱而治結痰百合理虛勞之嗽而醫蠱毒升麻提氣而散風牛膝下行而壯骨利水須用豬苓燥濕必將蒼朮枸杞子明目以生精菟絲子補腎而有益天麻治諸風之掉眩木通療小腸之閉澀石脂龍骨極好生肌蘆薈使君最醫疳積乳汁開眼目之明裩襠安陰陽之易天南星最治風痰夏枯草專醫瘰癧此乃藥性之提剛務要誦之而不轍證藥增損歌人病無常用藥不一增損合宜全在活潑諸風兮防麻薑瀝諸濕兮蒼白二術中寒厥冷附子天雄中暑躁煩黃連香薷頭痛而芎蔓細辛未應而引經藥用太陽羌活陽明白芷少陽柴胡太陰蒼朮少陰細辛厥陰吳萸痰飲痛而半夏血虛痛而當歸氣弱人參黃耆冒風麻黃蔥白頂痛藁本腦痛細辛若夫遍身節痛而羌活風濕亦加水腫脹急而甘遂虛人忌用心疼良薑五靈下痛吳萸心痞枳殼枳實去悶黃連腹痛芍藥惡寒佐以官桂惡熱佐以黃芩骨蒸柴胡有汗增以地骨無汗增以丹皮栝實橘紅消胸中之疼痞柴胡牡蠣理脅下之痛堅腰疼杜仲膝疼牛膝喉嗌疼而黃芩桔貝胃痛草蔻莖痛甘梢臍下痛而肉桂地黃氣刺木香血刺當歸腹中窄而蒼朮腹中急而炒甘足膝痿軟黃柏防己肩背痠疼羌活防風腹痛兮厚朴咳逆兮柿霜氣不轉運而木香砂仁風痰上壅而竹瀝薑汁活血當歸補血川芎調血胡索崩血五靈死血蘇木虻蛭破血桃仁歸鬚止血炒蒲歸首補氣人參順氣烏藥調氣木香降氣沉香清氣檀香導氣檳榔破滯氣以青殼提元氣以升麻虛熱黃耆蒸熱地骨上焦熱而黃芩中焦熱而黃連下焦熱而黃柏咽乾乾葛煩渴天花牛黃開清心火硃砂善安神志熱痰瓜實濕痰蒼朮半夏風痰南星老痰枳實礞石脾胃受濕兮白朮下部濕腫兮防己肉積草果食積曲芽口甜石膏口苦柴連五味子肺虛咳嗽桑白皮肺實咳嗽風寒嗽而麻黃杏仁肺痿嗽而麥冬黃芩有聲無痰生薑防杏有聲有痰殼夏防風上氣喘急兮肺氣有餘杏仁蘇子氣促氣短兮元氣不足參味麥冬吞酸吳萸黃連吐酸土炒黃連冷涎丁香藿香乾噦竹茹薑汁水腫喘急葶藶桑皮諸虛泄瀉朮苓芍藥傷食作瀉者草果傷寒熱瀉者黃連諸痢芍藥當歸血痢黃連犀角上部見血兮防風中部見血兮黃連下部見血兮地榆大便熱結硝大黃血祕者麻仁桃仁氣祕者大黃枳殼小便不通木通滑石淋澀者豬苓澤瀉頻數者益智螵蛸滑泄不禁臟寒也訶子肉蔻若不已而升麻羌活小便失遺氣虛也人參黃耆若腎虛而地黃牡蠣驚悸恍惚茯神龍骨心志不寧菖蒲遠志胸中煩熱不眠而梔子心膽虛怯不眠而棗仁癲狂煩亂硃砂黃連自汗盜汗黃耆浮麥眼暴發而連歸防風眼久昏而當歸熟地翳膜木賊穀精沸淚川椒甘菊胎氣上升者砂仁胎動不安者芩術股腫大黃牡蠣結核牡蠣芽茶癰毒喘促兮栝實癰疽已潰兮參耆諸瘡作渴人參並黃耆花粉消諸腫毒連翹與花粉忍冬表虛桂芍表實葛麻表寒桂枝表熱柴胡裡虛參術裡實枳黃裡熱芩硝上焦寒者人參中焦寒者乾薑下焦寒者肉桂降虛火兮山梔退虛熱兮地骨水瀉車前寒瀉乾薑肺氣不足而二冬五味腎氣不足而遠志地黃肝氣不足而川芎天麻心氣不足而參茯蒼蒲脾氣不足而白朮芍藥膽氣不足而酸棗細辛神昏硃砂茯神健忘茯神遠志多夢紛紜兮龍骨驚悸不安兮龍齒噎症防蟲兮青黛小兒傷食兮山楂疸病茵陳癭病天冬下痢不快而氣實者大黃表虛惡風寒而自汗者桂枝殺蟲檳榔苦楝定喘阿膠杏仁證治多端筆舌難罄引伸觸類是在高明小柴胡湯增損歌小柴胡湯柴胡半夏人參甘草黃芩生薑大棗小柴少膽陽為至賓和解寬中不可少氣虛邪入用人參甘草柴胡黃芩清熱半夏嘔好本經之病小便祕赤茯加之須牢記嘔者陳皮生薑竹茹痰多貝母瓜蔞利少陽合病陽胃明證葛根芍藥皆稱聖若還虛煩傷寒類竹茹粳米堪相訂脅痛青皮為總司右脅薑黃玄胡枳實施左脅桑皮赤芍藥枳殼香附亦同之寒熱如瘧加桂枝知母天花渴症思齒燥無津石膏末金沸五味嗽能醫胸中飽滿熱尤甚枳殼桔梗有神應痞結不寬小陷胸黃連枳實真可益腹痛胸寒去黃芩桂枝芍藥與加增自汗惡風發熱痛桂枝湯合小柴胡湯行錯語心煩因內熱黃連解毒同煎吃面赤發熱脈弦洪煩渴飲水白虎散小便不利大便泄小柴四苓散相配合大便不通加大黃半夏去之防燥結胸煩不嘔減夏參倍入瓜蔞並桔梗心下悸兮小水澀減欲黃芩增茯苓胸中痞硬去大棗元明粉加之硬自好外有微熱口不幹去參加桂須應曉脈虛發熱或遺精知柏牡蠣號滋陰便溏口乾胃氣弱術苓芍藥可同臨口燥舌乾去半夏麥冬五味有天花粉脈虛熱渴不飲水麥冬五味人參加胸滿按痛去人參枳桔蔞連四味增胸滿嗽痰去人參枳桔蔞連貝母杏仁內熱下痢口渴甚黃柏黃連芍藥並血虛發熱夜尤多四物小柴相兼併婦人邪熱入血室經水適斷身發熱柴胡四物兩方需桂枝紅花牡丹地二陳湯增損歌二陳湯半夏陳皮茯苓甘草二陳半苓去痰濕脾虛甘草氣滯橘皮火旺生痰黃芩與黃連膈上不寬加枳實桔梗咳嗽生痰分冷熱熱加芩連梔子石寒痰倍半夏甚麻黃細辛烏頭同一轍外感風寒嗽若何二陳枳桔並前胡乾葛桑皮清肺氣先賢於此號參蘇濕痰倦怠身多軟蒼白朮二宜首選風痰南星白附枳天麻牙皂薑蠶咽氣虛有痰加參朮六君子名因此立血虛知母天門冬香附瓜蔞薑竹瀝食積生痰不克消曲麥山楂連枳調甚者用攻宜丸藥血虛血藥送之饒老痰倍半加瓜實香附連翹還海石結痰有物在喉中少佐芒硝便可減膈痰用吐宜提氣防芎茶桔薑韭類痰居腸胃下之安硝黃枳實杷甘遂痰在經絡及四肢皮裡膜外薑竹施脅下有痰白芥子非此無能上達之溫膽二陳加茹實安神豁痰為第一苦增枳實與南星湯號導痰能引膈四七湯中去草陳加漆蘇朴棗薑鄰散郁消痰並順氣孕生惡阻用無禁嘔吐皆因胃火痰薑茹枳實炒黃連若還藥也下難吞檳榔些少木香煎五六日嘔來不休心胸脹悶手難揉多加枳朴芩連芍便祕硝黃一服瘳嘈雜暖氣一般看胸中積火與停痰二陳星梔並香附石膏加上有何難同療吞酸與吐酸本方加入炒黃連水停心下名痰飲枳實豬苓利小便二陳半夏性最燥血虛煩渴皆不要四物湯中亦勿加貝母代之能取效小續命湯增損歌中風發表小續命外審六經之形證必須隨證能增損始可奏功在俄頃無汗惡寒屬太陽倍加麻黃杏仁防若是惡風兼有汗桂枝杏仁芍藥詳陽明惡熱不惡風桂枝黃芩乾葛同身涼無汗太陰證乾薑附子好加增有汗無熱少陰名桂枝附子炙甘憑肢節拘攣麻木痛連翹羌活膽肝經大法夏石春知芩秋冬附桂芍應尋有熱去附加白附語澀筋攣薏苡仁中風筋急倍人參以避中寒去芍芩服後稍輕猶有藥加入當歸筋急仲煩躁大便不能通附桂去之芍瀝增日久不行胸不快大黃枳實有奇功語言蹇澀手足掉菖蒲竹瀝皆為要發渴之時增麥冬天花葛根不可少中風熱渴覓秦艽發渴身疼羌活調如逢煩躁多驚恐犀角羚羊二味消恍惚錯語不知人茯神遠志定心神不能言者加竹瀝失音不語石菖論中風頭痛猶如破續命堪加羌活佐寒濕為殃骨節疼附子官桂非為故嘔逆腹脹見中風人參半夏必相從若還腳膝多軟弱牛膝石斛可收功腰疼桃仁去皮尖杜仲薑汁炒同煎夜眠不寐尋酸棗痰盛南星一物添肥人氣盛多痰濕倍加烏附行經急臟寒下痢去己芩加添附子並白朮或哭或笑或謳歌語言譫妄不能瘥麻黃參桂皆宜倍白朮加之可起疴中風汗多去杏麻仍加白朮有神應舌燥還增白石膏附子官桂俱可省四物湯增損歌四物女科之要品胎産調經為主君當歸芍地能生血行氣川芎鬱滯伸心虛血少補心湯四物參蘇共一湯骨蒸午熱荷知附曲骨逍遙並五黃經水行後腹中疼氣血俱虛君子增若過三五綿綿痛血行氣滯木香檳經行不及為血熱生地芩連香附別過期人瘦是血虛耆草少佐桃紅吃肥人過期乃氣虛挾痰升降多阻遲加入參耆去生薑二陳香附更相宜過期紫黑亦血熱香附連脂索乳沒色淡痰多血少醫生地二陳不可缺經血過多五心熱芩術胡連同一撮升提其氣獨柴荊澀少葵紅兩花覓經行微少兩足疼澤蘭甘草去地芎不通木膝桃丹附澀滯桃紅四物同崩多有熱加生地蒲黃黃芩荊芥穗崩多臟冷艾阿膠淋漓不斷赤石附赤白帶下桂附加白芷丹皮蒿續誇胎動不安兼下血附膠艾葉術芩賖胎氣不安胸腹脹枳殼砂蘇能通暢佛手芎歸二味名胎損服之即便降妊娠腹痛竹茹增死胎麝桂芷堪寧産後腹滿增枳桂惡露桃仁蘇膝成産虛血熱加生地寒熱柴胡麥冬治産後悶亂志茯苓傷風頭痛甘蒿具産後血痢腹中疼槐米黃連粟殼並若是血虛成血暈澤蘭荊草芎歸參血氣痛兮桂烏藥冷氣良薑玄胡索胸中氣塊木香增血積莪稜官桂漆産初用芍傷生氣腸滑當歸俱欲忌汗多方內減川芎泥膈尤嫌生熟地補中益氣湯增損歌勞倦傷脾中不足參耆歸術甘補益升麻柴胡清氣升脾胃疏通數陳橘內傷有時挾外感六經見證須加減太陽頭疼蒿桂羌陽明不足升葛選耳聾脅痛少陽經黃芩半夏又用芎太陰咽乾脅胸痛枳實厚朴亦相同少陰舌燥加桔甘厥陰囊縮川芎例如逢變症發斑時元參升麻倍乾葛內傷挾痰尋半夏竹瀝薑汁可同加頭痛川芎蔓荊子項痛藁本細辛佳耳鳴目黃頰頜腫更兼面赤脈來洪羌防甘蒿通經血芩連二味腫消松口乾咽燥加乾葛上升胃氣潤口渴心下痞悶芍連隨腹脹香砂兼厚實腹疼芍藥炙甘草桂心惡寒冷痛極若是惡熱用黃芩仍增甘草時熱息臍痛本方去甘耆胸中滯氣青皮利腳軟乏力或痛疼酒炒黃柏及牛膝久病痰嗽去人參夏熱冬花沸耳吟春寒秋冷冬涼月麻黃帶節便煎斟長夏濕土客邪越蒼白澤瀉消濕熱濕熱火勝食不消神麯味冬泄肺滅口吐白沫胃停寒益氣湯中益智先若加胃口當心痛何如草蔻更加煎飲食不下胸中寒氣滯青橘木香煎冬月智仁草豆蔻秋則檳砂夏芩連大便祕澀不能通當歸宜易歸稍用脅下或急或多少甘草人參柴胡並風濕相搏體重疼升麻柴胡羌活風藁本蒼朮宜暫服病去之時勿再逢心中煩躁何所加生地一味好安排若更氣浮心裡亂安神丸內用硃砂四言脈訣總言脈之大旨脈為血脈百骸貫通大會之地寸口朝宗診人之脈言診脈之法令仰其掌掌後高骨是名關上關前為陽言寸關尺部位關後為陰陽寸陰尺先後推行胞絡與心左寸之應惟膽與肝左關所認膀胱及腎左尺為定診五臟六腑之部位胸中及肺右寸昭彰胃與脾脈屬在右關大腸並腎男女之脈不同右尺斑斑男子之脈左大為順女子之脈右大為順言人迎氣口之脈男尺恆虛女尺恆盛關前一分人命之主左為人迎右為氣口神門屬腎兩在關後人無二脈言兩尺之脈不可者必死不救脈有七診曰浮中沉上下左右七法推尋又有九候即浮中沉三部各三合而為名言九候脈診者必須五十動每候五十方合於經五臟不同各有本脈左寸之心浮大而散右寸之肺浮澀而短肝在左關沉而弦長腎在左尺沉石而澀右關屬脾脈象和緩右尺相火與心同斷四時各有本脈若夫時令亦有平脈春弦夏洪秋毛冬石四季之末和緩不忒脈有太過不及太過實強病生於外不及虛數病生於內即疾有內外之分四時百病胃氣為本胃脈最要緊凡診病脈平旦為準虛靜凝神調息細審診脈不虛早晨醫者之心要細一呼一吸合為一息脈來四至平和之則五至無疴閏以太息平脈及遲數脈之分冷熱三至為遲遲則為冷六至為數數即熱證轉遲轉冷轉數轉熱遲數既明浮沉須別浮沉遲數辨內外因外因於天內因於人天有陰陽風雨晦明人喜怒憂思悲驚恐浮表沉里遲寒數熱浮數表熱沉數里熱浮遲表寒沉遲冷結浮脈法天輕手可得泛泛在上如水漂木有力洪大來盛去悠無力虛大遲而且柔虛極則散渙漫不收有邊無中其名曰芤浮小為濡綿浮水面濡甚則微不任尋按更有革脈芤弦合看沉脈法地如投水石沉極為伏推筋著骨有力為牢大而弦長牢甚則實愊愊而強無力虛弱柔小如綿細直而軟如蛛絲然遲脈屬陰一息三至緩脈和勻春柳相似遲細為澀往來極遲結則來緩止而復來代亦來緩止數不乖數脈屬陽一息六至往來流利滑脈可識有力為緊切繩極似數時一止其名為促數如豆粒動脈無惑別有三脈短長與弦不及本位短脈可原過於本位長脈綿綿長而短直狀類弓弦一脈一形各有主病脈有相兼還須細訂浮脈主表腑病所居有力為風無力血虛浮遲表冷浮數風熱浮緊風寒浮緩風濕浮虛傷暑浮芤失血浮洪虛火浮微勞極浮濡陰虛浮散虛劇浮弦痰飲浮滑痰熱沉脈主裡為寒為積有力痰食無力氣鬱沉遲虛寒沉數熱伏沉緊冷痛沉緩水蓄沉牢痼冷沉實熱極沉弱陰虧沉細虛濕沉弦飲痛沉滑食滯沉伏吐利陰毒積聚遲脈主臟陰冷相干有力為痛無力虛寒數脈主腑主吐主狂有力實熱無力虛瘡滑司痰飲右關主食尺為蓄血寸必吐逆澀脈少血亦主寒濕反胃結腸自汗可測弦脈主飲木侮脾經陽弦頭痛陰弦腹疼長則氣治短則氣病細則氣衰大則病進浮長風癇沉短痞寒洪為陰傷緊主寒痛緩大風虛緩細濕痹緩澀血傷緩滑濕痰澀小陰虛弱小陽竭陽微惡寒陰微發熱陽動汗出為痛為驚陰動則熱崩中失血虛寒相搏其名為革男子失精女人漏血陽盛則促肺癰熱毒陰盛即結疝瘕積鬱代則氣衰或泄膿血傷寒霍亂跌打悶絶瘡疽痛甚女胎三月脈之主病有宜不宜陰陽順逆吉凶可推中風之脈卻喜浮遲堅大急疾其凶可知傷寒熱病脈喜浮洪沉微澀小證反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽證見陰命必危殆陰證見陽雖困無害勞倦內傷脾脈虛弱汗出脈躁死證可察瘧脈自弦弦數者熱弦遲者寒代散則絶泄瀉下痢沉小滑弱實大浮數發熱則惡嘔吐反胃浮滑者昌弦數緊澀結腸者凶霍亂之候脈代勿訝厥逆遲微是則可嗟嗽脈多浮浮濡易治沉伏而緊死期將至喘息抬肩浮滑是順沉澀肢寒均為逆證火熱之證洪散為宜微弱無神根本脫離骨蒸發熱脈數為虛熱而澀小必損其軀勞極諸虛浮軟微弱土敗雙弦火炎則數失血諸證脈必現芤緩小可喜數大堪憂蓄血在中牢大卻宜沉澀而微速愈者希三消之脈數大者生細微短澀應乎堪驚小便淋閉鼻色必黃實大可療澀小知凶癲乃重陰狂乃重陽浮洪吉象沉急凶殃癇宜虛緩沉小急實或但弦急必死不失心腹之痛其類有九細遲速愈浮大延久疝屬肝病脈必弦急牢急者生弱急者死黃疸濕熱洪數偏宜不妨浮大微澀難醫脹滿之脈浮大洪實細而沉微岐黃無術五臟為積六腑為聚實強可生沉細難愈中惡腹脹緊細乃生浮大維何邪氣已深鬼祟之脈左右不齊乍大乍小乍數乍遲癰疽未潰脈宜洪大及其已潰洪大始戒肺癰已成寸數而實肺痿之形數而無力肺癰色白脈宜短澀浮大相逢氣損血失腸癰實熱滑數可必沉細無根其死可測婦人有胎陰搏陽別少陰動甚其胎已結滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女女腹如箕男腹如斧欲産之脈散而離經新産之脈小緩為應實大弦牢其凶可明奇經八脈不可不察直上直下尺寸俱牢中央堅實衝脈昭昭胸中有寒逆氣里結疝氣攻心支滿溺失直上直下尺寸俱浮中央浮起督脈可求腰背強痛風癇為憂寸口丸丸緊細實長男疝女瘕任脈可詳寸左右彈陽蹻可決尺左右彈陰蹻可別關左右彈帶脈之訣尺外斜上至寸陰維尺內斜上至寸陽維脈有反關動在臂後別有列缺不幹證候經脈病脈宜已昭詳將絶之形更當度量心絶之脈如操帶鉤轉豆躁疾一日可憂肝絶之脈循刀責耳新張弓弦死在八日脾絶雀啄又同屋漏一似水流還如杯覆肺絶維何如風吹毛毛羽中膚三日而號腎絶伊何發如奪索辟辟彈石四日而作命脈將絶魚翔蝦遊至如湧泉不可挽留
